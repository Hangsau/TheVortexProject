    how_to:
      - "（建議夾鼻夾）仰面在水下游蛙式，保持在水面下"
      - "頭與身體成一線，雙手錨定在身體前方往下抓水"
      - "身體保持平、臉與掌心朝上；剛開始幾划就浮上來沒關係，逐漸延長"
    perception_goal: "感覺仰面時的動作是否與正面對稱；感覺手部入水點和頭部位置"
    success_signal: "仰面蛙式與正面蛙式的感覺接近"
    failure_signal: "完全感覺不同（代表動作有偏側）"
    deficiency_fixes: [1, 3]
    source: "There's a Drill for That"

  - id: Br29
    name_en: "Up-Down Combos"
    name_zh: "正仰面組合"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4]
    abc_type: null
    purpose_zh: "連續正面和仰面水下蛙式切換，感覺頭部線條的穩定性"
    how_to:
      - "類似Br24：一連串在水面上的划，接一連串在水面下的完整蛙式"
      - "「下」的那組不換氣"
      - "3上3下（水面下），再進到2上2下、1上1下"
    perception_goal: "每次切換都能快速找回頭部靜止的位置"
    success_signal: "切換流暢；頭部對齊感不變"
    failure_signal: "切換後頭部位置改變；感覺混亂"
    deficiency_fixes: [1]
    source: "There's a Drill for That"

  - id: Br30
    name_en: "Pull Stop Kick Stop"
    name_zh: "拉停踢停"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L3, L4]
    abc_type: null
    purpose_zh: "拉手停＋踢腿停的分段練習，感覺每個動作的獨立完整感"
    how_to:
      - "把拉手與踢腿分開：先做一個只拉手不踢的蛙式（腿放著），拉手結尾頭潛進二頭肌間進緊streamline，定住片刻"
      - "不抬頭不換氣，做一個蛙式踢腿（手保持streamline），踢完確實併腳、滑行片刻，整趟重複"
      - "每個拉、每個踢後明顯停一下；熟練後逐漸縮短停頓、接到正式蛙式"
    perception_goal: "每個動作有清楚的起點和終點；感覺停頓時身體仍在流線中"
    success_signal: "停頓時感覺流線緊實；每個動作感覺獨立完整"
    failure_signal: "停頓時姿勢立刻崩潰；動作之間不清楚"
    deficiency_fixes: [9]
    source: "There's a Drill for That"

  - id: Br31
    name_en: "Overlap Timing"
    name_zh: "重疊時序"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L5]
    abc_type: null
    purpose_zh: "訓練蛙式競賽時序（手腳稍微重疊），感覺速度提升時的節律差異"
    how_to:
      - "不用浮板踢水，每踢後只做一個手臂外撇"
      - "外撇後不完成內撇，把手伸成streamline往前，維持這姿勢回收腿並踢腿"
      - "在完成那一踢的內撇後、腳還沒收完前，就再次開始外撇（很細微，多練會更快）"
    perception_goal: "感覺手腳有輕微重疊（不是完全分開）帶來的節律加快感"
    success_signal: "比純分段時序更快；節律感覺更連貫"
    failure_signal: "重疊導致動作衝突；感覺更慢"
    deficiency_fixes: [9, 15]
    source: "There's a Drill for That"

  - id: Br32
    name_en: "Stroke Count Speed Drill"
    name_zh: "划次速度訓練"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L5]
    abc_type: null
    purpose_zh: "固定划次練習速度，找到最有效率的划次和速度組合"
    how_to:
      - "游蛙式練三種時序。2拍：內撇腳併攏後在streamline數「一秒、兩秒」再分手外撇，適合長距、建立效率"
      - "1拍：streamline只停一秒，滑行較淺、較快回水面，適合速度或短距"
      - "Touch & Go：腳一併攏就分手，但確保已到完整streamline，適合衝刺與短組（最累；接近重疊時序）"
    perception_goal: "感覺哪個划次數下速度最快且最省力"
    success_signal: "找到個人最佳划次和對應的最快速度"
    failure_signal: "划次增加但速度沒有提升（代表效率低）"
    deficiency_fixes: [15]
    source: "There's a Drill for That"

  - id: Br33
    name_en: "Short Axis Combo"
    name_zh: "短軸組合（蛙蝶）"
    strokes: [breaststroke, butterfly]
    category: timing
    equipment: []
    l_target: [L4, L5]
    abc_type: null
    purpose_zh: "蛙式和蝶式交替游，感覺兩式外划和髖部旋轉的共通性"
    how_to:
      - "交替游蝶式與蛙式（外撇與核心旋轉相似）：3蝶接3蛙，或2-2、1-1"
      - "1-1時兩種都把滑行拉長；眼睛保持朝下，蝶蛙頭都不動"
      - "蝶式換氣空間不夠時，用下巴滑過水面代替抬頭"
    perception_goal: "感覺蛙蝶在外划和髖部前後動作上的相似性；換氣同樣是嘴巴貼水"
    success_signal: "切換流暢；兩式在感知上有共通感"
    failure_signal: "完全感覺是兩個不同的動作；換氣方式截然不同"
    deficiency_fixes: [2, 16]
    source: "There's a Drill for That"

  - id: Br34
    name_en: "Frozen Head"
    name_zh: "冰凍頭部"
    strokes: [breaststroke]
    category: arm
    equipment: []
    l_target: [L3, L4]
    abc_type: null
    purpose_zh: "蛙式中頭部完全靜止練習，感覺蛙式動作完全不帶動頭部移動"
    how_to:
      - "拿一顆網球，或略大一點的軟橡膠充氣球"
      - "夾在下巴下游蛙式，設法讓球留在原位"
      - "藉此保持眼睛朝下、頭與脊椎成一線"
    perception_goal: "頭部完全靜止；感覺動作從髖部以下發起，不帶動頭部"
    success_signal: "一趟下來頭部零晃動；換氣完全靠身體動作創造空間"
    failure_signal: "頭部跟著拉手上下移動"
    deficiency_fixes: [1]
    source: "There's a Drill for That"
