    purpose_zh: "戴呼吸管消除換氣動作，專注感覺蛙式手腳動作和頭部對齊"
    how_to:
      - "戴呼吸管游蛙式（拉手或全划都行）"
      - "手往前穿水會比較費力，當阻力訓練很有效"
      - "身體保持很平、內撇時肩膀會略升；眼睛持續朝下"
    perception_goal: "感覺沒有換氣干擾時的蛙式；頭部保持靜止在線條上"
    success_signal: "手腳協調感比正常游蛙式更清楚"
    failure_signal: "頭部仍然隨著動作移動"
    deficiency_fixes: [1]
    source: "There's a Drill for That"

  - id: Br27
    name_en: "Underwater Full Breaststroke"
    name_zh: "水下完整蛙式"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4]
    abc_type: null
    purpose_zh: "水下完整蛙式動作，消除浮力影響，感覺純動作效率"
    how_to:
      - "在水下游完整蛙式，頭保持靜止與身體成一線、眼睛朝下"
      - "水下做幾下，再慢慢帶到水面換一口氣，再做幾下無換氣完成一趟"
      - "然後游一趟正常蛙式、完全不抬頭，讓升起來自內撇與髖前轉"
    perception_goal: "水下蛙式時感覺阻力對稱；感覺每個動作的效率"
    success_signal: "水下也能前進不只是維持深度"
    failure_signal: "水下幾乎無法前進（代表動作效率低）"
    deficiency_fixes: [1]
    source: "There's a Drill for That"

  - id: Br28
    name_en: "Upside Down Underwater Breaststroke"
    name_zh: "仰面水下蛙式"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4]
