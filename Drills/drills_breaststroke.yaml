    perception_goal: "每次下衝都進入緊實流線；感覺踢腿在流線中有推進力"
    success_signal: "每趟都能完成規定踢數後接正式動作"
    failure_signal: "流線鬆弛或換氣需求導致提前起來"
    deficiency_fixes: [9]
    source: "There's a Drill for That"

  - id: Br25
    name_en: "Head-Up Breaststroke Shoots"
    name_zh: "抬頭快速前推"
