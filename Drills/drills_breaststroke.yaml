    failure_signal: "頭部仍然隨著動作移動"
    deficiency_fixes: [1]
    source: "There's a Drill for That"

  - id: Br27
    name_en: "Underwater Full Breaststroke"
    name_zh: "水下完整蛙式"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4]
    abc_type: null
    purpose_zh: "水下完整蛙式動作，消除浮力影響，感覺純動作效率"
