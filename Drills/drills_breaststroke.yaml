    success_signal: "水下也能前進不只是維持深度"
    failure_signal: "水下幾乎無法前進（代表動作效率低）"
    deficiency_fixes: [1]
    source: "There's a Drill for That"

  - id: Br28
    name_en: "Upside Down Underwater Breaststroke"
