# Breaststroke Drills — There's a Drill for That
# Perception layer annotations: Vortex L0–L6 framework (Hangsau 2026)

drills:
  - id: Br1
    name_en: "Wall Kicks"
    name_zh: "牆邊蛙式腿"
    strokes: [breaststroke]
    category: kick
    equipment: []
    l_target: [L2]
    abc_type: B
    purpose_zh: "貼牆練習收腿，感覺大腿後側和腹部發力而非膝蓋前推"
    how_to:
      - "在深水區貼著池壁，臉、胸、髖、膝盡量貼牆（雙手放在溢水槽或池畔），腳趾下壓"
      - "把腳跟往臀部收，過程中髖部保持貼牆，盡量縮小髖與牆之間的縫隙"
      - "留意是下背與腹部肌群在發力——短軸的蛙式與蝶式靠這些肌肉"
    perception_goal: "腳跟往臀部方向拉；髖部不離牆；感覺腰背和腹肌在做功"
    success_signal: "腳跟接近臀部時髖部仍貼牆"
    failure_signal: "腳跟一拉臀部就離牆（代表從膝蓋前推）"
    deficiency_fixes: [11, 12, 13]
    source: "There's a Drill for That"

  - id: Br2
    name_en: "Egg Beater Kick"
    name_zh: "打蛋器踢水"
    strokes: [breaststroke]
    category: kick
    equipment: []
    l_target: [L2]
    abc_type: B
    purpose_zh: "垂直打蛋器踢水感覺蛙式力量來自腿內側和腳掌"
    how_to:
      - "在深水區直立，打打蛋器式踢水，雙手在水面下輕輕撥水維持平衡"
      - "軀幹保持垂直、放鬆"
      - "把力量感覺集中在大腿內側與腳掌"
    perception_goal: "感覺壓力在腿內側和腳掌內側；不是腳底踢水"
    success_signal: "能在水中垂直維持高度；感覺到腿內側的推力"
    failure_signal: "感覺不到腿內側壓力；腳底在踢"
    deficiency_fixes: [11]
    source: "There's a Drill for That"

  - id: Br3
    name_en: "Vertical Breaststroke Kick"
    name_zh: "垂直蛙式踢腿"
    strokes: [breaststroke]
    category: kick
    equipment: []
    l_target: [L2, L3]
    abc_type: B
    purpose_zh: "垂直蛙式踢腿感覺正確的鞭式踢法，膝蓋不前推"
    how_to:
      - "在深水區保持垂直，踢蛙式腿"
      - "腳跟收回臀部，膝蓋不超過身體線"
      - "只用腿不用軀幹發力，身體會上下浮動；當蛙式踢水熱身很好"
    perception_goal: "感覺腳踝翻出後從內側踢水；踢完腳合攏"
    success_signal: "踢水後身體上彈；感覺從內側有推力"
    failure_signal: "膝蓋前推超過身體線；感覺上彈很弱"
    deficiency_fixes: [11, 12, 13]
    source: "There's a Drill for That"

  - id: Br4
    name_en: "Vertical Kick with Streamline Arms"
    name_zh: "垂直踢腿流線臂"
    strokes: [breaststroke]
    category: kick
    equipment: []
    l_target: [L3]
    abc_type: B
    purpose_zh: "流線臂垂直踢腿增加難度，訓練快速鞭式踢腿"
    how_to:
      - "同垂直踢腿，但雙臂上舉成streamline"
      - "手臂變成重量，踢水必須緊湊、俐落、快速"
      - "每一踢結尾把腳收乾淨（雙腳併攏）"
    perception_goal: "手臂重量迫使踢腿更快更緊實；感覺腳尖在踢後合攏"
    success_signal: "流線臂下仍能保持頭部出水"
    failure_signal: "無法在流線臂下維持垂直；膝蓋前推"
    deficiency_fixes: [12, 13]
    source: "There's a Drill for That"

  - id: Br5
    name_en: "Pull-Buoy Kick"
    name_zh: "浮力棒踢腿"
    strokes: [breaststroke]
    category: kick
    equipment: [pull_buoy]
    l_target: [L2, L3]
    abc_type: B
    purpose_zh: "夾浮力棒踢蛙式腿，浮力棒不掉代表膝蓋收窄且推進有效"
    how_to:
      - "把浮力棒夾在大腿高處，目標是踢水時不掉浮棒，踢一兩趟25"
      - "拿掉浮棒再踢一兩趟，回收時膝蓋收窄、踢腿結尾保持推進"
      - "也可夾浮棒游完整蛙式"
    perception_goal: "感覺膝蓋夾緊；踢水後滑行有推力感"
    success_signal: "浮力棒全程不掉；踢水後有明顯滑行感"
    failure_signal: "浮力棒掉落（代表膝蓋太寬）"
    deficiency_fixes: [11, 13]
    source: "There's a Drill for That"

  - id: Br6
    name_en: "Hands Down Kick on Stomach"
    name_zh: "手放臀部面朝下踢腿"
    strokes: [breaststroke]
    category: kick
    equipment: []
    l_target: [L2, L3]
    abc_type: B
    purpose_zh: "最佳蛙式踢腿基礎練習，感覺腿後側肌肉主導收腿，每次踢完腳合攏"
    how_to:
      - "面朝下不用浮板踢水，雙臂向後伸、雙手放在臀部"
      - "每次回收腿時讓小腿或腳踝內側碰到手，踢水結尾雙腳併攏"
      - "回收腿時抬頭、把髖往下壓換氣；推進前把肺、肩、額頭壓進streamline"
    perception_goal: "腳踝碰到手的感覺；踢完腳尖合攏；換氣時頭抬起髖下壓"
    success_signal: "小腿內側能碰到手；踢後身體滑行明顯"
    failure_signal: "無法用腳踝碰手（代表從膝蓋前推）；踢後沒有滑行感"
    deficiency_fixes: [2, 10, 11]
    source: "There's a Drill for That"

  - id: Br7
    name_en: "Hands Down Kick on Back"
    name_zh: "手放臀部面朝上踢腿"
    strokes: [breaststroke]
    category: kick
    equipment: []
    l_target: [L2, L3]
    abc_type: B
    purpose_zh: "仰面版的手放臀部踢腿，視覺確認膝蓋不出水"
    how_to:
      - "面朝上不用浮板踢水，雙臂向後伸、雙手放在臀部"
      - "每次回收腿讓小腿或腳踝內側碰到手；膝蓋保持在水面下不破水"
      - "先把腳跟直接收回臀部，再把腳踝外轉，然後踢；有困難先回去做Br1牆邊踢"
    perception_goal: "腳踝碰手；膝蓋不出水面；感覺腿後側啟動收腿"
    success_signal: "膝蓋不破水面；踢完腳合攏有力"
    failure_signal: "膝蓋出水（代表試圖前推膝蓋）"
    deficiency_fixes: [11, 12, 13]
    source: "There's a Drill for That"

  - id: Br8
    name_en: "Superman Kick on Stomach"
    name_zh: "超人蛙式踢腿"
    strokes: [breaststroke]
    category: kick
    equipment: [snorkel]
    l_target: [L3]
    abc_type: B
    purpose_zh: "雙臂前伸蛙式踢腿，感覺踢後的輕微波動感，腳用力合攏帶動臀部上浮"
    how_to:
      - "（可戴呼吸管）面朝下，雙臂從肩膀向前平伸（非streamline）"
      - "踢蛙式腿，每踢結尾把雙腳併攏並略往下收，幫助髖部上浮、產生輕微波動（像滾過一根想像的圓木）"
      - "換氣抓在腳收起時，腳併攏結束前把頭放回水中"
    perception_goal: "踢後腳夾緊下壓帶動臀部上浮；感覺像輕輕翻越一根木頭"
    success_signal: "踢完後有輕微波動感；臀部自然上浮"
    failure_signal: "踢完後身體平直沒有波動；腳合攏無力"
    deficiency_fixes: [16]
    source: "There's a Drill for That"

  - id: Br9
    name_en: "Superman Kick on Back"
    name_zh: "仰面超人蛙式踢腿"
    strokes: [breaststroke]
    category: kick
    equipment: []
    l_target: [L2, L3]
    abc_type: B
    purpose_zh: "仰面雙臂後伸蛙式踢腿，強調腳跟下落而非膝蓋上拉"
    how_to:
      - "面朝上，雙臂在水中過頭、從肩膀直伸"
      - "胸、髖、膝保持在水面，踢水時膝蓋不露出、髖不下沉"
      - "進階：數踢水次數設法減少每趟次數，或計時設法縮短"
    perception_goal: "感覺是腳跟往臀部掉落；膝蓋不出水；胸部和臀部在水面"
    success_signal: "膝蓋不出水；踢水後有前進感"
    failure_signal: "膝蓋出水；臀部下沉"
    deficiency_fixes: [12]
    source: "There's a Drill for That"

  - id: Br10
    name_en: "Tombstone Kick"
    name_zh: "墓碑浮板踢腿"
    strokes: [breaststroke]
    category: kick
    equipment: [kickboard]
    l_target: [L3, L4]
    abc_type: B
    purpose_zh: "浮板直立入水增加阻力，感覺踢水力量和腳合攏的時機"
    how_to:
      - "把浮板像墓碑一樣直立、半沒入水中握著，踢蛙式腿"
      - "數踢幾下過一趟，設法減少次數（踢水結尾收緊、腳趾下壓）"
      - "浮板保持完全直立，不讓它傾斜"
    perception_goal: "感覺每次踢完腳尖合攏帶來的推進；阻力下踢腿仍然緊實"
    success_signal: "浮板保持垂直；踢水後依然向前推進"
    failure_signal: "浮板傾斜；踢水距離很短"
    deficiency_fixes: [11, 14]
    source: "There's a Drill for That"

  - id: Br11
    name_en: "Barrowman Kick"
    name_zh: "Barrowman腿（交替踢）"
    strokes: [breaststroke]
    category: kick
    equipment: []
    l_target: [L4, L5]
    abc_type: B
    purpose_zh: "左踢一次右踢一次再雙腳踢，訓練快速腳速，感覺每次踢後腳合攏"
    how_to:
      - "左腿踢一下、右腿踢一下、雙腿一起踢一下，循環；非踢的腿盡量打直"
      - "先慢慢做，熟練後逐漸加快節奏"
      - "每踢結尾雙腳併攏；回收頂端不停腳，保持腳速"
    perception_goal: "感覺每一踢都乾脆有結束感；不在收腿頂部停頓"
    success_signal: "節奏加快後踢法不崩潰；每次踢後腳合攏"
    failure_signal: "踢腿在頂部停頓（增加阻力）；節律感不足"
    deficiency_fixes: [11]
    source: "There's a Drill for That"

  - id: Br12
    name_en: "Breaststroke Arm Sweeps"
    name_zh: "蛙式手臂外撇"
    strokes: [breaststroke]
    category: arm
    equipment: []
    l_target: [L2, L3]
    abc_type: A
    purpose_zh: "淺水彎腰練習蛙式拉手，感覺手停在身前、下巴貼水的換氣動作"
    how_to:
      - "淺水區從腰部前彎、臉放進水裡，做蛙式拉手"
      - "雙手保持在身體前方、快速內撇；頭頸與身體對齊、脊椎打直"
      - "用最小頭部動作偷換氣、下巴留在水中；頭部不動，髖到頭頂當成一個整體、從髖旋轉不點頭"
    perception_goal: "手停在臉前方；內划時感覺向前的動量；下巴貼水換氣不需要抬頭"
    success_signal: "換氣時只需要微微抬頭；感覺到內划的推力"
    failure_signal: "需要明顯抬頭才能換氣；感覺不到內划推力"
    deficiency_fixes: [4]
    source: "There's a Drill for That"

  - id: Br13
    name_en: "Breaststroke Arm Pull"
    name_zh: "蛙式泡麵條輔助拉手"
    strokes: [breaststroke]
    category: arm
    equipment: [noodle]
    l_target: [L2, L3]
    abc_type: A
    purpose_zh: "泡麵條輔助練蛙式拉手，感覺肘部在肩膀前方、手在下巴前方"
    how_to:
      - "淺水區用一條泡棉條（沒有就把腋下靠在水線上），從腰部前彎、臉放水裡做蛙式拉手"
      - "雙手保持在下巴前方、手肘在肩膀前方"
      - "留意內撇比外撇快很多——蛙式的推進來自內撇"
    perception_goal: "手停在下巴前方；肘部一直在肩膀前面；內划比外划快速"
    success_signal: "感覺到內划的加速感和向前推力"
    failure_signal: "肘部拉到肩膀後面；內划和外划速度一樣慢"
    deficiency_fixes: [4]
    source: "There's a Drill for That"

  - id: Br14
    name_en: "High Elbow Pull"
    name_zh: "高肘支撐練習"
    strokes: [breaststroke]
    category: arm
    equipment: []
    l_target: [L3]
    abc_type: A
    purpose_zh: "雙手撐在泳池邊寬於肩，讓身體下沉再浮起，感覺高肘捕水"
    how_to:
      - "在深水區池畔，雙手放得比肩寬（手肘仍微彎）撐在池畔"
      - "手位置不動慢慢沉入水中，讓腳自然垂著、只用手臂與上半身"
      - "盡量把自己撐出水面、手肘保持高於手掌；撐到頂會立刻沉回，再感覺伸展再撐起；重複幾次後立刻推牆游蛙式，維持外撇到內撇間的高手肘"
    perception_goal: "手撐池邊時感覺肘部高於手；浮起瞬間感覺高肘帶動身體"
    success_signal: "能感覺肘部高於手的位置；浮起時有強烈捕水感"
    failure_signal: "完全無法浮起（代表手位置太窄或肘部沒有高起）"
    deficiency_fixes: [3]
    source: "There's a Drill for That"

  - id: Br15
    name_en: "Breast Pull with Flutter Kick"
    name_zh: "蛙式拉手＋自由式踢水"
    strokes: [breaststroke]
    category: arm
    equipment: []
    l_target: [L3, L4]
    abc_type: A
    purpose_zh: "蛙式拉手配自由式踢水，感覺從水面一個洞滑過去的緊湊感"
    how_to:
      - "用蛙式拉手配很輕的自由式踢水（僅維持漂浮），在內撇時換氣（盡量不穿蛙鞋）"
      - "外撇與內撇保持短而緊湊，找到streamline時身體滑進水線下的感覺"
      - "放慢游，每一划結尾頭埋在雙臂間滑行"
    perception_goal: "拉手後感覺整個身體緊湊滑入一個洞；頭低在手臂之間"
    success_signal: "流線時感覺靠近水面滑行；動作緊湊不浮誇"
    failure_signal: "頭部太高；感覺不到滑行感"
    deficiency_fixes: [6, 10]
    source: "There's a Drill for That"

  - id: Br16
    name_en: "Breast Pull with Dolphin Kick"
    name_zh: "蛙式拉手＋蝶式踢水"
    strokes: [breaststroke]
    category: arm
    equipment: []
    l_target: [L3, L4]
    abc_type: null
    purpose_zh: "蛙式拉手配蝶式踢水，感覺髖部「裝填」和「推出」帶動換氣和動量"
    how_to:
      - "蛙式拉手配一個短而緊湊的蝶式踢腿（要換氣）"
      - "外撇時把肺輕輕往下壓「載入」髖部（下背微拱、髖前送）；內撇時把髖往後送（臀部朝上）"
      - "髖帶動蝶踢；在內撇換氣，靠髖部上送做出換氣空間（不抬頭）；波動小而柔，重點是把手往前送、頭往下"
    perception_goal: "外划時肺部下壓感覺髖部裝填；內划時髖部向後推（臀部抬起）"
    success_signal: "換氣時不需要額外抬頭，感覺髖部動作創造了氣口"
    failure_signal: "換氣需要主動抬頭；感覺不到髖部的「裝填」感"
    deficiency_fixes: [2, 6, 16]
    source: "There's a Drill for That"

  - id: Br17
    name_en: "Cobra"
    name_zh: "眼鏡蛇"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4, L5]
    abc_type: null
    purpose_zh: "靜止練習感覺髖部在內划時前推的幅度，是距划效的關鍵"
    how_to:
      - "趴平在水中、雙腿在後，放鬆到靜止（可輕踢維持平衡）"
      - "雙臂外撇成寬「Y」，把肺往前略下壓在水面；內撇並盡量把髖往前送，在內撇換氣、定住身體線，完全停住再重複"
      - "訣竅：外撇壓肺讓水幫你把肺往前上拋；用肩膀換氣不刻意抬頭；做對時臉、胸、手同時落水"
      - "熟練後加上蛙式踢腿——是「踢向身體線」而非「展開到身體線」，踢完確實停住滑行一段再做下一次；頭全程與身體對齊"
    perception_goal: "內划後感覺髖部向前推的距離；肺部下壓創造浮力幫助換氣"
    success_signal: "停止後再做每次都有明顯向前衝的感覺；落地時臉胸手同時"
    failure_signal: "感覺不到髖部前推；落地時上下搖晃不是向前"
    deficiency_fixes: [2, 6, 7, 8, 10]
    source: "There's a Drill for That"

  - id: Br18
    name_en: "One-Arm Breaststroke"
    name_zh: "單臂蛙式"
    strokes: [breaststroke]
    category: arm
    equipment: []
    l_target: [L3]
    abc_type: A
    purpose_zh: "單臂蛙式拉手，專注感覺單側手臂的外划-內划-延伸動作"
    how_to:
      - "只用單手游或拉蛙式，另一手在前方伸直"
      - "專注用那隻手保持良好動作"
      - "換邊練較弱的非慣用手"
    perception_goal: "感覺單臂的捕水、內划加速、手臂延伸前衝"
    success_signal: "弱側（非慣用手）的感覺也能清楚描述"
    failure_signal: "弱側感覺完全不同且很吃力"
    deficiency_fixes: [3]
    source: "There's a Drill for That"

  - id: Br19
    name_en: "Fist Pulling"
    name_zh: "握拳蛙式"
    strokes: [breaststroke]
    category: arm
    equipment: []
    l_target: [L3, L4]
    abc_type: A
    purpose_zh: "握拳划蛙式，感覺前臂和手腕的貢獻；開手後感覺力量差異"
    how_to:
      - "握拳游或拉蛙式任意距離，感覺前臂與手掌在划水中的工作"
      - "可一手握拳、一手張開，練較弱的非慣用手更有效運用"
    perception_goal: "握拳時感覺前臂在划水；開手後感覺明顯的壓力增加"
    success_signal: "握拳仍能前進；開手後推力明顯增加"
    failure_signal: "握拳幾乎無法前進（代表只靠手掌）"
    deficiency_fixes: [4]
    source: "There's a Drill for That"

  - id: Br20
    name_en: "Miles Per Hour Pull"
    name_zh: "時速拉手"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4, L5]
    abc_type: A
    purpose_zh: "25→60→100時速類比訓練三段拉手速度感，感覺擊線時的動量"
    how_to:
      - "蛙式拉手、不踢或極輕踢水（不夾浮棒）：外撇、內撇、雙手往前刺出身體線"
      - "第一次不要每划換氣，只在需要時換，專注手部動作；想成外撇25、內撇60、刺線100（mph），跑出那條線、保持耐心"
      - "進階：在內撇雙手會合時換氣，不抬頭看池末，用頭頂帶、下巴留後；手、頭、胸同時落在身體線上"
    perception_goal: "外划慢且耐心；內划明顯加速；前推動作最快最有力"
    success_signal: "三段速度差異明顯；換氣在內划時不需要抬頭"
    failure_signal: "三段速度相同（全部慢）；換氣需要抬頭"
    deficiency_fixes: [1, 2, 3, 6, 7, 8, 10]
    source: "There's a Drill for That"

  - id: Br21
    name_en: "Dive Downs"
    name_zh: "潛水下衝"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4, L5]
    abc_type: null
    purpose_zh: "蛙式拉手後下衝潛水進流線，水下踢腿，訓練完整的動作時序"
    how_to:
      - "不穿蛙鞋、不夾浮棒。蛙式拉手配一個蝶踢（蝶踢時機配合內撇後雙手前刺），結尾潛到水面下進streamline"
      - "在水下保持streamline做一個蛙式踢腿"
      - "streamline要緊（頭過雙臂間時才不會減速）；整趟持續"
    perception_goal: "潛水時身體像穿過水面的一個洞；水下流線踢腿有滑行感"
    success_signal: "潛水流暢不停頓；水下踢腿有推進感"
    failure_signal: "潛水時阻力大（流線不緊）；沒有滑行感"
    deficiency_fixes: [8, 9]
    source: "There's a Drill for That"

  - id: Br22
    name_en: "Flat Breaststroke Pull"
    name_zh: "平面蛙式拉手"
    strokes: [breaststroke]
    category: arm
    equipment: [snorkel, pull_buoy]
    l_target: [L3, L4]
    abc_type: A
    purpose_zh: "戴蛙鏡和浮力棒，臉朝下，感覺低姿態拉手和頭部對齊"
    how_to:
      - "面朝下，戴呼吸管夾浮棒（沒呼吸管就需要時才換氣）"
      - "雙腿拖在後面（不波動、不踢腿）"
      - "臉朝下做快速蛙式拉手"
    perception_goal: "頭部完全不動；感覺拉手在臉的正下方進行；快速乾脆"
    success_signal: "戴上呼吸管後可以完全專注拉手而非換氣"
    failure_signal: "頭部跟著拉手移動；拉手動作緩慢"
    deficiency_fixes: [1, 3]
    source: "There's a Drill for That"

  - id: Br23
    name_en: "Underwater Undulation"
    name_zh: "水下波動"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4, L5]
    abc_type: null
    purpose_zh: "水下微型蛙式拉手配微型波動，感覺輕微起伏而非大幅上下"
    how_to:
      - "在水下做很小的mini蛙式拉手，配很輕的蝶式波動"
      - "頭與眼睛朝下、頭與身體成一線保持極穩"
      - "手肘留在前方，主要從前臂到手掌發力"
    perception_goal: "感覺是前進方向的波動，不是上下方向；頭部靜止；肘部保持在前"
    success_signal: "水下能持續前進；波動感覺在幫助推進"
    failure_signal: "波動過大導致往下鑽；頭部移動"
    deficiency_fixes: [1, 16]
    source: "There's a Drill for That"

  - id: Br24
    name_en: "Kick-Dive Progression"
    name_zh: "踢腿潛水遞進"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4, L5]
    abc_type: null
    purpose_zh: "3踢→2踢→1踢→正式游，四趟遞進訓練時序和屏氣能力"
    how_to:
      - "四趟漸進（3踢、2踢、1踢、游）：第一趟正常蛙式潛進水面下streamline，維持streamline做3個踢腿（不划不換氣）再接一個完整蛙式，整趟重複"
      - "第二趟改2踢，第三趟改1踢"
      - "最後一趟游完整蛙式"
    perception_goal: "每次下衝都進入緊實流線；感覺踢腿在流線中有推進力"
    success_signal: "每趟都能完成規定踢數後接正式動作"
    failure_signal: "流線鬆弛或換氣需求導致提前起來"
    deficiency_fixes: [9]
    source: "There's a Drill for That"

  - id: Br25
    name_en: "Head-Up Breaststroke Shoots"
    name_zh: "抬頭快速前推"
    strokes: [breaststroke]
    category: arm
    equipment: []
    l_target: [L4, L5]
    abc_type: A
    purpose_zh: "抬頭游蛙式訓練手臂快速前推的速度感（非正確姿勢，純訓練用）"
    how_to:
      - "抬頭游蛙式、眼睛看池末"
      - "回手時把雙手往水面上掃過、盡快往前刺出（此練習允許手過水面，平常蛙式回手在水面下）"
      - "強調內撇與前刺的速度與力量感（註：抬頭不是正式蛙式姿勢，僅此練習用）"
    perception_goal: "感覺手臂如射出般快速前推；感受內划加速和射手的動量"
    success_signal: "手臂前推非常快速；感覺到「射出」的動量"
    failure_signal: "手臂前推緩慢；沒有加速感"
    deficiency_fixes: [5]
    source: "There's a Drill for That"

  - id: Br26
    name_en: "Breaststroke with a Snorkel"
    name_zh: "戴呼吸管游蛙式"
    strokes: [breaststroke]
    category: arm
    equipment: [snorkel]
    l_target: [L2, L3]
