    deficiency_fixes: [1, 3]
    source: "There's a Drill for That"

  - id: Br29
    name_en: "Up-Down Combos"
    name_zh: "正仰面組合"
    strokes: [breaststroke]
    category: timing
    equipment: []
    l_target: [L4]
