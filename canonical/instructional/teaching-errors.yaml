# ============================================================
# Canonical 知識結構 — 教學誤區（Instructional / teaching-errors）
# ------------------------------------------------------------
# 單一真相來源。my-site 讀 public 層；swim-coach 讀 diagnostic 層。
# 來源散文（已過研究查證 2026-04-17）：
#   TheVortexProject/Instructional/{各式}教學誤區深探.md
#
# 每條誤區兩層：
#   public:     公開網站呈現。誤區描述 / 物理理由 / 文獻 / 正確觀念 / 對水感影響。
#   diagnostic: 教練判讀（A/B/C 三型對應），不公開，sync 時剝離。
#
# 收錄標準：教練「主動這樣教」的口令或觀念（非選手自然犯錯）。
# 確定性：🔵推導 🟢近期文獻 🟡舊文獻 🟠教練觀測 🔴待查
# ============================================================

domain: instructional
sub: teaching-errors
schema_version: 1
source_repos:
  - TheVortexProject/Instructional/自由式教學誤區深探.md

categories:
  - {key: recovery,  name_zh: 回臂}
  - {key: entry,     name_zh: 入水}
