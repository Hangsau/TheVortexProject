# ============================================================
# Canonical 知識結構 — 週期化領域 / 年度計畫結構（Periodization / Annual Plan Structure）
# ------------------------------------------------------------
# 單一真相來源 (single source of truth)。
# my-site (網站) 讀 public 層作 vortex 呈現（含 plain_zh 白話）；
# swim-coach (教練 app) 經 build_knowledge_index 收進 L1 FTS，課表生成時反查。
#
# 定位（重要）：週期化不是一套定論，而是幾派互相辯論的框架。本檔不把 Bompa 當真理，
#   而是把它當「歷史最久、最常被當教科書的一派」，與板塊派（Issurin）、極化派（Seiler）、
#   游泳能量系統派（Olbrecht）、反向週期化（Sweetenham）並陳，由 schools_overview 節點
#   提供地圖＋作者綜合立場。各 Bompa 節點帶 *_dialogue_zh 欄位指向競爭觀點。
#
# 來源（多派）：
#  A. 傳統線性框架——Tudor O. Bompa & Carlo A. Buzzichelli,
#     《Periodization: Theory and Methodology of Training》(6th ed., Human Kinetics)
#     - resources/books/Periodization__Theory_and_Methodology_of_Training/
#     章節對照：Ch5 生物運動能力週期化 / Ch7 訓練週期 / Ch8 年度計畫週期化
#     正文檔：11_/13_/14_Summary_of_Major_Concepts.md（注意：Chapter_X.md 僅含參考文獻）
#  B. 板塊週期化——Issurin 2008/2010/2016/2019（PMID 18212712/26573916/30411234；Breil meta PMID 31802956）
#     → school_block 節點；殘留效應、序列集中、對傳統線性的批評
#  C. 游泳專項外部文獻（每個數字可反查 PMID/PMC）：
#     - Hellard et al. 2019（PMC6470949，菁英游泳年度結構：2–4 macrocycle/年、~15週、86–90%量於≤4mmol）
#     - González-Ravé et al. 2022（PMID 36247944，400IM 個案 n=1：3 macrocycle/52週、24–90 km/週）
#     - Almeida et al. 2022（PMC9536385，400IM 世界級個案，傳統三巨集週期，板塊對照基準）
#     - Swimming Canada LTAD 分齡（與 ADM 階段一致）
#     - windows of trainability 爭議：Ford et al. 2011（PMID 21259156）+ van Hooren & De Ste Croix 2020
#  研究筆記：Research/週期化/（Issurin / Seiler / Olbrecht / Sweetenham 四份一手整理）
#
# 每筆參數帶：
#   cert:     確定性標記（見下）
#   source:   章節 / 表格 / PMID 溯源（每個數字必須能反查，不得 LLM 發明）
#   plain_zh: Claude 的白話說法——給學員/家長/教練讀
#   swim_application: 游泳應用（從 Bompa 框架推導標 🔵；游泳文獻既有值標 🟢）
#
# 跨 domain 互連用 links（指向既有 canonical 的穩定 ID）：
#   development_stages: → development/matrix.yaml stages[].key（l2t/t2t/t2c/t2w）
#   → 這是 ADM 年度計畫骨幹整合點：ADM T2W 格已寫「48 週年計畫 / 一年兩巔峰」，
#     即 bi-cycle；本檔提供其週期化理論背景。
#
# 確定性：🔵推導 🟢近期文獻 🟡舊文獻（週期化基礎理論，數十年）🟠教練觀測 🔴待查
# ============================================================

domain: periodization
sub: structure
schema_version: 1
source_repos:
  - resources/books/Periodization__Theory_and_Methodology_of_Training/

# ── 三大階段（每個年度計畫至少 3 階段）──
phases:
  - key: preparatory
    name_zh: 準備期
    name_en: Preparatory
    cert: 🟡
    source: "Ch5 Periodization Terminology; Ch8 Phases"
    purpose_zh: "建立表現的生理基礎；準備期不足則競賽期表現無法最大化"
    plain_zh: "準備期＝打底的階段。先把體能基礎建起來，這段練得不夠，後面比賽就拉不出好成績。前半段練得廣、雜一點，後半段越來越專項。"
    subphases:
      - key: general
        name_zh: 一般準備
        cert: 🟡
        source: "Ch8"
        share_of_prep: "25–33% of 準備期"
        intensity_cap: "≤40% of 總量"
        endurance_aerobic_share: "耐力運動 70–80% aerobic"
        focus_zh: "用多元非專項與專項方法建立生理基礎"
      - key: specific
        name_zh: 專項準備
        cert: 🟡
        source: "Ch8"
        sport_specific_share: "70–80% sport-specific work"
        focus_zh: "用專項模態發展項目所需特性"
  - key: competitive
    name_zh: 競賽期
    name_en: Competitive
    cert: 🟡
    source: "Ch5; Ch8"
    purpose_zh: "表現能力最大化；維持 90% 專項 / 10% 非專項"
    plain_zh: "競賽期＝把表現拉到最高的階段，幾乎全部練專項（90%）。正式比賽都在這段，主賽前面接減量（taper）。"
    subphases:
      - {key: precompetitive, name_zh: 賽前, cert: 🟡, source: "Ch8", note_zh: "通常僅熱身賽 / 展示賽"}
      - {key: main_competitive, name_zh: 主競賽, cert: 🟡, source: "Ch8", note_zh: "所有正式比賽；主賽前接 unloading/taper + special preparation 子階段"}
  - key: transition
    name_zh: 過渡期
    name_en: Transition
    cert: 🟡
    source: "Ch8 Transition Phase"
    duration_weeks: {min: 2, max: 4, extended_max: 6, note: "一般 2–4 週，年輕運動員可延至 6 週，正常不超過 6 週"}
    maintain_fitness: "維持 40–50% 競賽期一般體能"
    purpose_zh: "移除疲勞、心理放鬆、生物再生；用主動休息(active rest)而非完全停練"
    warning_zh: "非 off-season；完全停練 <4 週即顯著 detraining（見 detraining 安全表）"
    plain_zh: "過渡期＝賽季結束後的休整，但不是完全躺平。重點是消疲勞、心理放鬆，用『主動休息』（輕量活動）取代完全停練。完全不動超過 4 週，體能就明顯掉了（見下面 detraining 表）。"

# ── 年度計畫類型（Table 5.1 週數分配 + Ch8 分類；Ch5 Selective 適用對象）──
# 全部 🟡（Bompa Table 5.1 / Ch8 直接文本）；swim_application 為 🔵 推導
annual_plan_types:
  - id: periodization.structure.annual.monocycle
    key: monocycle
    name_zh: 單週期
    name_en: Monocycle
    cert: 🟡
    source: "Ch5 Table 5.1; Ch8 Classifying Annual Plans (Fig 8.4/8.5)"
    total_weeks: 52
    peaks: 1
    weeks: {preparatory: {min: 28, max: null, note: "≥28"}, competitive: {min: 12, max: 22}, transition: {min: 4, max: 4}}
    suited_for_zh: "新手 / 青少年；季節性運動；耐力主導項目（北歐滑雪、划船、自行車、長跑）"
    swim_application_zh: "🔵 游泳本質高度有氧，耐力型 monocycle（Fig 8.5）體積曲線需全程維持高；適合泳齡尚淺、單一目標賽季的泳者"
    plain_zh: "一年只衝一個高峰。整年（52 週）裡準備期最長（≥28 週），最後對準一場大賽。適合新手、青少年、泳齡還淺、一年只有一個重要目標的泳者。"
    links: {development_stages: [l2t, t2t]}
  - id: periodization.structure.annual.bicycle
    key: bi-cycle
    name_zh: 雙週期
    name_en: Bi-cycle
    cert: 🟡
    source: "Ch5 Table 5.1; Ch8 (Fig 8.6); Ch5 Fig 5.11 (游泳 200m 範例)"
    total_weeks: 26
    peaks: 2
    weeks: {preparatory: {min: 12, max: 16}, competitive: {min: 6, max: 12}, transition: {min: 1, max: 4}}
    structure_note_zh: "兩個短 monocycle 以極短 unloading/transition 相連；準備期1體積遠大於準備期2；競賽期2目標年度最重要賽事"
    suited_for_zh: "進階 / 菁英；可達全國錦標資格者"
    swim_application_zh: "🔵 競技泳者原型年計畫——Bompa Fig 5.11 即『游泳 200m bi-cycle（冬季 + 夏季全國錦標）』；對映 ADM T2W『一年兩巔峰（春季選拔 + 夏季國際賽）』"
    plain_zh: "一年衝兩個高峰（如冬季＋夏季兩場大賽）。等於把一年切成兩個短的單週期接起來。這是競技泳者最典型的年計畫——Bompa 書裡舉的例子剛好就是游泳 200m。對應 ADM T2W 階段的『一年兩巔峰』。"
    links: {development_stages: [t2c, t2w]}
  - id: periodization.structure.annual.tricycle
    key: tri-cycle
    name_zh: 三週期
    name_en: Tri-cycle
    cert: 🟡
    source: "Ch5 Table 5.1; Ch8 (Fig 8.7)"
    peaks: 3
    weeks_note_zh: "三段分別約 20–24(冬)/16–18(春夏)/4–6(夏)；準備期 12–20/10–12/2–4；競賽期 4–6/8–12/2–4；過渡期 1–2/1–2/3–6"
    structure_note_zh: "首準備期最長（含一般準備子階段）；最重要賽事置於第三 cycle；通常僅進階運動員使用"
    suited_for_zh: "進階 / 國際級（冬季錦標 + 夏季全國 + 世錦/奧運）"
    swim_application_zh: "🔵 高水準泳者多目標賽季；ADM T2W 終身競技階段可演進至此"
    plain_zh: "一年衝三個高峰（如冬季錦標＋夏季全國＋世錦/奧運）。最重要那場放在第三段。只有高水準、能撐密集賽季的泳者才用。"
    links: {development_stages: [t2w]}
  - id: periodization.structure.annual.multipeak
    key: multipeak
    name_zh: 多巔峰
    name_en: Multiple-peak
    cert: 🟡
    source: "Ch5 Table 5.1; Ch5 Selective Periodization; Ch8 (Fig 8.8)"
    weeks: {per_cycle: {min: 11, max: 16}, preparatory: {min: 9, max: 12}, competitive: {min: 1, max: 2}, transition: {min: 1, max: 2}}
    structure_note_zh: "週數少、準備期明顯短；僅適合 4–6 年訓練底、高運動能力、能承受密集賽事者（如網球）"
    suited_for_zh: "資深運動員（4–6 年訓練背景）；不建議青少年（易多重傷害）"
    swim_application_zh: "🔵 游泳少用純 multipeak；僅適用賽事極密集的職業 / 系列賽泳者"
    plain_zh: "一年衝很多個高峰（賽事極密集時用）。準備期被壓很短，風險高——要有 4–6 年訓練底子才扛得住。青少年不建議，容易受傷。游泳很少用。"
    links: {development_stages: []}

# ── 中觀週期 Macrocycle（Ch7）──
macrocycle:
  id: periodization.structure.macrocycle
  cert: 🟡
  source: "Ch7 Planning Training Cycles"
  duration_weeks: {min: 2, max: 6, prep_macrocycle: {min: 4, max: 7}}
  loading_patterns:
    - {ratio: "3:1", cert: 🟡, note_zh: "最常見（probably the most common）；契合身體自然生物節律", default: true}
    - {ratio: "4:1", cert: 🟡, note_zh: "早期準備期"}
    - {ratio: "2:1", cert: 🟡, note_zh: "爆發專項準備"}
    - {ratio: "2:2 / 1:1", cert: 🟡, note_zh: "競賽期"}
    - {ratio: "3:2", cert: 🟡, note_zh: "高疲勞時"}
  swim_application_zh: "🔵 游泳週課表結構基礎：3 個負荷週 + 1 個 unloading 週為預設；高疲勞泳者改 3:2"
  plain_zh: "Macrocycle＝由幾個週組成的中型週期（2–6 週）。最常見的節奏是『3:1』——練 3 個漸增負荷的週，接 1 個減量恢復週。這契合身體自然的疲勞—恢復節律。泳者特別累時改 3:2（多一週恢復）。"
  block_dialogue_zh: "🟡 對話（板塊派 Issurin）：3:1 是『以時間切恢復』，板塊派改成『以殘留效應切換訓練焦點』——某能力的適應停練後能撐多久，就決定下一塊何時換。例如最大速度殘留只 ~5 天、有氧耐力 ~30 天（見 school_block 節點），所以速度要頻繁刺激、有氧可暫放。兩者不互斥：3:1 管的是『一塊之內的疲勞節律』，殘留效應管的是『塊與塊之間練什麼』。"
  links: {development_stages: [t2t, t2c, t2w]}

# ── 微觀週期 Microcycle（Ch7）──
microcycle:
  id: periodization.structure.microcycle
  cert: 🟡
  source: "Ch7 Planning Training Cycles (Table 7.1 強度分區見 zones.yaml)"
  duration: "1 週"
  classifications:
    - {key: developmental, name_zh: 發展型, cert: 🟡}
    - {key: competition, name_zh: 競賽型, cert: 🟡, note_zh: "賽前 3–5 天達峰"}
    - {key: recovery_regen, name_zh: 恢復再生型, cert: 🟡}
    - {key: peaking_unloading, name_zh: 達峰/卸載型, cert: 🟡, note_zh: "體積降 ≥50%、強度降 5–10%"}
  swim_application_zh: "🔵 週為游泳課表最小規劃單位；unloading 微週期用於賽前與 macrocycle 銜接"
  plain_zh: "Microcycle＝一週，是排課表的最小單位。一週有不同類型：發展型（往上堆）、競賽型（賽前 3–5 天達峰）、恢復型、卸載型（量砍一半以上）。游泳就以『週』為單位排課。"
  links: {development_stages: [t2t, t2c, t2w]}

# ── Detraining 安全表（Ch8 Table 8.2 / Mujika & Padilla 2000）──
# swim-coach 排休賽期 / 受傷停練課表的關鍵安全參數
detraining:
  id: periodization.structure.detraining
  cert: 🟢
  source: "Ch8 Table 8.2; Mujika & Padilla 2000"
  vo2max_loss:
    - {days: 4, loss: "4%"}
    - {weeks: 3, loss: "7%"}
    - {weeks: 4, loss: "14%"}
    - {weeks: 8, loss: "20%"}
  strength_power_loss_zh: "4 週完全停力量訓練：最大肌力降 6–10%、最大功率降 14–17%；菁英運動員衰退更快"
  endurance_perf_loss_zh: "短期(<4週)停練：力竭時間降 4–25%"
  reversible_note_zh: "短時間恢復訓練可逆轉；完全停練 <4 週即顯著 detraining → 過渡期務必 active rest"
  swim_application_zh: "🔵 游泳排賽季間休 / 傷停課表時，過渡期 >4 週需保留低量 active rest 以免 VO2max 大幅流失"
  plain_zh: "完全停練掉得有多快？最大攝氧量：停 4 天掉 4%、停 4 週掉 14%、停 8 週掉 20%。力量也類似（停 4 週最大肌力掉 6–10%）。好消息是這些可以練回來。實務結論：休季或受傷時也別完全躺平，保留一點輕量活動，體能才不會崩。"
  links: {development_stages: [t2c, t2w]}

# ── 游泳年度結構（外部文獻，🟢）──
# 菁英游泳實證的年度 macrocycle 數量、長度、強度分布
swim_annual_structure:
  id: periodization.structure.swim_annual
  cert: 🟢
  source: "Hellard et al. 2019 (PMC6470949); González-Ravé et al. 2022 (PMID 36247944, n=1)"
  macrocycles_per_year: "2–4（菁英游泳常見；Hellard 2019）"
  macrocycle_length_weeks: "≈15 週/macrocycle（Hellard 2019）"
  low_intensity_volume_share: "86–90% 訓練量落在 ≤4 mmol（低強度為主，Hellard 2019）"
  case_400im_zh: "🟢 400m 個人混合式單一菁英個案（n=1，González-Ravé 2022）：52 週分 3 個 macrocycle，週量在 24–90 km 間波動"
  caution_zh: "🔴 不收『60–80 km/週、9–10 課/週』這類距離選手週量——屬未經查證的網路共識，無原始文獻"
  plain_zh: "菁英游泳的年度結構長怎樣（有實證的）：一年大概切 2–4 個中週期（每個約 15 週）。最反直覺的數字——高達 86–90% 的訓練量是低強度（血乳酸 ≤4），不是整天操高強度。有一個 400 混合式選手的個案，全年 52 週分 3 段，週泳量在 24–90 km 間起伏（這是單一個案，不是通則）。"
  links: {development_stages: [t2c, t2w]}

# ── 青少年分齡週期化 / LTAD（外部文獻，含爭議標記）──
# 對齊 ADM development stages；windows of trainability 必須標 contested
swim_youth_ltad:
  id: periodization.structure.swim_youth_ltad
  cert: 🟢
  source: "Swimming Canada LTAD 分齡; PHV 文獻; Ford et al. 2011 (PMID 21259156); van Hooren & De Ste Croix 2020"
  stage_ages_zh: "Swimming Canada 分齡（與 ADM 對齊）：學習訓練 L2T 女 8–11/男 9–12；訓練為訓練 T2T 女 11–15/男 12–16；訓練為競賽 T2C 女 15–21/男 16–23；訓練為勝利 T2W 女 18+/男 19+"
  phv_zh: "生長陡增高峰 PHV：女 ≈12.5 歲、男 ≈14 歲（平均值，個體差異大）"
  windows_of_trainability_contested: true
  windows_note_zh: "⚠️ contested：『trainability 關鍵窗口』（某些素質在特定年齡有黃金訓練期）是有爭議的概念。Ford et al. 2011（PMID 21259156）與 van Hooren & De Ste Croix 2020 批判其缺乏可靠實證。引用時必須標明爭議，不可當定論。"
  caution_zh: "🔴 不收分齡 km/週對照表——查無 Swimming Canada 原始數據表；T:C（訓練比賽比）60:40/50:50/25:75 僅 Balyi 二手轉述，標弱不入正文"
  plain_zh: "青少年怎麼分齡練（對齊 ADM 階段）：大致按年齡分學習訓練→訓練為訓練→訓練為競賽→訓練為勝利。生長陡增高峰（長最快的時候）女生約 12.5 歲、男生約 14 歲，可作排訓練的參考。但要特別小心一個流行說法——『某些能力有黃金訓練窗口、錯過就補不回』，這在學界是有爭議的（Ford 2011 等批判它證據不足）。家長和教練別把它當鐵律，以免硬逼小孩在特定年齡猛練某項。"
  links: {development_stages: [l2t, t2t, t2c, t2w]}

# ── 週期化多派概覽：把「Bompa＝真理」改成「一派之言」（🔵 作者綜合）──
# 本節是整個週期化模組的重新定位入口：週期化不是一套定論，而是幾套互相辯論的框架。
# Bompa（傳統線性）只是其中歷史最久、最常被當教科書的一派；板塊派、極化派、
# 游泳專項實證各自有不同的核心問題與適用對象。本節提供地圖 + 作者立場。
schools_overview:
  id: periodization.structure.schools_overview
  cert: 🔵
  source: "作者綜合：Bompa & Buzzichelli 6th ed.；Issurin 2008/2010/2016；Seiler 2010；Olbrecht 2000；Sweetenham & Atkinson 2003；Hellard 2019"
  premise_zh: "週期化不是一套被證明的定論，而是幾套互相辯論的框架。它們問的問題不同、適用的對象不同——把任何一派當『標準答案』都是誤讀。"
  schools:
    - {key: traditional, name_zh: 傳統線性（Bompa/Matveyev）, core_q_zh: "一年怎麼分準備/競賽/過渡，讓表現在大賽達峰？", strength_zh: "結構清晰、教學完整、對新手與單一賽季最穩", weakness_zh: "對菁英多峰賽季僵硬；並行練多能力對高水準者效率下降", cert: 🟡}
    - {key: block, name_zh: 板塊集中（Issurin）, core_q_zh: "高水準者無法同時練好所有能力，那要按什麼順序集中練？", strength_zh: "用殘留效應科學決定換塊時機；適合菁英、多峰", weakness_zh: "殘留效應個體差異大；術語邊界模糊；初中級者不需要", cert: 🟡}
    - {key: polarized, name_zh: 極化分布（Seiler/TID）, core_q_zh: "每個強度區各應占多少比例？", strength_zh: "從菁英真實行為歸納；80/20 有 RCT 支持（Stöggl 2014）", weakness_zh: "只有單一 RCT；游泳實證其實金字塔型更常見（Crowley 2021）", cert: 🟢}
    - {key: swim_energy, name_zh: 能量系統個體化（Olbrecht）, core_q_zh: "有氧/無氧不是越大越好，怎麼找到最適組合？", strength_zh: "捨棄通用閾值、改個體乳酸測試；解釋『閾值進步但成績沒進步』", weakness_zh: "需實驗室乳酸測試支援；原書處方數字不可及", cert: 🟡}
    - {key: swim_reverse, name_zh: 反向週期化（Sweetenham）, core_q_zh: "速度該放賽季末，還是當全季的校準錨？", strength_zh: "速度先行、技術不被疲勞固化；現場可操作（BBM＋benchmark）", weakness_zh: "原書五法則/具體數字網路不可查；非 RCT，靠成績佐證", cert: 🟢}
  reader_questions_zh:
    - "Q1 我（或我的學員）是新手還是菁英？——新手用傳統線性就夠，菁英才需要板塊/極化的精細化。"
    - "Q2 這一季要衝幾個高峰？——一個峰選單週期；多個峰板塊派更靈活。"
    - "Q3 各強度該怎麼分配？——這是極化/TID 派的問題，不是 Bompa 的問題。"
    - "Q4 我能不能同時練多項能力？——傳統派說能（調比例），板塊派說菁英不能（要序列化）。"
    - "Q5 換訓練焦點的時機怎麼定？——傳統派看疲勞節律（3:1），板塊派看殘留效應天數。"
    - "Q6 閾值訓練到底要不要大量練？——Bompa 當主力，Olbrecht/Seiler 都質疑（魔法子彈謬誤／避開中間區）。"
    - "Q7 速度訓練放哪？——傳統派放賽季末，Sweetenham 放全季當校準錨。"
    - "Q8 我的距離項目偏有氧還是無氧？——決定 TID 型態與能量系統側重（見 zones）。"
    - "Q9 怎麼知道訓練有沒有效？——benchmark/階梯測試/乳酸曲線，不是只看課表跑完。"
    - "Q10 青少年和成年人練法一樣嗎？——不一樣；分齡發展是各派都同意要區分的。"
    - "Q11 減量怎麼安排？——這是相對成熟、各派分歧最小的一塊（見 taper）。"
  author_synthesis_zh: "🔵 作者立場：這幾派不是『誰對誰錯』，是『不同問題的答案』。實務上我傾向——(1) 結構骨架用傳統線性（清楚、好教）；(2) 菁英換焦點時機參考板塊派的殘留效應；(3) 強度分配吸收極化派的『大量低強度＋少量高強度、慎用中間區』，但承認游泳金字塔型也常見、不教條化；(4) 評估診斷學 Olbrecht 的個體化測試精神（即使沒有實驗室，也別套通用百分比）；(5) 速度當全季校準錨（Sweetenham），不留到賽季末才碰。這是綜合判斷，不是文獻定論，故標 🔵。"
  plain_zh: "週期化不是一本標準答案，而是幾派人在吵架。Bompa 那套（傳統線性：分準備期/競賽期/過渡期）只是歷史最久、最常被當教科書的一派，不等於唯一真理。另外幾派各問不同的問題：板塊派（Issurin）問『菁英不能什麼都同時練，那該按什麼順序集中練』；極化派（Seiler）問『各強度該占幾成』；Olbrecht 問『有氧無氧不是越大越好，怎麼配到最適』；Sweetenham 問『速度該放賽季末還是當全季的校準錨』。先搞清楚你要回答哪個問題（看上面 Q1–Q11），再決定參考哪一派——不要把任何一派當鐵律。"
  links: {development_stages: [l2t, t2t, t2c, t2w]}

# ── 板塊週期化（Issurin，🟡）──
# 與傳統線性對話的第一個框架：序列集中 vs 並行發展；殘留效應決定換塊時機。
school_block:
  id: periodization.structure.school_block
  cert: 🟡
  source: "Issurin 2008《Block Periodization》; Issurin 2008 (PMID 18212712); 2010 (DOI 10.2165/11319770); 2016 (PMID 26573916); 2019 (PMID 30411234); Breil 2019 meta (PMID 31802956)"
  core_mechanism_zh: "板塊派的根本主張：高水準運動員無法在同一階段同時有效提升所有能力，因為許多訓練刺激彼此不相容（有氧 AMPK 路徑 vs 肌力 mTOR 路徑拮抗），會產生衝突反應。解法是『序列集中』——一次只把高度集中的負荷指向極少數相容能力，靠前一塊的殘留效應保住已得適應。"
  residual_effects:
    - {ability_zh: 有氧耐力, days: "30 ± 5", cert: 🟡}
    - {ability_zh: 最大肌力, days: "30 ± 5", cert: 🟡}
    - {ability_zh: 無氧糖解耐力, days: "18 ± 4", cert: 🟡}
    - {ability_zh: 肌力耐力, days: "15 ± 5", cert: 🟡}
    - {ability_zh: 最大速度（磷酸原）, days: "5 ± 3", cert: 🟡}
  residual_caveat_zh: "🔴 上述天數在教練界廣泛流通（引自 Issurin 2008 書，據轉引為 Table 2.4），但『± N 天』的原始統計依據（實驗數據還是專家估計）、確切頁碼、方法論細節無法追溯至一手來源。使用時必須加注『原始方法論待核』。"
  block_structure:
    - {key: accumulation, name_zh: 累積板塊, focus_zh: "建立一般耐力、基礎肌力、協調的訓練儲備（基礎能力）", load_zh: "強度低中、量大", weeks: "≈3–6（🔴 精確範圍待核）"}
    - {key: transmutation, name_zh: 轉化板塊, focus_zh: "把基礎儲備轉化為專項能力（專項耐力、爆發力、賽事技術）", load_zh: "強度高、量中、消耗最大", weeks: "≈2–4（🔴 待核）"}
    - {key: realization, name_zh: 實現板塊, focus_zh: "完全恢復、最大速度、賽事戰術，以比賽/測驗收尾", load_zh: "強度極高、量最小", weeks: "≈1–2（🔴 待核）"}
  full_stage_weeks: "一個完整『累積→轉化→實現』序列構成一個訓練階段，典型 8–12 週；多階段疊加可靈活安排多峰"
  critique_of_traditional_zh: "🟡 對傳統線性（Bompa/Matveyev）的三點批評（Issurin 2010）：(1) 長準備期→競賽期結構難產生現代賽季要求的多峰；(2) 長期混合訓練對已高度適應的菁英進步率遞減（刺激太分散）；(3) 不相容負荷同時練會互相干擾。核心張力：菁英能否從混合訓練持續受益——Bompa 說能（調比例），Issurin 說不能（要序列化高集中負荷）。"
  swim_link_zh: "🟠 游泳早期應用：蘇聯教練 Koshkin 為三屆奧運冠軍 Salnikov 設計 10 週板塊系統（速度技術／肌力／有氧／減量比賽序列）。🔴 此案例廣見於教學材料但一手出處待核。當代游泳文獻多採『傳統模型＋強度分布分析』，較少嚴格依循板塊架構，但『階段專注』概念已廣泛影響備賽設計（對照 Almeida 2022, PMC9536385，400IM 世界級個案採傳統三巨集週期）。"
  limitations_zh: "🟢 學界批評：(1) 殘留效應個體差異大，平均值±SD 難直接套用；(2) 證據基礎有限——Breil 2019 meta（PMID 31802956）證實板塊在 VO2max/最大功率有優越表現，但研究數量少、受試多為高水準耐力選手；(3) 累積/轉化/實現的邊界操作上不夠清晰，教練詮釋差異大。不適合初中級者（達超補償只需 2–3 課，不需長期集中負荷策略）。"
  author_note_zh: "🔵 作者取用：板塊派最值得吸收的不是整套換掉 Bompa，而是『換訓練焦點時用殘留效應當依據』這個操作原則——尤其菁英多峰賽季，比死守 3:1 時間節律更貼生理。但殘留天數要當『量級參考』不是『精確處方』（個體差異＋原始方法論待核）。"
  plain_zh: "板塊週期化（Issurin）跟 Bompa 最大的不同：Bompa 主張準備期可以同時把很多能力一起練；Issurin 說高水準選手做不到——很多訓練刺激會互相打架（大量有氧會干擾長肌力），所以要『一次只集中練一兩項』，按順序排。怎麼決定何時換下一項？看『殘留效應』——某能力停練後能撐多久：有氧耐力、最大肌力約撐 30 天，無氧糖解約 18 天，最大速度只撐 ~5 天。所以速度要常常練、有氧可以先放一陣子。一個完整週期（累積→轉化→實現）約 8–12 週。注意：這套是為菁英設計的，新手用不到；那些殘留天數是廣為流傳的參考值，原始實驗依據其實沒查到，別當精確處方。"
  links: {development_stages: [t2c, t2w]}

# ── 感知—週期化橋接（Vortex 命題接點，🔴 作者假設，非事實）──
# 誠實標記：目前週期化模組與 Vortex『水感知為核心』命題是脫節的。本節不假裝已接通，
# 只老實寫出缺口、假設、為何重要、與目前狀態。這是研究空白，不是定論。
perception_periodization_bridge:
  id: periodization.structure.perception_periodization_bridge
  cert: 🔴
  source: "作者假設（Vortex 核心命題 × 週期化）；目前無直接文獻支持此接點"
  gap_zh: "目前的週期化內容（量、強度、能量系統、減量）全部講『生理負荷』，完全沒接到 Vortex 的核心命題『所有游泳技術都建立在水感知上』。兩者像兩套平行系統。"
  hypothesis_zh: "🔴 作者假設：感知穩定度本身可能是一個該被週期化的變項。疲勞會讓動作退回『感知真正穩定的地方』（CLAUDE.md 核心命題），那麼高量/高疲勞的訓練塊理論上會壓低感知品質——若成立，則(1) 大量低強度有氧塊可能正是『鞏固感知』的窗口（低疲勞、可專注感覺）；(2) 高強度/減量前的疲勞峰可能是感知最脆弱、最不該導入新技術的時機；(3) Sweetenham『速度先行、別讓疲勞固化壞技術』與此假設方向一致。"
  why_it_matters_zh: "若這個接點成立，週期化模組就不只是『排生理負荷』，而能回答 Vortex 真正關心的問題：在年度計畫的哪個階段、哪種疲勞狀態下，最適合建立 vs 鞏固 vs 不該碰感知技術。這會讓週期化從『借來的通用理論』變成『服務水感知命題的工具』。"
  status_zh: "🔴 純假設，未驗證。沒有文獻直接研究『感知品質的週期化』。列出此缺口是為了誠實標記研究方向，不是宣稱已解決。後續需：(1) 把『感知穩定度』操作化為可觀測指標；(2) 在 Observations/ 層累積疲勞 vs 感知退化的教學案例；(3) 才談得上驗證。"
  plain_zh: "老實說一個缺口：現在整個週期化在講的是『練多少量、什麼強度、怎麼減量』，但 Vortex 整個專案的核心是『水感知』——這兩件事目前是脫節的。一個還沒驗證的假設是：感知本身可能也該被週期化。疲勞會讓動作退回感知真正穩的地方，所以大量輕鬆游的階段可能正好適合鞏固感覺，而賽前最累的時候最不該硬塞新技術。Sweetenham『別讓疲勞把壞技術練成習慣』剛好呼應這點。但這只是假設（標 🔴），沒有文獻支持，寫出來是為了標清楚研究方向，不是說已經想通了。"
  links: {development_stages: [l2t, t2t, t2c, t2w]}
