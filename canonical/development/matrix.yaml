# ============================================================
# Canonical 知識結構 — 發展領域 / 運動員發展矩陣（Development / ADM Matrix）
# ------------------------------------------------------------
# 單一真相來源 (single source of truth)。
# my-site (網站) 讀 public 層；swim-coach (教練 app) 讀 diagnostic 層。
#
# 來源：Swimming Canada Athlete Development Matrix (ADM)
#   - Higgs, Way & Harber (2019) 框架
#   - resources/books/Athlete-development-matrix/swimming_canada_ADM_complete.md
#   收編前散落於 my-site/data/adm/matrix.yaml 與 swim-coach/rules/ltad_stages.yaml；
#   本檔成立後兩者退役為下游衍生物（sync 產生，不再各自手抄）。
#
# 矩陣：支柱（pillars 欄）× 發展階段（stages 列）× 格（cell 發展內容）
#
# 每格兩層（按範疇，不按難易）：
#   public:     公開呈現。該支柱在該階段「要發展什麼」。週期化 / 訓練處方屬正當
#               的 prescriptive，全進 public。
#   diagnostic: 教練判讀 + 研究用，不公開。ADM 屬發展框架，幾乎無感知判讀語，
#               原則為 null；若未來補入 A/B/C 型判讀才填。
#   → my-site 只 render public；swim-coach 教練工具讀 diagnostic。
#
# 跨 domain 互連用 links（指向既有 canonical 的穩定 ID）：
#   standards:          → development/technical-standards.yaml 的 std.* ID
#   drills:             → Drills/drills_*.yaml 的 Fr*/Bk*/Br*/Fl*/Sc* ID
#   technical_analysis: → instructional/technical-analysis.yaml 的 {stroke}.tech.N
#   l_indicators:       → technica/l-indicators.yaml 的 {stroke}.{level}.{aspect}
#   （water-sense-levels 無平面 ID，感知層級交叉引用一律走 l_indicators）
#
# 確定性：🔵推導 🟢近期文獻 🟡舊文獻 🟠教練觀測 🔴待查
# ============================================================

domain: development
sub: matrix
schema_version: 1
source_repos:
  - resources/books/Athlete-development-matrix/swimming_canada_ADM_complete.md

# ── 欄：發展支柱（4 支柱）──
pillars:
  - {key: physical,  name_zh: 體能,     icon: "⚡"}
  - {key: technical, name_zh: 技術戰術, icon: "🎯"}
  - {key: mental,    name_zh: 心理技能, icon: "🧠"}
  - {key: life,      name_zh: 生活技能, icon: "🌱"}

# ── 列：LTD 發展階段（5 階梯；矩陣格只填有內容的 4 階段，fun 階段 has_cells: false）──
# 年齡 / podium_pathway / typical_training_years 忠實搬自 swim-coach ltad_stages.yaml
# （來源：ADM §1.2/§1.3 + 標 JUDGMENT 處為教練推估）
stages:
  - key: fun
    short: FUN
    id_long: fundamentals
    name_en: "FUNdamentals"
    name_zh: 基礎樂趣
    podium_pathway: false
    age_range: {female: {min: 5, max: 8}, male: {min: 6, max: 9}}
    age_source: "ADM §各階段年齡對照 (女 5–8 歲，男 6–9 歲)"
    typical_training_years: {min: 0, max: 2}   # JUDGMENT
    competition_target: null
    has_cells: false   # FUN 階段不在發展矩陣內容範圍（matrix 自 L2T 起）

  - key: l2t
    short: L2T
    id_long: learn_to_train
    name_en: "Learn to Train"
    name_zh: 學習訓練
    podium_pathway: false
    age_range: {female: {min: 8, max: 11}, male: {min: 9, max: 12}}
    age_source: "下限：ADM §各階段年齡對照（女 8 歲；男 9 歲）。上限：JUDGMENT 推估（ADM 寫『青春期』未給數字）"
    typical_training_years: {min: 1, max: 4}   # JUDGMENT
    competition_target: "地區性 / 校際比賽 (regional / school meets)"
    has_cells: true

  - key: t2t
    short: T2T
    id_long: train_to_train
    name_en: "Train to Train"
    name_zh: 訓練為訓練
    podium_pathway: true   # Podium Pathway 起點（ADM §1.3）
    age_range: {female: {min: 11, max: 15}, male: {min: 12, max: 16}}
    age_source: "ADM §各階段年齡對照（青春期男女）+ T2C 起點反推"
    typical_training_years: {min: 3, max: 7}   # JUDGMENT
    competition_target: "全國錦標賽 (national championships)"
    has_cells: true

  - key: t2c
    short: T2C
    id_long: train_to_compete
    name_en: "Train to Compete"
    name_zh: 訓練為競賽
    podium_pathway: true
    age_range: {female: {min: 15, max: 21}, male: {min: 16, max: 23}}
    age_source: "JUDGMENT: ADM §1.3 只給定性描述（Podium Potential），未給年齡數字。此為 LTAD 慣例 placeholder，使用前須以實際選手成熟度校準"
    typical_training_years: {min: 5, max: 12}  # JUDGMENT
    competition_target: "世界盃 / Pan Pac / 國際賽 (World Cup / Pan Pac)"
    has_cells: true

  - key: t2w
    short: T2W
    id_long: train_to_win
    name_en: "Train to Win"
    name_zh: 訓練為勝利
    podium_pathway: true
    age_range: {female: {min: 18, max: null}, male: {min: 19, max: null}}
    age_source: "JUDGMENT: ADM §1.3/§1.4 只給定性描述。下限為慣例 placeholder，無上限符合 ADM『持續到生涯結束』精神"
    typical_training_years: {min: 8, max: null}  # JUDGMENT
    competition_target: "奧運 / FINA 世錦賽 (Olympics / FINA Worlds)"
    has_cells: true

# ── 格：每個 (pillar, stage) 的發展內容（16 格，pillar 內依 stage 順序）──
# public.summary / public.points 逐字搬自 my-site/data/adm/matrix.yaml（含 markdown 粗體）。
cells:

  # ════ 體能 physical ════
  - id: dev.physical.l2t
    pillar: physical
    stage: l2t
    public:
      summary: "多元體能基礎；速度與柔軟度為敏感訓練期；體重阻力；GPP 佔 80%"
      points:
        - "**速度敏感期（PSpV1）**：訓練中樞神經系統——敏捷性、快速性、分段速度（手臂與腿部）"
        - "**柔軟度**：發展主動動作幅度（ROM）；引入靜態與動態伸展（AIS）"
        - "**肌力入門**：體重阻力為主；每週 2–3 次，1–3 組，6–10 個動作；增重以 0.5–1.5 公斤遞增；典型活動：衝刺、跳躍、攀爬、伏地挺身變化式"
        - "**GPP 佔 80%**；廣泛互補性運動參與；技術優先，重複練習達到精熟"
        - "**有氧基礎**：透過各種活動延長心率提升的持續時間；建立有氧能量"
        - "**核心與姿勢**：引入深層核心呼吸與激活；適當姿勢發展；這是發展動作協調能力的高峰時期"
    diagnostic: null
    links: {standards: [], drills: [], technical_analysis: [], l_indicators: []}

  - id: dev.physical.t2t
    pillar: physical
    stage: t2t
    public:
      summary: "進入耐力與肌力可訓練窗口；開始離心負重；增強式訓練；GPP 佔 50%"
      points:
        - "**生長衝刺期（PHV）**：優先發展有氧系統；有氧訓練加速適應窗口開啟"
        - "**肌力窗口**：女性第一肌力窗口在 PHV 後立即開始；男性峰值肌力速度（PSV）在 PHV 後 12–18 個月"
        - "**第二速度窗口（PSpV2）**：無氧無乳酸速度訓練；PHV 前專注速度，PHV 後專注肌力加速度"
        - "**肌力訓練**：佔總計畫 20%；每週 2–3 次（隔天訓練，至少一天恢復）；引入增強式訓練（Plyometrics）"
        - "**GPP 佔 50%**；系統性核心訓練（深層核心呼吸、激活）；引入自我監控與個人記錄保存"
        - "**柔軟度**：動態活動性練習為主（生長衝刺與肌肉緊繃相關）；靜態伸展在活動後進行"
    diagnostic: null
    links: {standards: [], drills: [], technical_analysis: [], l_indicators: []}

  - id: dev.physical.t2c
    pillar: physical
    stage: t2c
    public:
      summary: "個別化體能強化；70% 1RM 肌力訓練；高強度增強式；GPP 佔 35%"
      points:
        - "**個別化訓練**：根據 PHV 後評估；女性第二肌力窗口在初次月經開始時"
        - "**肌力訓練**：70% 1RM 產生最大發展速度；每週 3 次，每個部位 1 個動作（3–4 組，8–12 下）；能以良好技術連續完成 12 下時可增加負重"
        - "**GPP 佔 35%**；高強度增強式訓練；調整體型以促進前進推力並最小化阻力"
        - "**有氧能量**：根據測試結果與比賽需求個別化訓練"
        - "**柔軟度**：維持 ROM；每週 2–3 次 AIS 訓練（含瑜伽）；專注肩膀與髖部；監控左右差異"
        - "**嚴格測試與監控**：動作處方與表現監控；淡季增益，競賽季維持"
    diagnostic: null
    links: {standards: [], drills: [], technical_analysis: [], l_indicators: []}

  - id: dev.physical.t2w
    pillar: physical
    stage: t2w
    public:
      summary: "完全個別化；世界級標準監控；48 週年度計畫；兩次巔峰週期"
      points:
        - "**肌力訓練**：50–80% 1RM；每週 3 次，每個部位 2 個動作，4–6 組 10 下；深蹲等可用高達 90% 1RM（每組 1–2 下，最多 2 組）"
        - "**完全個別化**：嚴格測試、動作處方與監控，以達到或超越世界級標準；淡季專注增益，競賽季維持"
        - "**年度計畫**：遵循 48 週以上年度訓練計畫；一年兩次巔峰（春季選拔 + 夏季國際賽）"
        - "**有氧能量**：優化並在重要賽事達到顛峰；其他比賽視為賽季中訓練，用於練習競賽策略"
        - "**體重訓練**：創意使用部分體重訓練，特別是對有非對稱性的運動員"
        - "**柔軟度**：維持 ROM；監控活動度（左右差異）；加入必要的動作幅度計畫"
    diagnostic: null
    links: {standards: [], drills: [], technical_analysis: [], l_indicators: []}

  # ════ 技術戰術 technical ════
  - id: dev.technical.l2t
    pillar: technical
    stage: l2t
    public:
      summary: "四式基礎；起跳轉身入門；廣泛多項運動；動作技能自動化"
      points:
        - "**四式發展**：持續精進各泳式技能；引入四種泳式的踢腿（含水下蝶式踢）；發展 200 IM；計算每池長划水次數，建立一致性"
        - "**水感**：對手臂、腿部划水時的水感有更細緻感知；能辨識身體對位不良造成的阻力增加"
        - "**起跳**：從起跳台向上向外推，乾淨入水；發展強力蹬牆"
        - "**轉身**：在正確距離啟動轉身；腿部彎曲接觸牆面；能強力垂直蹬出；在規則允許範圍內起跳與轉身後進行水下蝶式踢"
        - "**基本動作技能**：敏捷性、平衡感、協調性達運動專項水準；廣泛多項運動參與"
        - "**技能自動化**：從需要專注的動作計畫，過渡至可靠、自動化執行；技術發展的關鍵時期"
    diagnostic: null
    links:
      standards: []
      drills: [Fr1, Fr2, Fr3, Fr5, Fr7, Bk1, Bk4, Br1, Fl1]
      technical_analysis: []
      l_indicators: [common.L2.propulsion, common.L3.watersense, free.L2.hand-pressure, free.L3.evf]

  - id: dev.technical.t2t
    pillar: technical
    stage: t2t
    public:
      summary: "技術精緻化；個人划水模型；划水效率指標（SR、DPS）；比賽技能整合"
      points:
        - "**划水品質**：划水對稱性良好，中度疲勞時技術仍能維持；調整划水距離與推進力，優化每划水週期的衝量（force × time）"
        - "**水感精修**：精修划水、起跳、轉身、終點的水感；能辨識最佳低阻身體對位（含呼吸時）"
        - "**起跳**：以適當角度施加高推力，在空中飛越距離並乾淨入水（潛水式起跳）"
        - "**划水理解**：理解划水頻率（SR）、划水距離（DPS）、游速（SS）與能量消耗之間的關係"
        - "**廣泛參加各種項目**；四泳式（200 IM）；繼續踢腿發展；有氧基礎建立"
        - "**戰術起步**：建立比賽專注協議；辨識注意力不佳的情境；內外專注切換意識"
    diagnostic: null
    links:
      standards: [std.free.pull, std.free.push, std.free.full-cycle, std.back.pull, std.back.push, std.back.full-cycle, std.fly.pull, std.fly.push-kick, std.fly.recovery, std.fly.full-cycle, std.breast.kick, std.breast.pull, std.breast.recovery-flex, std.breast.full-cycle, std.start.dive, std.start.back, std.turn.free, std.turn.back, std.turn.breast, std.turn.fly, std.turn.im-breast, std.turn.im-free]
      drills: [Fr20, Fr23, Bk10, Br30]
      technical_analysis: [free.tech.1, free.tech.2]
      l_indicators: [free.L4.sr-sl, free.L4.roll-coupling, common.L4.under-pressure]

  - id: dev.technical.t2c
    pillar: technical
    stage: t2c
    public:
      summary: "疲勞下技術穩定；SR/DPS 精準控制；比賽策略與能量分配；開始專項化"
      points:
        - "**技術精準**：疲勞時技術幾乎不變；最大化前進推力，最小化側向與垂直力；衝量及工作效率均優化"
        - "**起跳**：以最大推力與正確角度起跳，覆蓋最佳空中距離，以適當角度入水達到所需深度"
        - "**轉身**：以最佳距離啟動，最大推力、正確角度蹬出；精修水下蝶式踢的運用"
        - "**划水控制**：能調整划水頻率（SR）、每划距離（DPS）與游速；根據比賽距離與能量系統控制能量消耗"
        - "**開始專項化**；在訓練中模擬各種比賽表現面向；包含浮標目視、跟游（drafting）、不同距離體驗"
        - "**比賽策略**：是否監控自己與其他選手相對位置的決策；描述比賽中內在到外在專注的流程"
    diagnostic: null
    links:
      standards: [std.free.pull, std.free.push, std.free.full-cycle, std.back.pull, std.back.push, std.back.full-cycle, std.fly.pull, std.fly.push-kick, std.fly.recovery, std.fly.full-cycle, std.breast.kick, std.breast.pull, std.breast.recovery-flex, std.breast.full-cycle, std.start.dive, std.start.back, std.turn.free, std.turn.back, std.turn.breast, std.turn.fly, std.turn.im-breast, std.turn.im-free]
      drills: [Fr21, Fr22, Fr24]
      technical_analysis: [starts-turns.tech.1, udk.tech.1]
      l_indicators: [free.L5.sr-sl, free.L5.serratus, common.L5.automation]

  - id: dev.technical.t2w
    pillar: technical
    stage: t2w
    public:
      summary: "疲勞下技術完全不受影響；最佳起跳與水下蝶式踢；精確比賽策略"
      points:
        - "**技術完美**：技術在疲勞下完全不受影響；手速度優化以最大化推進力"
        - "**起跳最佳化**：以最大推力與最佳角度起跳，優化空中距離、入水角度，最小化到 15m 標誌的時間"
        - "**水下蝶式踢**：在規則允許範圍內最大化效益"
        - "**划水精準控制**：精確控制 SR、DPS 與能量消耗，以應對各種比賽情境需求"
        - "**競賽策略**：發展競賽策略；在各種距離和項目中專精；一致應用比賽專注協議，並與比賽策略連結"
        - "**致勝風格確立**；能根據不同對手與條件調整策略；高度掌控比賽節奏"
    diagnostic: null
    links:
      standards: [std.free.pull, std.free.push, std.free.full-cycle, std.back.pull, std.back.push, std.back.full-cycle, std.fly.pull, std.fly.push-kick, std.fly.recovery, std.fly.full-cycle, std.breast.kick, std.breast.pull, std.breast.recovery-flex, std.breast.full-cycle, std.start.dive, std.start.back, std.turn.free, std.turn.back, std.turn.breast, std.turn.fly, std.turn.im-breast, std.turn.im-free]
      drills: [Fr16, Fl28]
      technical_analysis: [udk.tech.1, starts-turns.tech.1]
      l_indicators: [free.L6.stability, common.L6.stability]

  # ════ 心理技能 mental ════
  - id: dev.mental.l2t
    pillar: mental
    stage: l2t
    public:
      summary: "正向態度建立；教練引導下的目標設定；情緒與行為的連結；視覺化入門"
      points:
        - "**正向態度**：選擇參與多種運動；描述備賽對地區比賽的重要性；對規律訓練展現熱忱與承諾"
        - "**動機**：在多種體能活動中展現高水準基本動作技能；以俱樂部成員身份展現尊重與自我接納；建立友誼"
        - "**目標設定**：在教練指導下發展短期訓練與比賽目標；辨識影響目標設定的多種因素；識別達成目標所需的支持"
        - "**情緒**：描述各種情緒，理解情緒與行為之間的連結；清楚說明情緒、自我對話與身體感受之間的連結"
        - "**專注力**：開始獨立工作短暫時間；忽略無關干擾；描述內在／外在、廣泛／窄焦注意力的差異"
        - "**視覺化**：以越來越多的細節描述視覺化技能（視覺、聽覺、嗅覺、觸覺、動覺）"
        - "**錯誤減少**：持續描述自己想做的和被要求做的任務；觀看示範以促進學習"
    diagnostic: null
    links: {standards: [], drills: [], technical_analysis: [], l_indicators: []}

  - id: dev.mental.t2t
    pillar: mental
    stage: t2t
    public:
      summary: "SMART 目標設定；情緒管理策略；視覺化練習；理想表現狀態輪廓"
      points:
        - "**正向態度**：重視並投入規律訓練；區分努力、進步與結果的差異；辨識內在與外在動機"
        - "**動機**：在游泳技能、團隊凝聚力貢獻與比賽表現上展現有意義的進步；承擔非正式或正式領導角色"
