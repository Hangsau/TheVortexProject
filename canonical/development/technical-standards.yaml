# ============================================================
# Canonical 知識結構 — 發展領域 / 技術基準（Development / Technical Standards）
# ------------------------------------------------------------
# 單一真相來源 (single source of truth)。
# my-site (網站) 讀 public 層；swim-coach (教練 app) 讀 diagnostic 層。
#
# 來源：Swimming Canada Athlete Development Matrix (ADM) 附錄 A
#   - resources/books/Athlete-development-matrix/ 附錄 A（各泳式 / 起跳 / 轉身技術基準）
#   收編前散落於 my-site/content/library/athlete-development-matrix/appendix-a.md；
#   本檔成立後該頁退役為下游衍生物（sync 產生，不再手抄）。
#
# 每筆技術基準（std 記錄）：
#   public:     公開呈現。理想技術標準屬正當 prescriptive，全進 public。
#               framework 採 ADM 原文「姿勢—平衡—恢復—錨定—加速」框架。
#               applies_from: t2t（T2T 階段達到，T2C / T2W 及終身競技持續維持）。
#               phases: 忠實搬 appendix-a 各 ### 小節（criteria 逐條）。
#   diagnostic: ADM 技術基準屬動作形式描述，非感知判讀語，原則為 null。
#   → my-site 只 render public；swim-coach 教練工具讀 diagnostic。
#
# 左右鏡像合併：自由式 / 仰式的「左手拉水」「右手拉水」屬鏡像小節，
#   合併為單筆 std（criteria 以「拉水側 / 對側」中性描述涵蓋雙側），
#   note 標明合併來源。蝶式 / 蛙式本就左右對稱，不需合併。
#
# 跨 domain 互連用 links（指向既有 canonical 的穩定 ID）：
#   drills:             → Drills/drills_*.yaml 的 Fr*/Bk*/Br*/Fl*/Sc* ID
#   technical_analysis: → instructional/technical-analysis.yaml 的 {stroke}.tech.N
#   l_indicators:       → technica/l-indicators.yaml 的 {stroke}.{level}.{aspect}
#   （技術基準是動作形式層，主要交叉引用感知層 l_indicators，串起「形式↔感知」）
#
# 確定性：🔵推導 🟢近期文獻 🟡舊文獻 🟠教練觀測 🔴待查
# ============================================================

domain: development
sub: technical-standards
schema_version: 1
source_repos:
  - resources/books/Athlete-development-matrix/appendix_a_technical_standards.md

# 共用框架（appendix-a 開宗明義）：
framework: 姿勢—平衡—恢復—錨定—加速
applies_note: "理想技術基準應在 T2T（訓練為訓練）階段達到，並在 T2C、T2W 及終身競技階段持續維持。"

standards:

  # ════════════════ 自由式 free（A.1）════════════════
  - id: std.free.pull
    public:
      title: 自由式——拉水技術
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      note: 左右鏡像合併（A.1「左手拉水 & 右手空中恢復」+「右手拉水 & 左手空中恢復」）；criteria 以拉水側 / 對側中性描述涵蓋雙側。
      phases:
        - name: 拉水階段（雙側）
          criteria:
            - 拉水手應低於同側肩
            - 拉水階段用於建立強力推水的姿勢
            - 拉水中點時，手、肘、肩應在矢狀面（sagittal plane）對齊
            - 對側手臂空中恢復速度應與拉水手拉水速度同步
    diagnostic: null
    links:
      drills: [Fr15, Fr16, Fr18]
      technical_analysis: [free.tech.1]
      l_indicators: [free.L3.evf, free.L2.hand-pressure]

  - id: std.free.push
    public:
      title: 自由式——推水技術
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      note: 左右鏡像合併（A.1「左手推水 & 右手空中恢復」+「右手推水 & 左手空中恢復」）；criteria 以推水側 / 對側中性描述涵蓋雙側。
      phases:
        - name: 推水階段（雙側）
          criteria:
            - 推水動作來自對前臂的施壓
            - 對側手臂恢復中點時，手、肘、肩在矢狀面對齊
            - 對側手臂恢復速度應與推水手推水速度同步
            - 推水手推水計時應與踢腿動作協調
            - 推水結束時達到峰值速度
    diagnostic: null
    links:
      drills: [Fr19, Fr22]
      technical_analysis: [free.tech.2]
      l_indicators: [free.L4.sr-sl, free.L5.serratus]

  - id: std.free.full-cycle
    public:
      title: 自由式——完整划水週期
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 完整划水週期
          criteria:
            - 身體動作優化，盡量減少不必要波浪的產生
            - 雙肩以協調節律運作，協助對水施力
            - 核心持續收緊，在踢腿穩定身體的同時優化手臂推進力
            - 呼吸動作與划水節律同步，不干擾節奏、平衡，不製造不必要波浪
    diagnostic: null
    links:
      drills: [Fr20, Fr23]
      technical_analysis: []
      l_indicators: [free.L4.roll-coupling, free.L6.stability, common.L6.stability]

  # ════════════════ 仰式 back（A.2）════════════════
  - id: std.back.pull
    public:
      title: 仰式——拉水技術
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      note: 左右鏡像合併（A.2「左手拉水 & 右手空中恢復」+「右手拉水 & 左手空中恢復」）；criteria 以拉水側 / 對側中性描述涵蓋雙側。
      phases:
        - name: 拉水階段（雙側）
          criteria:
            - 拉水手應低於同側肩
            - 同側抓水（catch）、對側手臂出水（exit）、同側腿踢水（kick）應同步發生
            - 拉水階段用於建立強力推水的姿勢
            - 拉水中點時，手、肘、肩在矢狀面對齊
            - 對側手臂空中恢復速度應與拉水手拉水速度同步
    diagnostic: null
    links:
      drills: [Bk3, Bk10]
      technical_analysis: [back.tech.1]
      l_indicators: [back.L3.pull, back.L3.shoulder-roll]

  - id: std.back.push
    public:
      title: 仰式——推水技術
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      note: 左右鏡像合併（A.2「左手推水 & 右手空中恢復」+「右手推水 & 左手空中恢復」）；criteria 以推水側 / 對側中性描述涵蓋雙側。
      phases:
        - name: 推水階段（雙側）
          criteria:
            - 推水手推水時肘部靠近身體，手臂方向朝向腳端
            - 對側手入水應在推水手推水結束前完成
            - 推水手推水計時應與踢腿動作協調
            - 推水結束時達到峰值速度
    diagnostic: null
    links:
      drills: [Bk12]
      technical_analysis: []
      l_indicators: [back.L4.roll-stability]

  - id: std.back.full-cycle
    public:
      title: 仰式——完整划水週期
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 完整划水週期
          criteria:
            - 身體動作優化，盡量減少不必要波浪的產生
            - 雙肩以協調節律運作，協助對水施力
            - 核心持續收緊，在踢腿穩定身體的同時優化手臂推進力
            - 划水距離透過恢復階段的充分伸展來達成
    diagnostic: null
    links:
      drills: [Bk20]
      technical_analysis: []
      l_indicators: [back.L5.roll-invariant, back.L6.stability]

  # ════════════════ 蝶式 fly（A.3）════════════════
  - id: std.fly.pull
    public:
      title: 蝶式——手臂拉水階段
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 手臂拉水階段
          criteria:
            - 雙手應低於雙肩
            - 入水踢腿（entry kick）在雙手前伸（outsweep 前）結束
            - 以高肘位（high elbows）完成抓水
    diagnostic: null
    links:
      drills: [Fl8, Fl12]
      technical_analysis: [fly.tech.1]
      l_indicators: [fly.L2.catch, fly.L4.outsweep]

  - id: std.fly.push-kick
    public:
      title: 蝶式——手臂推水 & 腿部踢水階段
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 手臂推水 & 腿部踢水階段
          criteria:
            - 肘部略領先手部進入推水階段
            - 推水階段中，下巴前移以準備呼吸
            - 推水與踢腿同步結束
            - 推水結束時達到峰值速度
    diagnostic: null
    links:
      drills: [Fl15]
      technical_analysis: []
      l_indicators: [fly.L3.two-kick-timing, fly.L4.second-kick]

  - id: std.fly.recovery
    public:
      title: 蝶式——手臂恢復階段
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 手臂恢復階段
          criteria:
            - 恢復過程中維持相對平坦的身體姿勢
            - 恢復中點時，手、肘、肩在矢狀面對齊
            - 雙手在肩部前方入水並向前推進
    diagnostic: null
    links:
      drills: [Fl20]
      technical_analysis: []
      l_indicators: [fly.L3.undulation-integration]

  - id: std.fly.full-cycle
    public:
      title: 蝶式——完整划水週期
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 完整划水週期
          criteria:
            - 身體動作優化，盡量減少不必要波浪的產生
            - 呼吸計時有助於維持整體身體的相對平坦姿勢
            - 核心持續收緊，在踢腿穩定身體的同時優化手臂推進力
            - 划水距離透過維持相對直腿踢腿、且入水時不將胸部下壓來達成
    diagnostic: null
    links:
      drills: [Fl28]
      technical_analysis: []
      l_indicators: [fly.L5.two-kick-differentiation, fly.L6.chain-closure]

  # ════════════════ 蛙式 breast（A.4）════════════════
  - id: std.breast.kick
    public:
      title: 蛙式——腿部踢水階段
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 腿部踢水階段
          criteria:
            - 踢水至流線型姿勢，雙臂向前伸展
            - 收腿時應收腳跟（而非膝蓋），使小腿垂直、腳跟靠近臀部
            - 加速收腿動作有助於外旋進入踢水推進階段
            - 踢水完成時加速收尾，以維持相對高的腳部與腿部位置
    diagnostic: null
    links:
      drills: [Br5, Br12]
      technical_analysis: [breast.tech.1]
      l_indicators: [breast.L2.leg-propulsion, breast.L3.kick-vortex, breast.L5.late-kick]

  - id: std.breast.pull
    public:
      title: 蛙式——手臂拉水階段
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 手臂拉水階段
          criteria:
            - 以滑行姿態進入手臂動作
            - 以高肘位向外大幅外展（out sweep）
            - 最大拉水長度在雙手靠近肩線時結束
            - 肘部靠近身體（elbow close to body）
            - 前進速度提升至最高
            - 雙手向內划動時，肘部收向身體
            - 達到峰值前進速度
    diagnostic: null
    links:
      drills: [Br18]
      technical_analysis: []
      l_indicators: [breast.L2.hand-support]

  - id: std.breast.recovery-flex
    public:
      title: 蛙式——手臂恢復 & 腿部屈曲階段
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 手臂恢復 & 腿部屈曲階段
          criteria:
            - 開始恢復時不讓整體身體線下沉
            - 雙手在水面恢復，肘部仍在水中
            - 開始收腿準備踢腿
            - 伸展進入流線型姿勢以維持前進速度，但不向前「俯衝」下壓
    diagnostic: null
    links:
      drills: [Br22]
      technical_analysis: []
      l_indicators: [breast.L3.recovery-drag, breast.L4.timing]

  - id: std.breast.full-cycle
    public:
      title: 蛙式——完整划水週期
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 完整划水週期
          criteria:
            - 身體動作優化，盡量減少不必要波浪的產生
            - 呼吸計時有助於維持整體身體的相對平坦姿勢
            - 核心持續收緊，在踢腿穩定身體的同時優化手臂推進力
            - 划水距離透過在水中維持相對高的身體位置來達成
    diagnostic: null
    links:
      drills: [Br30]
      technical_analysis: []
      l_indicators: [breast.L4.undulation, breast.L5.undulation-stability, breast.L6.stability]

  # ════════════════ 起跳 starts（A.5）════════════════
  - id: std.start.dive
    public:
      title: 潛水式起跳（自由式 / 仰式 / 蝶式 / 蛙式）
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      note: 蛙式起跳動作與一般潛水式起跳相同，水下階段改為 pullout（水下划手）而非蝶式踢。
      phases:
        - name: 零位姿勢（Zero Position）
          criteria:
            - 雙腳交錯站立，腳尖朝前，雙腳分開
            - 後腳穩固踩在楔形輔具（wedge）上
            - 雙臂伸直；肩部在手部正上方或前方
            - 頭部中立；臀部抬高
        - name: 推蹬階段
          criteria:
            - 臀部立即向前移動
            - 後腿完全蹬出；頭部保持中立
            - 手臂彎曲恢復，與前腿同步伸展
        - name: 飛行階段
          criteria:
            - 下腿上提至上腿位置
            - 雙臂向前延伸，在臉部前方準備入水
            - 頭部在雙臂之間對齊；雙手在接觸水面前合攏
        - name: 入水點
          criteria:
            - 維持流線型姿勢
            - 雙腿沿與身體相同路徑入水
            - 腳踝與腳背完全伸展；全身透過同一個「洞」入水
        - name: 水下階段——自由式 / 仰式 / 蝶式
          criteria:
            - 維持流線型姿勢；滑行後再開始踢腿
            - 以恆定高頻率、低幅度踢腿；踢腿完成時臀部保持固定
            - 最後一下踢腿與第一個抓水動作同步
            - 出水時頭部保持中立
        - name: 水下階段——蛙式
          criteria:
            - 維持流線型姿勢；滑行後進行 pullout（水下划手）
            - 以手指向下啟動拉水；拉水後頸部在流線型姿勢中完全伸展
            - 雙手在腳收回前恢復到臉部位置；蛙式踢水時膝蓋朝後
    diagnostic: null
    links:
      drills: []
      technical_analysis: [starts-turns.tech.1, udk.tech.1]
      l_indicators: [common.L6.stability]

  - id: std.start.back
    public:
      title: 仰式起跳
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 零位姿勢
          criteria:
            - 臀部靠近牆壁；腳趾至少在水面高度
            - 背部直立；頭部中立
        - name: 推蹬階段
          criteria:
            - 頭部/背部立即向後移動
            - 臀部推動使臀部完全出水；出水後腿部蹬出
            - 腿部蹬出結束時身體與水面平行；手臂與推蹬動作同步伸展
        - name: 飛行階段與入水點
          criteria:
            - 背部拱起越過水面；雙手在接觸水面前合攏
            - 頭部在雙臂之間對齊；雙腿/雙腳完全出水
            - 維持流線型姿勢；全身透過同一個「洞」入水
        - name: 水下階段
          criteria:
            - 維持流線型姿勢；滑行後再開始踢腿
            - 以恆定高頻率、低幅度踢腿；踢腿完成時臀部保持固定
            - 最後一下踢腿與第一個抓水同步；第一個抓水時鼻子在水面
            - 第一個抓水後轉換為捷式踢（flutter kick）；出水時頭部保持中立
    diagnostic: null
    links:
      drills: []
      technical_analysis: [starts-turns.tech.1, udk.tech.1]
      l_indicators: [back.L5.start-turn, common.L6.stability]

  # ════════════════ 轉身 turns（A.6）════════════════
  - id: std.turn.free
    public:
      title: 自由式轉身
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 接近與旋轉
          criteria:
            - 維持游泳速度與划水頻率（SR）；頭部朝下，視線看向池底
            - 最後一划完整且深（與正常划水相同）
            - 從腰部開始彎曲，跟隨入水手的方向
            - 臀部維持在水面；膝蓋收向腹部
        - name: 接觸與推蹬
          criteria:
            - 雙腳與髖同寬；接觸牆面時雙臂伸展至流線型姿勢
            - 背部平坦，臀部收緊；推蹬過程中維持流線型姿勢；推蹬時不旋轉
        - name: 水下與出水
          criteria:
            - 維持流線型姿勢；滑行後再開始踢腿
            - 使用蝶式/魚式踢轉換至俯臥姿勢；踢腿完成時臀部保持固定
            - 最後一下踢腿與第一個抓水同步；第一個抓水後轉換為捷式踢
            - 出水時頭部保持中立；整個出水過程維持充分伸展
    diagnostic: null
    links:
      drills: []
      technical_analysis: [starts-turns.tech.1, udk.tech.1]
      l_indicators: [common.L6.stability]

  - id: std.turn.back
    public:
      title: 仰式轉身
      framework: 姿勢—平衡—恢復—錨定—加速
      applies_from: t2t
      phases:
        - name: 接近與旋轉
          criteria:
            - 維持游泳速度與划水頻率；翻轉划水時手指朝下
            - 頭部朝下，視線看向池底；最後一划完整且深（自由式划水動作）
            - 從腰部開始彎曲，跟隨入水手的方向；臀部維持在水面；膝蓋收向腹部
        - name: 接觸與推蹬
          criteria:
            - 雙腳與髖同寬；接觸牆面時雙臂伸展至流線型姿勢
            - 背部平坦，臀部收緊；推蹬過程中維持流線型姿勢
        - name: 水下與出水
          criteria:
            - 維持流線型姿勢；滑行後再開始踢腿
            - 以恆定高頻率、低幅度踢腿；踢腿完成時臀部保持固定
            - 最後一下踢腿與第一個抓水同步；第一個抓水時鼻子在水面
            - 第一個抓水後轉換為捷式踢；出水時頭部保持中立
    diagnostic: null
    links:
