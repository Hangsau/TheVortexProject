domain: technica
sub: water-sense-levels
schema_version: 1
source_repos:
- Technica/自由式水感框架.md
- Technica/仰式水感框架.md
- Technica/蛙式水感框架.md
- Technica/蝶式水感框架.md
strokes:
- key: free
  name_zh: 自由式
  base: true
- key: back
  name_zh: 仰式
- key: breast
  name_zh: 蛙式
- key: fly
  name_zh: 蝶式
three_types:
  free:
    definition:
      A:
        name: 手部感知缺陷
        core_problem: 感覺不到手跟水的互動是什麼——無法區分「手抓到水」和「手滑過去」。感受到的只有肌肉出力，不知道力有沒有傳到水。
        manifestation: 划手效率低，感覺手在滑水而非推水，SPL 偏高；疲勞時手感消失比腳感更早
        development: L3 找不到抓水感 → L4 能找到但提速就失去 → L5 衝刺中無法穩定維持
      B:
        name: 腳部感知缺陷
        core_problem: 踢水推力感知弱——腳在動，但感知不到水被往後推。踢腿節奏容易被划手干擾，整合感知不穩定。
        manifestation: 踢很多但前進慢，踢腿節奏容易脫節，長距離後段踢水退化為打水
        development: L3 感知不到踢水推力 → L4 放鬆時有但整合不穩 → L5 外部干擾下節奏崩潰
      C:
        name: 全身感知遮蔽
        core_problem: 張力遮蔽感知——「認真游」或換氣、轉體觸發全身肌肉張力，將感知訊號覆蓋掉。放鬆時游得好，一用力就什麼都感覺不到。
        manifestation: 低強度還可以，速度一提高或被計時就全面消失；單獨練習時正常，加入換氣、轉體後感知跑掉
        development: L3 一用力就消失 → L4 中低強度能維持但高強度觸發全面消失 → L5 比賽壓力仍觸發遮蔽
      note: ※ 三型定義源自教學實務推導，尚未經過系統性研究驗證。建議對照教學現場持續觀察並更新。三型診斷從 L3 開始適用。L0/L1/L2 階段感知系統尚在建立，類型差異還不明顯。
    pre_judgment: '進入三型診斷之前，需要先做一個前置判斷：學生面對的是感知缺陷問題，還是硬體邊界問題？兩者的外部行為可能相似，但介入方向完全不同。


      判斷方式只有一個問題：學生能不能描述「為什麼做不到」？


      能描述（例如「腳壓不下去」、「手臂繞回去會卡住」）→ 感知系統有在回報，問題在硬體邊界，走硬體介入路徑，同時在當下硬體邊界內繼續建立水感，兩者並行不等待。


      不能描述，或描述和實際結果矛盾 → 感知系統尚未建立對這個環節的清晰回報，進入三型診斷，找到感知缺陷的方向。


      硬體邊界內找到的感知，不是錯誤水感——它是當下硬體條件下最確切的水感。硬體邊界擴展後，感知系統自然會重新探索新的空間，因為它已經知道怎麼找了。


      診斷的核心是觀察三個方向：手部感知、腳部感知、整體張力狀態。不需要固定的題目或正式測試——教練可以直接觀察行為，自學者可以自評，影片輔助會讓判斷更準確。


      觀察方式｜A型訊號｜B型訊號｜C型訊號

      拳頭游 vs 開手游速度差｜差距明顯（>15%）｜差距不明顯｜差距不定，隨緊張程度變化

      浮板踢水｜踢水有效，前進穩定｜踢水感覺不到推力，前進緩慢｜踢水有效，但一用力就全身僵；或單獨練習時動作正常，加入換氣／轉體後感知消失

      游完後的自我描述｜「感覺划手滑過去」「手沒有抓到什麼」｜「腿踢了但沒什麼感覺」「腿跟不上手」｜「用力就感覺不到水了」「放鬆游反而游得好」；或「單手游沒問題，換氣那一划感覺就跑掉了」


      三題都指向同一型則判斷較為確定；若有混合，以出現最多次的型為主要處理方向。建議每隔一個 L 級重新評估，隨訓練推進主要感知缺陷可能已轉移。


      三型的核心脆弱點（機制有學術支持，行為表現待教學觀察驗證）：三型的崩潰機制，部分有學術研究支持其生理基礎——A型參考 Aujouannet et al.（2006）關於高強度下運動學參數的研究；C型參考 Beilock & Carr（2001）的顯性監控理論及 ScienceDirect（2023）關於焦慮與本體感覺的研究。三型分類本身源自教學實務歸納，並非上述研究所定義，亦尚未經過系統性驗證。


      C型補充說明：C型的感知遮蔽不只在全身加速時出現，也會由特定動作觸發局部遮蔽——最常見的是換氣，其次是轉體和踢水節律改變。判斷方式：單獨練習時感知正常，加入換氣／轉體後感知消失，移除該動作後恢復——這個模式屬於C型局部觸發，而不是A型感知缺失。兩者的訓練方向不同：A型需要建立感知，C型局部觸發需要在該動作存在的情況下練習維持感知。'
    quick_card: '附錄三　三型速查卡


      A型｜手部感知缺陷 ／ B型｜腳部感知缺陷 ／ C型｜全身感知遮蔽


      核心問題

      A：感覺不到手跟水的互動是什麼——分不出「手抓到水」和「手滑過去」

      B：腳踢水感知弱，踢腿節奏容易被划手干擾

      C：肌肉張力高遮蔽觸覺訊號，一用力就什麼都感覺不到


      快速判斷

      A：拳頭游 vs 開手游速度差很大

      B：浮板踢水幾乎感覺不到推力

      C：游完全身緊繃，放鬆時游得更好


      L3 訓練重點

      A：正式搖櫓 Sculling（大慢可以）、單臂划水、拳頭游對比

      B：慢速踢水停頓、穿襪踢水對比、踢水節奏訓練

      C：閉眼游泳、放鬆游對比、低強度感知訓練


      L4 訓練重點

      A：Tornado Drill、85% 強度接慢速對比、搖櫓 Sculling 重置

      B：2打腿整合、節奏器訓練、長距離節奏監控

      C：速度爬梯、呼吸放鬆訓練、觀眾壓力模擬


      L5 訓練重點

      A：衝刺手感監控、體感配速訓練、搖櫓 Sculling 精細化

      B：配速游（維持自己節奏）、節拍器校準、搖櫓 Sculling 精細化

      C：節拍器優先建立節奏基準、韻律呼吸、搖櫓 Sculling 精細化


      避免

      A：大量划手板（遮蔽前臂感知問題）

      B：強調踢更快（沒有感知的頻率增加無效）

      C：高強度主導訓練（強化無感知迴路）


      L3→L4 里程碑

      A：連續 3/4 趟能感覺明確抓水感　拳頭游速度達開手游的 85%

      B：能區分「踢到水」和「踢過水」　踢腿有效貢獻提速 10% 以上

      C：放鬆游 200m 全程有水感　用力游 SWOLF 不超過放鬆游 5 分


      L4→L5 里程碑

      A：85% 強度 50m 能維持手感　消失後 3 划以內能察覺並調整

      B：長距離踢腿節奏不崩潰　節奏失控後半趟以內能重建

      C：壓力下 SWOLF 差距 ≤3 分　能主動降速找回感知


      L5→L6 里程碑

      A：衝刺中手感監控能力穩定　能感覺到入水角度開始偏的早期訊號

      B：外部節奏干擾下能維持自己配速　能感覺到踢水開始變慢的早期訊號

      C：壓力下韻律呼吸能快速降低張力　節奏被帶走後能主動調整回來'
  back:
    note: 三型診斷從 L3 開始適用。L0/L1/L2 階段動作尚在建立，感知缺陷方向還不明顯。 三型定義源自教學實務推導，尚未經過系統性研究驗證。建議對照教學現場持續觀察並更新。
    definition:
      A:
        name: 手部感知缺陷
        core_problem: 入水角度、抓水路徑感知弱，前臂感知不足，手「滑過」水而不是「推」水
        manifestation: 划手效率低，感覺手在滑水而非推水，SPL 偏高
        development: L3找不到划手水壓 → L4能找到但壓力下消失 → L5全速下出現「甩」的代償
      B:
        name: 腳部感知缺陷
        core_problem: 踢腿推力方向感知弱，上踢感知不穩定，感知不到水團被推
        manifestation: 踢很多但前進慢，上踢感知薄弱，只能靠划手前進
        development: L3感知不到上踢推力 → L4偶爾有但節奏不穩 → L5整合在壓力下容易脫節
      C:
        name: 髖部位置感知缺陷
        core_problem: 感知不到身體偏離水平的訊號------頭部位置或腰部跑掉了但不知道
        manifestation: 慢游還好，加速後阻力明顯變大，感覺在爬坡但說不出原因
        development: L3感覺不到偏離 → L4偶爾能維持但壓力下跑掉 → L5頭部跟著旋轉方向蛇行
  breast:
    definition:
      A:
        name: 手部換氣缺陷
        core_problem: 外划內抱感知弱，手撐不起身體，換氣時機和手的動作脫節
        manifestation: 換氣費力、頭要額外抬、節奏容易被換氣打亂
        development: L3找不到撐水感 → L4能找到但壓力下消失 → L5高速下維持
      B:
        name: 腿部感知缺陷
        core_problem: 踢腿感知薄弱，腳掌翻轉和推水方向不清楚，夾完沒有往前滑的感覺
        manifestation: 踢很多但前進慢，滑行感薄弱或不存在
        development: L3感知不到推力 → L4偶爾有但節奏不穩 → L5配合手整合
      C:
        name: 身體平衡感知缺陷
        core_problem: 感覺不到身體在空間中偏離平衡位的訊號，動作製造阻力但不自知
        manifestation: 手腳時機錯位、身體起伏大、感覺在對抗水前進
        development: L3感覺不到偏離 → L4偶爾能回到平衡但整合不穩 → L5高速下維持平衡感知
      note: 三型定義源自教學實務推導，尚未經過系統性研究驗證。建議對照教學現場持續觀察並更新。三型診斷從 L3 開始適用。L0/L1/L2 階段動作尚在建立，感知缺陷方向還不明顯。
    quick_card:
      note: 快速判斷學生類型，對應各階段訓練重點。三型的主要感知缺陷會隨訓練改變，建議每隔一個L級重新評估。
      A:
        quick_judge: 換氣費力，頭要額外抬，肩頸上臂容易累
        L3_focus: Sculling換氣原地、站立外划內抱
        L4_focus: 自由式踢水蛙手、拳頭划手→張開
        L5_focus: Sculling→單手蛙式→全速趟→Tempo Trainer偏離模式
        L3_to_L4_milestone: 連續3趟SPL差異≤2划；能刻意重現換氣順的感覺
        L4_to_L5_milestone: 節奏加快後能讓手跟著換氣射出去；SPL差異≤2划
        L5_to_L6_milestone: 外划幅度自然收斂；insweep加速起點感知穩定；SWOLF穩定26--35
      B:
        quick_judge: 踢很多但前進慢，大腿膝蓋容易累
        L3_focus: 坐岸邊潑水、扶池邊慢速踢腿、穿襪踢水對比
        L4_focus: 兩踢一划
        L5_focus: 仰式蛙腿→蝶腿蛙手→正常蛙式→SPL+N
        L3_to_L4_milestone: 浮板踢水25m不中斷；能區分「踢到水」和「踢過水」
        L4_to_L5_milestone: 能感覺腿提前收的那一划；能說出腿是在手射出去後才收的
        L5_to_L6_milestone: 收腿路徑穩定；阻力下降時機感知出現；髖發力感知開始出現
      C:
        quick_judge: 感覺一直在對抗水，全身都累，說不出哪裡出問題
        L3_focus: 漂浮感知系列、慢速踢水後停頓
        L4_focus: 暫停法、划數遞減遞增
        L5_focus: 極慢速停頓蛙式→正常速度趟→SWOLF監控
        L3_to_L4_milestone: 慢速游比正常游SPL少3划以上；能描述身體偏向哪一側
        L4_to_L5_milestone: 暫停法接正常蛙式能維持前幾划順序感；划數遞減能少3划以上
        L5_to_L6_milestone: 俯衝角度每趟一致；升力感知穩定出現；波動連鎖扎實
  fly:
    definition:
      A:
        name: A型｜捕水感知缺陷
        core_problem: 捕水位置感知薄弱，手「划過」水而不是「推」水；外划幅度代償性過大，前臂無法建立有效推進面
        manifestation: 外划幅度大，感覺「抓到水了」但推進慢；疲勞後外划更大；換氣後位置重建困難
        development: L3 感知不到前臂水壓 → L4 能找到但壓力下消失 → L5 捕水感知穩固但路徑未精煉
      B:
        name: B型｜波動感知缺陷
        core_problem: 感知不到從胸部啟動的波動傳遞；腿踢有力但波動連貫性弱，推進力無法從核心傳到腳踝
        manifestation: 踢腿看起來用力但波動平，推進依賴手臂；胸部不下壓，第一踢腿啟動時機延後
        development: L3 感知不到波動連貫 → L4 偶爾有但踢水一加力就斷 → L5 壓力下整合不穩定
      C:
        name: C型｜節律整合缺陷
        core_problem: 手的推進感知和波動節律之間的整合斷開；兩踢時機和划手週期不同步，動作在壓力下各自為政
        manifestation: 放鬆游還好，加速或疲勞後兩踢和划手開始各自為政；節奏一亂就完全找不回來
        development: L3 感覺不到兩踢和划手的連接 → L4 偶爾同步但不穩定 → L5 節律感知未自動化
      note: 三型診斷從 L3 開始適用。L0/L1/L2 階段動作尚在建立，感知缺陷方向還不明顯。三型定義源自教學實務推導，尚未經過系統性研究驗證。建議對照教學現場持續觀察並更新。
    quick_card:
      intro: 快速判斷學生類型，對應各階段訓練重點。三型的主要感知缺陷會隨訓練改變，建議每隔一個 L 級重新評估。
      A:
        quick_judge: 外划幅度大，感覺手划過去了；拳頭蝶式和開手游速度差明顯；前臂感知弱
        L3_focus: 拳頭蝶式→張開、單臂蝶式隔離捕水感知、水中停頓法確認前臂水壓
        L4_focus: Sculling → 單臂蝶式接全速、凍結動作法確認捕水位置
        L5_focus: Sculling → 外划幅度遞減 → 單臂蝶式接全速趟 → SPL+N 壓力測試
        L3_L4_milestone: 連續 3/4 趟能感覺明確前臂水壓；拳頭游速度達開手游 80%
        L4_L5_milestone: 加速後捕水感知消失，能在下一趟找回；85% 強度 25m 前臂水壓維持
        L5_L6_milestone: 外划幅度自然收斂，不需刻意控制；捕水起點感知每趟穩定；SWOLF 穩定 30--42
      B:
        quick_judge: 踢很多但波動不連貫，感覺腰在動但傳不到腿；浮板踢水沒有滑行感
        L3_focus: 波動游重新確認、浮板踢水專注胸部帶動、蝶式踢水只用核心
        L4_focus: 速度爬梯找波動臨界點、蝶式踢水只用核心加速版
        L5_focus: 入水停頓→第一踢感知 → 胸部下壓深度精煉 → SWOLF 監控 200m
        L3_L4_milestone: 能區分「腿在波動」和「腿在擺動」；加入胸部下壓後推進感明顯增加
        L4_L5_milestone: 能感覺波動消失的那一踢；能說出波動臨界速度在哪裡
        L5_L6_milestone: 入水水感就是第一踢觸發，自動發生；波動從胸傳到腳每趟出現
      C:
        quick_judge: 慢游還好，加速後兩踢時機亂；能感覺水但「對不上」的感覺很強烈
        L3_focus: 一踢一划隔離時機感知、數踢腿（入水 1 出水 2）、單臂蝶式感覺連動
        L4_focus: 節拍器對齊兩踢時機、只做第一踢蝶式、只做第二踢蝶式
        L5_focus: 「推完了」感知練習 → 出水→第二踢連接 → Tempo Trainer 抗干擾
        L3_L4_milestone: 能說出「這趟第幾划兩踢時機跑掉了」；一踢一划節奏穩定
        L4_L5_milestone: 能說出「這趟哪個接點斷掉了」；節拍器對齊後能維持 4 趟以上
        L5_L6_milestone: 「推完了」就是第二踢信號，不需刻意想；連鎖感知在壓力下自動維持
      note: 三型定義和各級里程碑源自教學實務推導，尚未經過系統性研究驗證。建議對照教學現場持續觀察並更新。
appendices:
  breast:
    appendix:
      quant_reference:
        note: 量化指標快速參考表（附錄一）。以下為各階段的量化指標參考範圍，以25m為基準。蛙式SPL計算方式：兩臂合併算一個划手循環（與自由式不同）。數值從菁英競技標準（100m蛙式約57--67秒，Paris 2024奧運資格標準）往下推導，以SI為基礎反推SWOLF，並參照教學現場觀察校準。待田野驗證後更新。
        swolf_note: SWOLF（游泳效率指數）= 單趟時間（秒）+ 該趟划手循環數。數值越低效率越高。蛙式因為有明顯滑行，SWOLF數值比自由式高，個體差異也較大。SWOLF受身高臂展影響，請以個人進步趨勢為主要參考，不建議與他人直接比較。
        si_note: SI（Stroke Index，划手效率指數）= 速度（m/s）× 每划距離（DPS，m）。其中DPS = 25m ÷ SPL。SI直接反映每個划手循環推進了多少距離，比SWOLF更能區分「速度快但效率低」和「效率高但速度慢」的狀態。推薦同時追蹤SWOLF和SI：SWOLF用於日常快速監控，SI用於階段性評估。兩者搭配使用，從SI反推SWOLF可以得到有效率基礎的參考數值。
        table:
        - stage: L3
          swolf: 42--63
          si: 0.8--1.7
          spl: 12--18
          note: 滑行幾乎沒有，動作不穩定
        - stage: L4
          swolf: 32--44
          si: 1.5--2.8
          spl: 10--14
          note: 滑行開始出現但不穩定
        - stage: L5
          swolf: 26--35
          si: 2.4--4.3
          spl: 8--11
          note: 連鎖感知出現，滑行穩定
        - stage: L6
          swolf: 20--27
          si: 3.9--6.9
          spl: 6--9
          note: 自動化，接近競技水準
  fly:
    framework_note: 本框架基於水感系統的邏輯延伸開發。理論基礎（水感的神經科學、感知剝奪訓練邏輯、量化指標使用方式、錯誤水感重建策略）跨泳式通用，詳見 Technica/水感指南.md，不在本文件重複。蝶式是四式中感知挑戰最複雜的泳式。它的推進不來自手臂單獨划水，而來自從頭到腳的全身波動——每個動作都是波動鏈上的一個節點，任何一環的品質都直接影響上一步的能量接收和下一步的能量輸出。在任何推進感知建立之前，學習者需要先感覺到「波動的存在」——這是整個框架的起點。「蹬水」、「划水」在本框架統一以「推水」代替，避免學習者誤解推進方向。波動（Undulation）在本框架指從胸骨啟動、沿體軸傳遞至腳踝的頭尾方向波動，不是上下擺動。
    quant_reference:
      intro: 各階段的量化指標參考範圍，以 25m 為基準。蝶式 SPL 受距離策略影響極大，50m 選手和 200m 選手的最優 SPL 可能相差 4--6 划。所有數值均為推導參考，尚未經過田野驗證。個體差異大（身高臂展影響顯著，距離策略影響更大），請以個人進步趨勢為主要參考，不建議與他人直接比較。
      swolf_note: SWOLF（游泳效率指數）= 單趟時間（秒）＋ 該趟划手循環數（兩手同時入水算一次）。數值越低效率越高。蝶式 SWOLF 通常比自由式高 10--15 分，個體差異也較大。
      spl_note: SPL（每趟划手數）越低代表每划距離越長。蝶式 SPL 受身高臂展和距離策略影響極大，個人追蹤趨勢比對照數值更重要。
      derivation_note: 數值從菁英競技標準往下推導，並參照蛙式框架比例校準。待田野驗證後更新。
levels:
- id: free.L0
  stroke: free
  level: L0
  name_zh: 呼吸感知建立
  tagline: 感受器啟動，讓感知準備好發生
  public:
    description: 安全感不是教出來的，是感知到可預期的規律之後自然產生的結果。當學生感覺到「吸氣身體浮起、吐氣身體沉下」這個規律，安全感就跟著出現了。安全感是 L0 的輸出，不是輸入。當學生感覺到呼吸和浮力的規律，安全感自然跟著出現。
    methods:
    - name: 陸上呼吸覺察（三層次）第一層　語言引導
      detail: 目的：啟動感受器，讓大腦開始習慣感覺身體內部的細微變化。三個層次依序進行，學生在能做到的層次停留就好。吸氣時感覺肚子往外推、肋骨往兩側擴開；吐氣時感覺它們慢慢回來
      cue: 吸氣的時候，注意一下肚子和肋骨有沒有任何變化？
    - name: 陸上呼吸覺察（三層次）第二層　手部輔助
      detail: 一手放腹部、一手放肋骨，感覺兩個部位在呼吸時的起伏
      cue: 把手放上去，感覺一下手下面的身體在做什麼？
    - name: 陸上呼吸覺察（三層次）第三層　物體輔助（躺下）
      detail: 肚子上放輕物（書或水瓶），感覺它隨呼吸起伏。重力輔助讓起伏更明顯，適合感知特別弱的學生
      cue: 看看這個東西會不會動？它在告訴你什麼？
    - name: 水中呼吸浮力連結　吸氣
      detail: 目的：讓學生感覺到呼吸和浮力之間的直接連結。不是教「應該感覺到什麼」，而是創造條件讓這個感知自己浮現。深吸一口氣，在水中靜止，讓身體自然漂浮
      cue: 吸氣之後，站在水裡不動，感覺一下身體有沒有什麼感覺？
    - name: 水中呼吸浮力連結　吐氣
      detail: 慢慢吐氣，感覺身體的變化和吸氣時是否不同
      cue: 現在慢慢吐氣，感覺有什麼不一樣嗎？
    - name: 水中呼吸浮力連結　反覆感覺
      detail: 重複幾次吸吐，讓學生自己感覺到這個規律
      cue: 試幾次，看看有沒有發現什麼？
    indicators:
    - type: 感受語
      text: 能說出吸吐氣時身體的任何變化——不規定說什麼，能說出任何觀察就是訊號
    - type: 里程碑
      text: 在水中能放鬆呼吸，不需要緊抓任何東西——這個狀態代表安全感已自然產生
    quant: 以行為觀察和感受語為主，無數字基準
- id: free.L1
  stroke: free
  level: L1
  name_zh: 漂浮與阻力感受
  tagline: 感知萌芽，開始感覺水的存在
  public:
    description: L1 的學生開始主動感覺水——不只是「待在水裡」，而是開始感覺水對身體做了什麼，以及自己對水做了什麼之後水有什麼反應。前庭感知說明：身體判斷自己在空間中位置和方向的能力。在水中，原本習慣陸地的方向感會暫時失準，需要重新校準。這不是問題，是正常的適應過程。
    methods:
    - name: 前漂
      detail: 目的：讓學生感覺到水的支撐力，建立「水會撐著我」的第一個直接感知。身體往前傾，臉入水，讓身體自然浮起。距離目標：3--5 公尺（依年齡體型調整）
      cue: 試著讓身體浮起來，注意一下有沒有感覺到什麼？
    - name: 漂後站立
      detail: 漂後站立同樣重要——學生知道「我可以隨時安全回來」，才敢放鬆去感覺浮力。漂浮後腳踩地站起來。讓學生知道「我隨時可以回到安全狀態」
      cue: 什麼時候想站起來都可以，自己決定。
    - name: 初步阻力感受　踢足球
      detail: 目的：讓學生感覺到「我對水施力，水有反應」。這是從被動感受浮力，轉向主動探索水的存在的關鍵步驟。教練確認：感受學生踢出的水壓——是否有一團有力道的水往前推出來
      cue: 腳踢出去的時候，感覺一下有沒有碰到什麼？
    - name: 初步阻力感受　三方向撥水
      detail: ①雙手張開往前抱 ②雙手胸前往前推 ③雙手往後撥水。教練確認：感受學生的水壓是否打到教練身上
      cue: 手推出去的時候，感覺一下手上有什麼感覺？
    indicators:
    - type: 外部觀察
      text: 腳開始嘗試離開水面（主動探索浮力）——這個自發行為代表學生開始信任水的支撐
    - type: 感受語
      text: 能說出水對身體的任何回饋描述——例如「感覺水在推我的手」。不規定說什麼，能說出任何互動感知就是訊號
    - type: 距離指標
      text: 前漂 3--5 公尺（依年齡和體型調整）
    quant: 以行為觀察和感受語為主，無數字基準。腳自發性地嘗試離開水面，是比任何語言描述更直接的感知萌芽訊號——學生的身體已經開始相信水會撐著它。距離指標為參考基準，個體差異大。感受語和外部行為的出現比距離更能反映真實的感知狀態。
- id: free.L2
  stroke: free
  level: L2
  name_zh: 推進感萌芽
  tagline: 開始感覺自己在移動，但水還沒有回應
  public:
    description: L2 的游泳者已經能移動，但大量力氣在製造波浪和掙扎，而不是前進。感覺快不等於真的快——這個階段的重點不是把動作做對，而是開始感覺自己在對水做什麼，以及水有沒有回應。核心原則：感覺先於效果。追求前進會讓學生用力，用力遮蔽感知。給探索時間——等待時間也是訓練，學生在無指令狀態下自己和水互動，感知有時在這個時候最自然發生。
    methods:
    - name: 浮板踢水前進
      detail: 教練外部確認：觀察學生能否穩定前進，確認推進力能傳導到身體水平方向。學生內部感知：感覺踢水的力道有沒有讓自己往前走，還是腳踢完但身體沒動
    - name: 浮板踢水前進　踢不動的處理
      detail: 教練外部確認：退回原地，觀察學生是否能在放鬆狀態下踢水。學生內部感知：放輕動作，前進不重要，先找到放鬆踢的感覺
    - name: 手部動作：外划＋內抱（連續動作）
      detail: 外划內抱是正式搖櫓 Sculling 的前身，讓學生感覺手掌角度改變時水壓方向跟著改變。感覺手掌轉向時水壓從一側換到另一側——方向不要求，感覺到換邊就夠了
      cue: 外划的時候感覺水壓在哪裡？內抱的時候水壓換到哪裡去了？
    - name: 手部動作：划手推進
      detail: 把外划內抱的感知帶進划手動作，感覺划手時有水在反應
      cue: 划手的時候，手有沒有感覺到什麼？
    - name: 換氣建立
      detail: 換氣是 L2 最容易打亂整體感知的環節。目標不是完美的換氣技術，而是換氣後動作不完全崩潰。
    - name: 搖櫓 Sculling 路徑（L2 等級）
      detail: 外划內抱，感覺水壓換邊，方向不要求。動作形式：外划＋內抱（連續動作）；感知目標：感覺手掌轉向時水壓從一側換到另一側（方向不要求）
      cue: 外划的時候感覺水壓在哪裡？內抱的時候水壓換到哪裡去了？
    indicators:
    - type: 觀察指標
      text: 換氣後動作是否能恢復——換氣後能繼續游而不需要停下來，代表基本換氣節奏建立
    - type: 感受語
      text: 能說出換氣時身體有什麼感覺，例如「換氣的時候感覺身體歪了」
    quant: 60 以上；尚無 SPL 基準；感知萌芽優先於數字
    stagnation: 先確認換氣是否是主要障礙——換氣恐慌會全面壓制感知發展，讓其他訓練效果無法累積。若換氣已不是問題，觀察浮板踢水是否能穩定前進：踢不動代表推進感尚未建立，退回放鬆踢水，不要求前進。若踢水前進已穩定但感受語仍無法出現，增加無指令的自由探索時間——感知有時在沒有要求的狀態下最自然發生。
- id: free.L3
  stroke: free
  level: L3
  name_zh: 水感出現但不穩定
  tagline: 抓到了，但下一趟又消失
  public:
    description: L3 是最讓人困惑的階段。游泳者偶爾能感覺到「啊，抓到了！」但下一趟又消失，不知道差別在哪裡。感知的不穩定性大多來自感知缺陷的方向不同——找到感知缺陷的主要方向，才能對應訓練。L3 有雙重身份：它是感知開始不穩定的階段，同時也是感知系統第一次精細到足以感知自己的硬體邊界。L0--L2 的感知還太粗糙，硬體邊界的影響被更大的感知缺陷掩蓋；到了 L3，感知稍微穩定後，學生才第一次能說出「我知道要怎麼做，但做不到」——這正是硬體邊界浮現的訊號，也是需要先釐清的分叉點。L3 正式引入搖櫓 Sculling：從外划內抱調整角度，讓兩側水壓都往後。動作可以大、可以慢，建立感知比效率重要。
    methods:
    - name: L3 共同指標——抓水感知
      detail: SWOLF（25m）目標 45--60　能否描述手「抓到」水的時間點　連續游數趟後抓水感是否消失。典型體驗：有時一趟游得很輕鬆，下一趟完全不對，不知道差在哪裡。對應訓練方向：外划內抱調整角度 → 正式搖櫓 Sculling：感受前臂角度改變時水壓跟著改變
    - name: L3 共同指標——划距感知（SPL）
      detail: 開始記錄 SPL（25m）　同距離不同趟 SPL 變異性　察覺「多划一下沒有換來更快」。典型體驗：划手數每趟不同，不知道這件事，或以為划越多越快。對應訓練方向：設定目標划數，在同一趟練習中維持固定 SPL
    - name: L3 共同指標——對稱感知
      detail: 慣用側 vs 非慣用側換氣的划數差異　錄影比對兩側划水弧度差異。典型體驗：強側手感覺有抓到，弱側手感覺划過去了，但不知道差這麼多。對應訓練方向：非慣用側呼吸：覺察動作不對稱帶來的感知差異
    - name: L3 共同指標——感知持久性
      detail: 游 200m 後 SWOLF（25m）飄移幅度（目標 ≤5 分）　疲勞時能否察覺技術開始崩潰。典型體驗：游前段感覺很好，後段完全不一樣但不知道為什麼。對應訓練方向：間歇訓練後刻意觀察感覺如何變化，建立疲勞覺察能力
    - name: 搖櫓 Sculling 路徑（L3 等級）
      detail: 外划內抱調整角度 → 正式搖櫓 Sculling。感知目標：感覺兩個方向的水壓都往後推。動作可以大、可以慢
      cue: 試著調整手掌角度，讓外划和內抱兩個方向的水壓都往你身後推。
    indicators:
    - type: 感受語
      text: 能說出「今天水感消失了，是因為＿＿」
    quant: SWOLF（25m）45--60；SPL（25m）差異 ≤ 2 划；SWOLF 穩定比數值更重要
    milestone: 共同里程碑（所有類型均需達到）：SWOLF（25m）穩定在 45--55、能說出「今天水感消失了，是因為＿＿」、SPL（25m）每趟差異 ≤ 2 划。
    stagnation: 先重新確認感知缺陷的主要方向——類型會隨訓練改變，停滯有時是因為主要感知缺陷已轉移，訓練方向還沒跟上。其次確認訓練是否在感知消失的狀態下繼續進行：感知消失後繼續游只會強化沒有水感的神經迴路。若兩者都排除，退回 L2 重新鞏固推進感，確認外划內抱的水壓換邊感知是否穩定。
  diagnostic:
    type_diagnosis:
    - q: Q1　握拳游和張開手游，速度差異大嗎？
      A: 差很大——張開手明顯快很多，手掌是主要推進依賴，前臂感知弱
      B: 差不多——推進主要靠腿，手部感知本來就薄弱
      C: 不確定——兩者都很用力但速度都差不多慢，全身張力高遮蔽了差異
    - q: Q2　浮板踢水時，能感覺到腳在「推水」嗎？
      A: 能感覺到——腳感還不錯，問題不在這裡
      B: 感覺很弱——踢了很久但感覺腳只是在打水，不確定有沒有推到
      C: 腳踝很緊，整條腿都很用力，感覺到的是肌肉在工作，不是水的反饋
    - q: Q3　游完之後，身體哪個部位特別疲勞？
      A: 肩膀和上臂特別累，但游的感覺不太對，好像在拉水而不是推水
      B: 大腿和小腿非常累，比手臂累很多
      C: 全身都很緊繃，特別是肩頸和上背，游完像是「繃著身體撐過去」
    type_states:
      A:
        appears: 手臂充分伸展、前臂微微下壓的瞬間偶爾出現。手擺對了就有，位置偏了就沒有
        disappears: 入水角度略微偏移、換氣動作打亂前臂位置、或太快進入拉水 phase
        typical_speech: 有時候感覺手有抓到什麼，但下一趟就沒了，我不知道我做了什麼不一樣
        swolf_pattern: 在某些趟次突然下降（感覺好的趟），但無法重現，趟間差異大
      B:
        appears: 特定節奏的踢水中偶爾出現，腳踝比較放鬆的那幾划突然感覺到水在腳背上
        disappears: 踢水頻率過快、膝蓋過度彎曲、或踢水節奏被划手帶亂
        typical_speech: 我知道我踢腿不夠有力，但我感覺不到水——不知道怎麼改才對
        swolf_pattern: SWOLF 整體穩定但偏高，改善幅度緩慢，增加划頻後 SWOLF 反而上升
      C:
        appears: 放鬆下來的前幾划偶爾出現，一旦開始「努力游」就消失
        disappears: 速度一提高就開始緊張，肌肉張力上升蓋過觸覺訊號
        typical_speech: 我放輕鬆的時候游得比較好，但一認真游就感覺不到水了，很矛盾
        swolf_pattern: 前幾趟還不錯，游到後半組迅速劣化；用力游時甚至比放鬆游更差
    type_training:
      A:
        tools: 單臂划水：隔離手感，觀察哪個位置手壓力最大　拳頭游 → 張開手：用「復活感」窗口讓大腦記住正確手感　外划內抱（手掌角度探索）：感覺水壓方向，不要求正式動作
        deprivation: 拳頭游 25m → 張開手 25m → 拳頭游 25m 交替，感受手掌「復活」的瞬間並刻意記住
        tracking: 追蹤「今天哪幾趟 SPL 突然少了一划」——分析那趟做了什麼不同
        traps: 避免大量划手板訓練——會讓手部依賴工具，掩蓋前臂感知問題
        cue: 划手時注意手掌跟前臂，感覺哪裡比較大力？　拳頭張開那一刻感覺到什麼了嗎？記住那個感覺。
        combo: 暖身搖櫓 5min → 拳頭/開手交替 4×25m → 單臂划水 4×25m → 感受語分享
      B:
        tools: 慢速踢水＋刻意停頓：每踢三下停一秒，讓學生感覺「水壓回彈」——比快踢更容易建立感知　穿襪踢水→脫掉：對比效應重建腳部感知
        deprivation: 穿襪浮板踢水 50m → 脫掉浮板踢水 25m，感受腳部感知「復活」後的清晰度
        tracking: 追蹤踢水節奏：刻意用較慢節奏踢水，觀察 SWOLF 是否改善
        traps: 避免強調「踢快一點」——頻率增加但感知沒有，只是加重腿部疲勞
        cue: 腳踢出去時，有沒有感覺水被往後推？　這樣踢和剛才踢，哪個感覺有推到東西？
        combo: 慢速踢水停頓練習 2min → 穿襪浮板踢 4×50m → 脫掉後浮板踢 2×25m（記錄感受語）
      C:
        tools: 拳頭游→張開手：透過對比讓感知「重開機」　閉眼游泳：移除視覺，逼大腦用觸覺感知補償
        deprivation: 游 4 趟 25m，前 2 趟刻意放慢感覺水，後 2 趟正常配速，比較兩者差異
        tracking: 追蹤「放鬆游 vs 用力游」的 SWOLF 差距——差距縮小代表感知遮蔽在減少
        traps: 避免大強度訓練——高張力狀態下訓練只會強化「用力游沒有水感」的神經迴路
        cue: 放輕一點游，手上的感覺和剛才用力游有什麼不一樣？　閉上眼睛，感覺水從哪個方向流過身體？
        combo: 閉眼漂浮感知 2min → 放鬆/用力對比游 6×25m（交替）→ SWOLF 差距記錄
    type_milestones:
      A: 感知重現能力：能在游完一趟後說「這趟第幾划手感對了」，且下一趟能刻意重現。感知持久性：連續游 4 趟 25m，至少有 3 趟能感覺到明確的抓水感。數字指標：拳頭游 vs 張開手的速度差縮小（前者達到後者的 85% 以上）
      B: 感知重現能力：能感覺到踢水時「有什麼在腳背上」，且能區分「踢到水」和「踢過水」。感知持久性：浮板踢水 100m 中，超過一半的時間能感覺到腳在推水而非打水。數字指標：加入踢腿後的游速，比只用划手游快 10% 以上
      C: 感知重現能力：能在提速時察覺「感知開始消失」的那個時間點，並刻意放慢讓感知回來。感知持久性：放鬆游 200m 全程能維持水感，不會因距離變長而消失。數字指標：「用力游」的 SWOLF（25m）不高於「放鬆游」超過 5 分
- id: free.L4
  stroke: free
  level: L4
  name_zh: 壓力下維持不住
  tagline: 找到了，但留不住
  public:
    description: L4 和 L3 最大的差別：L3 的問題是「找不到水感」，L4 的問題是「找到了但留不住」。放鬆狀態下幾乎都能感覺到水；但速度加快、疲勞累積、或心理壓力上升時，水感就消失了。搖櫓 Sculling 在 L4 的角色：水感消失後的重置工具，於組間休息或獨立訓練組使用。能用就好，不要求效率，效率的精細化留到 L5。L4→L5 的過渡不只是數字達到，更重要的是游泳者能「在游泳中進行內部對話」——知道自己現在在哪個狀態、出了什麼問題、怎麼調整。
    methods:
    - name: L4 共同指標——手部抓水感知
      detail: 能感覺到手掌和前臂的水壓差異——不只是手在動，而是感覺到水在反推　划手加速感：入水後手速是否逐漸加快　拳頭游 vs 張開手速度差縮小至 5 秒以內（25m）。典型體驗：有時能感覺到手「抓到水」，但不穩定，速度快時消失。對應訓練方向：Tornado Drill：感受手掌方向改變帶來的推進力差異
    - name: L4 共同指標——疲勞下的水感維持
      detail: 游 200--400m 後 SWOLF（25m）飄移幅度（目標 ≤5 分）　疲勞時能否主動察覺「手開始滑水」並調整。典型體驗：游到後半段完全沒有水感，知道有問題但不知道怎麼找回來。對應訓練方向：「新感知→舊感知→新感知」交替訓練：強化感知切換能力
    - name: L4 共同指標——搖櫓 Sculling 作為重置工具
      detail: 水感消失時能否用搖櫓 Sculling 找回手感　能用就好，不要求動作大小或速度。典型體驗：游到一半水感消失，不知道怎麼在游泳中途把它找回來。對應訓練方向：水感消失後，可於組間休息時做搖櫓重置，或在訓練組合中設置獨立搖櫓組接游泳趟，兩者均可，教練依學生狀況選擇
    - name: L4 共同指標——感知描述能力
      detail: 能否在游完後指出「哪個環節水感消失了」　能否在游泳中進行「內部對話」：調整細節，觀察感覺。典型體驗：知道有問題，但只能說「感覺不對」，無法指出具體哪裡。對應訓練方向：焦點游泳（Focal Point Swimming）：每趟只注意一個感知點
    - name: 搖櫓 Sculling 路徑（L4 等級）
      detail: 搖櫓 Sculling 作為重置工具。感知目標：水感消失後，於組間休息或獨立搖櫓組重置手感。能用就好，不要求效率
      cue: 水感消失了，停下來做幾下搖櫓 Sculling，感覺回來了再繼續游。
    indicators:
    - type: 感受語
      text: 能描述「今天水感在第幾趟第幾划消失，原因是＿＿」
    quant: SWOLF（25m）40--50；疲勞後飄移 ≤5；Stroke Index ≥ 2.2；依學生能力觀察 200--400m
    milestone: 共同里程碑（所有類型均需達到）：SWOLF（25m）穩定在 40--50、疲勞後 SWOLF（25m）飄移 ≤5、能描述「今天水感在第幾趟第幾划消失，原因是＿＿」、具備基本划頻感知（能感受高划頻和低划頻的差異）。
    stagnation: 先確認組間搖櫓重置是否有效。若無效，代表基礎手感在 L3 尚未鞏固，需要退回處理。若有效但維持時間短，增加「新感知→舊感知→新感知」交替訓練頻率，拉長感知維持的窗口。同時確認訓練強度——在感知消失的狀態下持續高強度訓練，只會強化無水感的迴路。
  diagnostic:
    type_diagnosis:
    - q: Q1　速度加快時，哪裡最先「不對了」？
      A: 手的感覺消失——感覺手開始在滑水，推不到東西，但還在划
      B: 踢腿節奏亂掉——感覺腿的節奏被打亂，和手配合不起來
      C: 全身都變緊——感覺自己開始「掙扎」，全部的感覺都消失，只剩用力的感覺
    - q: Q2　游到後半段，最先感覺到的變化是什麼？
      A: 手感消失，但踢腿還在，常常開始靠腿撐完後半段
      B: 腿開始很沉或很累，感覺腿在拖累速度而不是幫助推進
      C: 整個感覺「脫節」——手和腿都還在動，但感覺不到水，像是在自動駕駛
    - q: Q3　被計時或被人看著游，有什麼變化？
      A: 手感消失得更快——心理壓力讓入水角度或抓水時機偏掉
      B: 踢腿變得更用力但更沒效率——緊張時腿踢更快但感覺更差
      C: 全身緊繃得更嚴重——任何壓力都會讓肌肉張力升高，感知全部被遮蔽
    type_states:
      A:
        trigger: 速度提升到約 80% 最大強度時，入水角度開始偏移，抓水感消失
        compensation: 手臂划頻加快（用頻率補感知），SPL 上升但推進力沒有增加
        loss_speed: 通常是漸進的——先是偶爾滑過去，然後越來越頻繁，最後完全消失
        vs_prev_level: L3：找不到手感。L4：能找到，但提速就失去
      B:
        trigger: 划手節奏加快時，踢腿跟不上，節奏錯位後踢水開始打空
        compensation: 大腿接管踢水，膝蓋彎曲增加，踢水幅度加大，耗氧量急速上升
        loss_speed: 通常是突然的——某個節拍踢錯了，之後整個節奏就亂掉了
        vs_prev_level: L3：踢水幾乎感知不到。L4：放鬆時腳感不錯，但負荷加重後整合能力崩潰
      C:
        trigger: 「我要認真游了」這個意念本身就是觸發點——心理壓力直接轉化為全身肌肉張力
        compensation: 划頻提高＋頭部抬高（想靠視覺補償感知），阻力增加，效率急劇下降
        loss_speed: 通常是同步的——一緊張就全部消失，沒有中間過渡狀態
        vs_prev_level: L3：一用力就消失。L4：中低強度能維持，但高強度仍然觸發全面消失
    type_training:
      A:
        tools: Tornado Drill：感受手在水中製造渦流，建立手速加速曲線的感知　凍結動作法：游泳中途凍結手臂，回看手掌朝向，校準本體感覺失真
        stress_training: 在接近 85% 強度游 25m，立刻接一趟慢速 25m，在慢速趟感受手感「回來」的瞬間
        traps: 避免感知消失後繼續硬游——在感知消失後繼續游只是強化沒有水感的神經迴路
        cue: 這趟衝完，手感是第幾划開始消失的？　接下來慢游，找到手感之後再告訴我。
        combo: 85% 衝刺 4×25m（每趟記錄手感消失在第幾划）→ 搖櫓重置 → 慢游接回感知
      B:
        tools: 慢速踢水停頓（L3 升級版）：每踢五下停一秒，感覺踢腿節奏與划手是否同步　2打腿訓練：強制以低頻踢腿配合划手，讓踢腿和划手的整合感知浮現
        stress_training: 設計節奏崩潰→重建組：故意游一趟讓踢腿節奏亂掉，下一趟刻意慢速重建
        traps: 避免純踢腿訓練——L4 的核心是整合而非力量，單獨強化踢腿力量幫助有限
        cue: 游到一半，踢腿有跟上划手嗎？有沒有感覺腿開始自己跑？　節拍器響時，手還是腿先動？
        combo: 節拍器設定划頻 → 2打腿整合 6×50m → 最後 2 趟拿掉節拍器，感覺節奏是否留住
      C:
        tools: 節奏器訓練：用 Tempo Trainer 固定踢腿節奏，感受節奏一致時的滑順感　「速度爬梯」訓練：從極慢速開始，每趟微微加速，找到感知開始消失的臨界點　呼吸控制訓練：刻意放慢呼吸節奏，用呼吸抑制過度緊張的肌肉反應
        stress_training: 「觀眾模擬」訓練：請人站在池邊計數划數，在被觀察的壓力下維持水感
        traps: 避免高強度訓練為主——高張力狀態下訓練次數越多，「緊張→無感知」的迴路越強化
        cue: 我站在旁邊，感覺一下水感有沒有改變？　提速後感覺不到了，先降速找回來，找回來了再說。
        combo: 速度爬梯 50%→70%→85% 各 1×50m → 組間韻律呼吸 30s → 記錄感知消失的強度臨界點
    type_milestones:
      A: 壓力下的感知維持：在 80--85% 最大強度游 50m，全程（或至少前 80%）能維持手部抓水感。失效後的恢復速度：水感消失後，能在 3 划以內察覺並調整入水角度找回手感。數字指標：Stroke Index 在接近競技配速時能維持 ≥2.2（25m 池）
      B: 壓力下的感知維持：游 200--400m，踢腿節奏能維持整合，不出現「節奏突然崩潰」。失效後的恢復速度：踢腿節奏崩潰後，能在半趟以內重建節奏。數字指標：長距離游完後最後段的 SWOLF，不超過第一段 8 分以上
      C: 壓力下的感知維持：在被他人觀察或計時壓力下，能維持和獨自練習時相似的 SWOLF（差距 ≤3 分）。失效後的恢復速度：提速後感知消失，能主動降速讓感知回來，而非繼續用力硬游。數字指標：「全力游」的 SWOLF 不超過「放鬆游」8 分
- id: free.L5
  stroke: free
  level: L5
  name_zh: 感知自動化過渡期
  tagline: 讓感知在自動化的過程中不要失真
  public:
    description: L5 的核心問題和 L2--L4 本質上不同。L2--L4 都在「建立感知」，L5 開始是「讓感知在自動化的過程中不要失真」。動作監控正在從刻意注意移到背景運作，感知因此浮出前景——但這個轉換在壓力下尚未穩固。搖櫓 Sculling 在 L5 進入精細化階段：動作變小、反應變快、在競技壓力下仍然有效。這是 L4「能用就好」的進階版。L5→L6 的過渡不只是數字達到，更重要的是感知能在全速和壓力情境下仍然穩定運作——不需要刻意注意，水感自動在背景維持。
    four_problems: 'L5 的四個主要問題：

      - Drill 感知無法遷移到全速游泳：Drill 是刻意、隔離、慢速的感知；全速游泳需要動作監控退到背景，讓感知主導運作。兩者之間需要刻意的遷移訓練，不會自動發生。

      - 高張力下感知被遮蔽：比賽壓力或衝刺時，全身肌肉張力升高，把感知訊號遮蔽掉。高強度會讓所有人的張力都拉高。

      - 外部節奏容易覆蓋內在節奏感：被帶快後繼無力；被帶慢沒有發揮出應有速度。根源是內在節奏感還不夠穩固。

      - 早期感知尚不穩定：偶爾能感覺到動作開始變形的早期訊號，但在壓力或高強度下容易消失——這是 L5 要刻意訓練的核心能力。'
    methods:
    - name: L5 共同指標——Drill 遷移感知
      detail: Drill 游完立刻接全速 25m，觀察水感是否維持　SWOLF 差距：Drill 趟 vs 全速趟，目標差距 ≤5。典型體驗：全速游時水感消失，但 Drill 時都有——兩個狀態無法連結。對應訓練方向：遷移訓練：Drill 結束不停頓，直接接全速趟，讓感知慣性延續
    - name: L5 共同指標——全速下水感維持
      detail: 85% 強度 50m 全程 SWOLF 飄移 ≤3　能在衝刺中途感覺到「手感開始滑」並自我調整。典型體驗：一全力游就什麼都感覺不到，游完才發現動作跑掉了。對應訓練方向：監控游：每趟結束後自問「手感維持到第幾划？踢腿有跟上嗎？」
    - name: L5 共同指標——節奏感自主性
      detail: 不看錶估配速誤差 ≤5 秒（100m）　有其他人在旁邊游時，能維持自己的節奏不被帶走。典型體驗：被帶快時繼無力；被帶慢時發揮不出來——節奏完全依賴外部。對應訓練方向：體感驗證：游完估配速，再核對實際數字，縮小落差
    - name: L5 共同指標——早期崩潰覺察
      detail: 能在游泳中途感覺到動作開始變形（不等到游完才察覺）　覺察後能主動調整，不只是繼續撐。典型體驗：偶爾能在動作開始變形時察覺，但不穩定——壓力一上來就退回「游完才發現」的狀態。對應訓練方向：單一感知點游：每趟只盯一個指標（踢腿節奏 or 入水角度），感覺它什麼時候開始偏
    - name: 搖櫓 Sculling 路徑（L5 等級）
      detail: 搖櫓 Sculling 精細化。感知目標：動作小、反應快、在競技壓力下仍有效
      cue: 同樣的重置，試著用更小的動作達到同樣的效果。
    indicators:
    - type: 里程碑
      text: 能在游泳中途察覺動作開始變形並主動調整
    quant: SWOLF（25m）35--45；各配速差異 ≤3；節奏感建立為重點
    milestone: 共同里程碑（所有類型均需達到）：SWOLF（25m）穩定在 35--45、各配速下 SWOLF 差異 ≤3、能在游泳中途察覺動作開始變形並主動調整。里程碑：Drill 遷移——Drill 裡的感知能帶進全速游泳，不需要刻意提醒，水感在全速時仍然存在；節奏穩固——不看錶估配速的誤差 ≤5 秒（100m），在有其他人游的情況下能維持自己的節奏；早期崩潰覺察——能在游泳中途感覺到「踢水開始變慢」或「入水角度開始偏」等動作變形的早期訊號，並做出調整。
    stagnation: 分兩個方向排查：若 Drill 感知無法遷移到全速，代表兩者之間缺乏過渡訓練，增加不停頓直接接全速的遷移組；若壓力下感知仍全面消失，不論主要缺陷在哪裡，加入呼吸放鬆訓練優先處理張力問題。若兩者都已處理，重新核對 SWOLF 飄移數字——感知主觀上覺得進步，數字有時尚未反映。以上停滯判斷為教學實務推導，非獨立研究驗證，建議對照現場觀察調整。
  diagnostic:
    type_diagnosis:
    - q: Q1　全速游時，最先消失的感知是什麼？
      A: 手感——覺得手還在划，但感覺不到水在推，像是空划
      B: 踢腿節奏——腿還在動，但不知道有沒有跟上手，感覺脫節
      C: 整體感知——速度一上來就什麼都感覺不到，只剩用力的感覺
    - q: Q2　被其他人帶著游（跟游或旁邊有人計時），感知怎麼變？
      A: 手感消失得更快——但速度確實快一點，容易忽略手感消失的事
      B: 踢腿節奏最先亂掉，開始跟不上，中段明顯掉速
      C: 全身馬上變緊，感知比獨自游時消失得更快更全面
    - q: Q3　Drill 練完接全速游，水感能帶過去嗎？
      A: 手感能帶過去幾划，但很快消失——難以在全速下維持
      B: 踢腿感知帶不過去——全速後腿就自己跑了，和手脫節
      C: 完全帶不過去——一全力就回到緊繃無感的狀態
    type_states:
      A:
        trigger: 衝刺時划頻提高，入水角度細微偏移，抓水感消失——高強度下時間參數先失準，空間路徑暫時維持，學生不一定察覺（Aujouannet et al., 2006）
        compensation: 划頻上升補感知——划得更快但推進效率沒有對應提升，SPL 上升但速度沒有跟上
        loss_speed: 漸進——先偶爾空划，然後越來越頻繁，不容易自己察覺
        vs_prev_level: L4：提速後抓水感消失。L5：高速下抓水感偶爾還在，但無法穩定維持
      B:
        trigger: 划頻加快後踢腿整合開始不穩定；被外部節奏帶快時最先出現節奏錯位（機制推導）
        compensation: 踢腿幅度加大、膝蓋彎曲增加，試圖用力量補節奏，耗氧急升且效率更差（機制推導）
        loss_speed: 突然——某個節拍踢錯後整個節奏就亂，之後難以在游泳中重建
        vs_prev_level: L4：長距離踢腿節奏崩潰。L5：節奏能維持，但外部干擾一出現就失去整合
      C:
        trigger: 比賽壓力觸發焦慮，已自動化的動作被刻意監控，反而干擾執行——顯性監控理論的核心機制（Beilock & Carr, 2001）
        compensation: 頭部微微抬高、換氣頻率增加，試圖靠視覺補回消失的感知——焦慮降低本體感覺預測精確度，動作預測和實際動作脫鉤（ScienceDirect, 2023）
        loss_speed: 同步——壓力一出現就全面消失，不像 A/B 型有過渡狀態
        vs_prev_level: L4：高強度全面消失。L5：中低強度能維持，但比賽壓力仍觸發全面消失
    note: 三型行為表現是從教學實務推導，尚未系統性驗證。歡迎在教學現場對照觀察後回饋，讓這部分持續更新。
    type_training:
      A:
        tools: Drill 接全速遷移訓練（不停頓直接接）　衝刺手感監控（每趟記錄手感維持到第幾划）　體感配速訓練（不看錶估配速後核對）
        stress_training: 85% 衝刺後立刻問「這趟手感維持到第幾划」，接慢速趟找回手感，記錄差距是否縮小
        traps: 避免只做 Drill 不接全速——感知遷移不會自動發生，兩者必須刻意連結
        cue: 這趟全速游完，手感是第幾划開始消失的？　Drill 游完直接接全速，感覺水感帶過去了嗎？
        combo: Drill 4×25m（不停頓接全速）→ 衝刺 4×25m（每趟記錄手感消失時間點）→ 體感估配速核對
      B:
        tools: 配速游（設定目標配速，練習在有其他人游的情況下維持節奏）　節拍器校準（內化節奏後拿掉工具驗證）　Drill 接全速遷移訓練
        stress_training: 在有其他人游的道次練習，感覺節奏有沒有被影響；每趟結束後問「踢腿有跟上划手嗎」
        traps: 避免只練划頻而不練節奏整合——划頻提升但踢腿跟不上，效率不會改善
        cue: 旁邊有人游的時候，你的節奏有沒有被影響？　游完估一下你的配速，然後我們來核對。
        combo: 節拍器設定划頻 → 有人游的道次配速游 6×50m → 拿掉節拍器 2 趟，感覺節奏是否留住
      C:
        tools: 節拍器優先建立穩固節奏基準　韻律呼吸訓練（高強度後快速回到放鬆狀態）　壓力情境模擬（觀眾、計時）
        stress_training: 請人站在池邊計時或觀看，練習在「被看」的情況下維持感知；逐步縮短壓力游和獨自游的 SWOLF 差距
        traps: 避免高強度主導訓練——在無感知狀態下重複高強度，只會強化「緊張→無感知」的迴路
        cue: 我現在站在旁邊計時，感覺一下水感有沒有改變？　這趟用節拍器，下一趟拿掉，感覺節奏留住了嗎？
        combo: 韻律呼吸暖身 → 壓力情境游（有人計時）4×50m → 記錄壓力游 vs 獨自游 SWOLF 差距
    type_milestones:
      A: 壓力下的感知維持：85% 強度 50m，全程（或至少後半段）能持續感覺到手在推水，不是空划。Drill 遷移能力：Drill 結束直接接全速 25m，手感能維持前 4 划以上。數字指標：各配速下 SWOLF 差異 ≤3；衝刺趟手感消失划數比剛進 L5 時明顯延後
      B: 壓力下的感知維持：有其他人在旁邊游時，踢腿節奏能維持整合，不出現「腿突然自己跑」。Drill 遷移能力：Drill 接全速後，踢腿節奏能跟上至少前半趟，不在起跑後馬上脫節。數字指標：不看錶估配速誤差 ≤5 秒（100m）；長距離後段踢腿節奏崩潰次數明顯減少
      C: 壓力下的感知維持：在被計時或觀察的壓力下，SWOLF 與獨自練習差距 ≤3 分。Drill 遷移能力：Drill 接全速後，感知不會在第一划就消失——能維持至少幾划的有感知狀態。數字指標：壓力游 vs 獨自游 SWOLF 差距 ≤3 分；能在游泳中途主動察覺感知消失並調整
- id: free.L6
  stroke: free
  level: L6
  name_zh: 感知自動化完成
  tagline: 注意力可以完全放在配速和策略
  public:
    description: L6 的感知已完全移到背景運作，不需要刻意注意水感。L6 和 L5 最本質的差異，不在於「正常狀態有多好」，而在於「出問題時的反應層次不同」。L5 出問題：能感覺到動作開始變形（踢水變慢、入水角度偏）。L6 出問題：能感覺到划距剛開始縮短的瞬間——這是最早、最隱性的疲勞訊號。超出體能極限（機械失效）的崩潰不是水感問題，任何人的感知在這個時候都會失效。L6 的水感描述只適用於機械失效之前的範圍。
    fatigue_collapse_four_layers: '疲勞崩潰的四個層次（層次｜崩潰內容｜外部可見度｜哪個 L 能察覺）：

      第一層｜划距開始縮短（最早、最隱性）｜幾乎看不出來｜L6 能察覺

      第二層｜踢水開始變慢、入水角度開始偏｜訓練有素的教練可察覺｜L5 開始能察覺

      第三層｜拖肘、划手路徑超過中線、左右不對稱｜教練從池邊可看到｜L4 通常在這層才察覺

      第四層｜換氣改變（抬頭）、動作全面崩壞｜所有人都看得出來｜機械失效前的最後防線'
    state_description: 'L6 狀態描述（狀態｜游泳者自己的感受｜教練可觀察到的行為）：

      正常狀態｜不需要想水感，注意力在配速和距離，但水感一直在背景運作｜動作穩定，划距一致，SPL 在正常範圍內波動極小

      出問題時（體能極限前）｜有一瞬間感覺推進少了一點，身體自己調整了，繼續游。游完後才意識到「剛才有一瞬間不太對」｜幾乎看不出來，可能只有一到兩划的划距微微縮短，隨即自動恢復

      超出體能極限｜整個感覺都消失了，只剩撐下去的意志。這是機械失效，不是水感問題｜划距明顯下降，划頻急速上升，動作開始變形'
    kaizen: '持續精進指標（Kaizen）：L6 之後的精進方向，不是感知更敏銳，而是神經系統把正確時序固化到感知介入之前——動作從「感覺到才調整」變成「從不需要調整」。崩潰訊號覺察越來越早，正是這個方向的外部指標。


      L6 沒有終點，只有「還能更細」的方向：

      - 能感知到崩潰訊號的時間點越來越早——理想狀態是在划距開始縮短的第一划就察覺

      - 自動微調的幅度越來越小、越來越精準——不需要大幅調整，微小修正就能維持推進效率

      - 搖櫓 Sculling 動作越來越精簡，但重置效果仍然有效——動作大小反映感知精細程度

      - 比賽和訓練的 SPL 差值趨近於零——感知在任何情境下都同樣穩固'
    methods:
    - name: 搖櫓 Sculling 路徑（L6 等級）
      detail: 搖櫓 Sculling 作為感知精細度的自我檢核。感知目標：動作越來越小但仍然有效，反映感知精細程度的持續提升
      cue: 你現在做搖櫓 Sculling 需要多大的動作才能感覺到水壓？
    quant: SWOLF（25m）30--38；比賽 vs 訓練差值趨近零；感知為主，數字為持續精進參考
- id: back.L0
  stroke: back
  level: L0
  name_zh: 呼吸感知建立
  tagline: 跨泳式通用，直接沿用自由式框架
  public:
    description: L0 的內容與自由式完全相同------陸上呼吸覺察三層次、水中呼吸浮力連結、感受語里程碑。 仰式不需要重複設計 L0，直接參照 `Technica/自由式水感框架.md` L0 章節。 ※ 安全感是 L0 的輸出，不是輸入。當學生感覺到呼吸和浮力的規律，安全感自然跟著出現。
    quant: 以行為觀察和感受語為主（L0/L1 無 SPL 基準）
- id: back.L1
  stroke: back
  level: L1
  name_zh: 仰漂感知建立
  tagline: 躺下去，感覺水在哪裡
  public:
    description: 仰式最大的感知挑戰不是動作，是方向感。臉朝上、看不到前方、耳朵入水------這些對身體來說都是陌生的訊號。 在任何動作開始之前，學生需要先讓身體接受「這個狀態是安全的」。 ※ 浮板的角色是移除「擔心沉下去」的背景焦慮。學生不需要用力維持身體位置，感知資源才能真正往內走。 【入水與感知啟動】面對浮板站著，雙手拿住浮板平放水面（浮板在水面上穩定漂著，學生有東西可以依靠）； 慢慢後仰躺下去（躺的速度慢，感知資源有時間跟上動作）；躺的過程中讓下腹去找浮板，大腿跟著貼上去 （身體主動去找浮板，水平感知在躺的過程中自然建立）；下腹找到浮板，身體靜止（靜止的瞬間是感知最容易打開的時機）。 【三層感知掃描】第一層胸口：觀察胸口隨浮力起伏------吸氣升起、吐氣下沉，這是浮力最直接、最明顯的訊號； 第二層耳朵：感覺耳朵入水後聲音的變化，讓身體接受這個狀態是安全的； 第三層腳：感覺腳有沒有被水面托著（能感覺到最好，感覺不到不擋路）。 ※ 三層掃描不是依序完成的清單。有些學生胸口訊號最先來，有些學生耳朵的變化更明顯。引導語是創造條件，不是規定感知應該從哪裡開始。
    methods:
    - name: 面對浮板站著，雙手拿住浮板平放水面
      detail: 浮板在水面上穩定漂著，學生有東西可以依靠
      cue: 「把浮板放平，感覺一下它有沒有在水面上？」
    - name: 慢慢後仰躺下去
      detail: 躺的速度慢，感知資源有時間跟上動作
      cue: 「慢慢往後躺，不用急。」
    - name: 躺的過程中讓下腹去找浮板，大腿跟著貼上去
      detail: 身體主動去找浮板，水平感知在躺的過程中自然建立
      cue: 「躺下去的時候，讓下腹去找浮板，感覺找到了嗎？」
    - name: 下腹找到浮板，身體靜止
      detail: 靜止的瞬間是感知最容易打開的時機
      cue: 「找到了，感覺一下胸口有沒有在動？」
    - name: 三層感知掃描 第一層　胸口
      detail: 觀察胸口隨浮力起伏------吸氣升起、吐氣下沉。這是浮力最直接、最明顯的訊號
      cue: 「吸氣的時候胸口有沒有往上？吐氣的時候呢？」
    - name: 三層感知掃描 第二層　耳朵
      detail: 感覺耳朵入水後聲音的變化，讓身體接受這個狀態是安全的
      cue: 「耳朵裡的聲音，和剛才在空氣裡一樣嗎？」
    - name: 三層感知掃描 第三層　腳
      detail: 感覺腳有沒有被水面托著（能感覺到最好，感覺不到不擋路）
      cue: 「腳有沒有感覺到什麼？」
    indicators:
    - type: 入水動作
      text: 躺下去的過程中下腹有找到浮板，不需要教練協助擺位
    - type: 靜止狀態
      text: 身體靜止後感覺得到水在撐著自己，不是自己在撐自己
    - type: 感受語
      text: 能說出胸口、耳朵或腳的任何感知變化------不規定說什麼，能說出任何觀察就是訊號
    quant: 以行為觀察和感受語為主（L0/L1 無 SPL 基準）
    stagnation: 躺下去下腹一直沉，找不到浮板 → 先不要急著掃描。讓學生重複躺下去的動作，只專注「下腹有沒有碰到浮板」這一件事。 躺平了但感覺不到水在撐 → 「感覺一下胸口，有沒有隨著呼吸在起伏？」------把注意力引向浮力最明顯的地方。 三層都感覺不到，說不出任何觀察 → 退回陸上：手放胸口感覺呼吸起伏，啟動感受器之後再回到水中重新開始。
- id: back.L2
  stroke: back
  level: L2
  name_zh: 推進感萌芽
  tagline: 開始感覺動作有沒有讓自己往前走
  public:
    description: L2 的仰式學習者已經能仰漂，但開始移動之後感知資源會被分散------踢腿、划手同時出現，不知道要注意哪裡。 這個階段的重點不是把動作做對，而是開始感覺「我對水做了什麼，水有沒有回應」。 核心原則：腿和手分開建立感知，呼吸節奏同步確認。L2 不分辨感知缺陷的方向。 ※ 仰式換氣天生暢通，但暢通不等於有節奏。呼吸節奏是動作節奏的底層------學生如果在移動中感覺不到自己的呼吸，划手和踢腿的節奏很難穩定。 【腿部感知建立】仰式踢腿的核心感知是「腳背往上踢，感覺一團水被往上推，身體往前走」。 下踢是回收動作------另一隻腳的重量自然帶它下去，不需要學生刻意控制。 【手部感知建立】仰式 L2 的手部感知邏輯和自由式相同------外划內抱，感覺手掌和前臂的水壓方向。 仰式身體朝上，外划內抱在水面下進行，水壓回饋的方向和自由式略有不同，但感知目標一樣：感覺手掌轉向時水壓從一側換到另一側。
    methods:
    - name: 手持浮板仰式踢水
      detail: 手部固定，感知資源全在腿部
      cue: 「腳往上踢的時候，有沒有感覺到一團水被往上推？」
    - name: 確認推進力往前
      detail: 觀察學生是否穩定前進
      cue: 「踢完之後，身體有沒有往前走？」
    - name: 確認呼吸節奏維持
      detail: 移動中確認腹式呼吸還在
      cue: 「踢水的時候，肚子有沒有還在起伏？」
    - name: 站立水中外划內抱
      detail: 身體穩定，感知資源全在手部
      cue: 「外划的時候感覺水壓在哪裡？內抱的時候水壓換到哪裡去了？」
    - name: 仰漂加入外划內抱
      detail: 確認站立時的感知能帶進仰漂狀態
      cue: 「划手的時候，手有沒有感覺到什麼？」
    indicators:
    - type: 腿部
      text: 浮板仰式踢水能穩定前進，能感覺到水團往上被推
    - type: 手部
      text: 外划內抱能感覺到水壓換邊，不規定方向
    - type: 呼吸
      text: 移動中肚子起伏還在，沒有憋氣踢水
    - type: 感受語
      text: 能描述手或腳「碰到了什麼」或「推到了什麼」
    quant: 尚無基準（感知萌芽優先於數字）
    stagnation: 【腿部】踢水但感覺不到水團往上 → 先單腳練習------一隻腳踢，專注感覺那隻腳的水團，再換另一隻腳，最後才交替。 踢水有感知但身體沒有前進 → 確認腳踝蹠屈柔韌性是否足夠------腳踝僵硬會讓腳背無法朝後，推進力大幅下降， 嚴重時踢腿甚至產生反向阻力（McCullough et al. 2009/2010）。柔韌性訓練優先於力量訓練，蛙鞋輔助同時有效。 踢水前進但呼吸停掉了 → 退回仰漂，重新感覺肚子起伏，確認呼吸節奏建立後再開始踢腿。 【整合】踢腿有感知但手部感覺不到水壓換邊 → 退回站立水中外划內抱，確認靜止狀態下感知建立後再帶進仰漂。 手腳都有感知但移動中呼吸停掉 → 先只踢腿不划手，專注確認呼吸節奏在移動中能維持，再加回手部動作。 手腳呼吸都有但說不出感受語 → 增加無指令的自由探索時間------學生在沒有要求的狀態下，感知有時最自然發生。
- id: back.L3
  stroke: back
  level: L3
  name_zh: 水感出現但不穩定
  tagline: 抓到了，但下一趟又消失
  public:
    description: L3 的仰式學習者已經能連續游，偶爾會感覺「這趟游得很順」，但下一趟又回到掙扎狀態。 感知的不穩定大多來自感知缺陷的方向不同------找到感知缺陷的主要方向，才能對應訓練。
    indicators:
    - dimension: 划手感知
      measure: 划手時有沒有感覺到水壓；連續游數趟後水壓感是否消失
      experience: 有時划手感覺有推到什麼，下一趟又感覺手划過去了
      training: 單臂划水隔離手感；拳頭游→張開手復活感
    - dimension: 踢腿感知
      measure: 上踢時水團感知有沒有穩定出現；踢完身體有沒有繼續往前
      experience: 偶爾踢腿感覺推到水了，但下一趟又消失，不知道差在哪裡
      training: 單腳練習建立感知；穿襪踢水→脫掉對比效應
    - dimension: 身體水平感知
      measure: 耳朵有沒有維持在水裡；額頭有沒有維持不碰水
      experience: 慢游還好，稍微加速之後感覺阻力變大，但不知道身體跑掉了
      training: 仰漂確認雙指標；加速後立刻回仰漂感覺耳朵和額頭位置
    - dimension: 感知持久性
      measure: 連續游四趟後感知是否消失；能否察覺哪一趟開始不對
      experience: 前一兩趟還好，第三趟開始完全不一樣，但不知道什麼時候跑掉的
      training: 每趟游完立刻說出感知狀態，建立疲勞覺察習慣
    quant: SPL（25m）每趟差異 ≤ 2 划（感知穩定比數值更重要）
    milestone: 共同里程碑：能完成連續仰式換氣不中斷、能說出「今天水感消失了，是因為＿＿」、SPL 每趟差異 ≤ 2 划。
    stagnation: 先重新確認感知缺陷的主要方向------類型會隨訓練改變，停滯有時是因為主要感知缺陷已轉移，訓練方向還沒跟上。確認之後走以下分叉： 若重新指向不同的主要缺陷，切換訓練方向，觀察兩週。若類型沒有改變，確認訓練是否在感知消失的狀態下繼續進行------ 感知消失後繼續游只強化無水感迴路，這比類型判斷錯誤更常見。若以上兩者都排除，退回 L2 分別確認： 仰漂雙指標（耳朵入水、額頭不碰水）是否穩定、踢腿推進感是否分別成立------L3 停滯有時不是 L3 的問題，而是 L2 基礎尚未完整。
  diagnostic:
    type_diagnosis:
    - q: Q1　划手的時候，手有沒有感覺到什麼在推它？
      A: 感覺很弱或沒有------手划過去了但沒碰到什麼
      B: 有一點感覺，問題不在這裡
      C: 不確定------有時有有時沒有，跟加速有關
    - q: Q2　上踢的時候，有沒有感覺到一團水被往上推？
      A: 有一點感覺，問題不在這裡
      B: 感覺很弱------踢了但不確定有沒有推到水，踢完身體也沒有繼續往前
      C: 不確定------放鬆的時候偶爾有，一加速就消失
    - q: Q3　游的時候，耳朵有沒有一直在水裡？額頭有沒有感覺到空氣？
      A: 大概有，不太確定
      B: 大概有，不太確定
      C: 說不清楚------沒有特別注意過，或者感覺一直在變
    type_states:
      A:
        appears: 某趟手入水角度剛好，前臂壓到水的瞬間偶爾出現
        disappears: 手入水角度偏移，或划手太快前臂來不及建立水壓
        typical_speech: 「有時候划手感覺有推到什麼，但大部分時候感覺手划過去了」
        spl_pattern: SPL 不穩定，某些趟突然少一划（感覺好的趟），但無法重現
      B:
        appears: 踢腿節奏對了、腳踝放鬆的那幾划偶爾出現
        disappears: 踢腿節奏被划手帶亂，或腳踝不自覺緊繃，推力方向跑掉
        typical_speech: 「我有在踢，但感覺踢完身體沒有往前，不知道問題在哪裡」
        spl_pattern: SPL 偏高且穩定，踢腿沒有有效貢獻推進，只能靠增加划數前進
      C:
        appears: 極度放慢時偶爾出現，感覺身體水平、阻力消失，但不知道自己做了什麼不一樣
        disappears: 感知不到頭部偏離的訊號------耳朵出水或額頭碰水了但不知道，屁股跟著沉
        typical_speech: 「慢慢游還好，一加速就感覺阻力很大，像在爬坡，但不知道哪裡出了問題」
        spl_pattern: SPL 變化不定，加速游反而划數更多但沒有變快
    type_training:
      A:
        core_tools: 拳頭游→張開手（復活感重新校準划手感知）；單臂划水（隔離手感，感覺哪個位置水壓最大）；Sculling 建立前臂感知
        deprivation: 拳頭游 25m → 張開手 25m → 拳頭游 25m 交替，感受手掌「復活」的瞬間並刻意記住
        number_focus: 追蹤「今天哪幾趟 SPL 突然少了一划」------分析那趟做了什麼不同
        trap: 避免大量划手板訓練------會讓手部依賴工具，掩蓋前臂感知問題
        cue: 「划手時注意手掌跟前臂，感覺哪裡比較大力？」「拳頭張開那一刻感覺到什麼了嗎？記住那個感覺。」
        combo: 暖身 Sculling 5min → 拳頭/開手交替 4×25m → 單臂划水 4×25m → 感受語分享
      B:
        core_tools: 單腳踢水（隔離感知，專注一隻腳的水團）；穿襪踢水→脫掉（對比效應重建腳部感知）；垂直踢水（感受上踢推力方向）
        deprivation: 穿襪浮板踢水 2×25m → 脫掉後浮板踢水 2×25m，感受腳部感知「復活」後的清晰度
        number_focus: 追蹤踢腿節奏：刻意用較慢節奏踢水，觀察 SPL 是否改善
        trap: 避免強調「踢快一點」------頻率增加但感知沒有，只會加重腿部疲勞
        cue: 「腳往上踢的時候，有沒有感覺到一團水被推走？」「踢完之後，身體有沒有繼續往前？」
        combo: 單腳踢水 2min → 穿襪浮板踢 2×25m → 脫掉後浮板踢 2×25m（記錄感受語）
      C:
        core_tools: 仰漂雙指標確認（耳朵入水＋額頭不碰水）；加速後立刻回仰漂重新確認頭部位置；閉眼仰漂（移除視覺，強迫感知耳朵和額頭）
        deprivation: 仰漂靜止確認雙指標 → 加入踢腿確認 4×25m → 完整仰式 4×25m，每個階段確認耳朵和額頭位置沒有跑掉
        number_focus: 追蹤「放鬆游 vs 加速游」的 SPL 差距------差距縮小代表加速時頭部位置感知沒有跑掉
        trap: 避免反覆完整仰式游------頭部位置感知不穩定的狀態下練習，只會強化偏離的動作模式
        cue: 「游的時候，耳朵有沒有一直在水裡？額頭有沒有感覺到空氣？」「加速後這兩個感覺有沒有跑掉？」
        combo: 仰漂雙指標確認 2min → 加踢腿確認 4×25m → 完整仰式 4×25m（每趟游完確認耳朵額頭位置）
    type_milestones:
      A: 感知重現能力：能在游完後說「這趟第幾划手感對了」，且下一趟能刻意重現。 感知持久性：連續游 4 趟 25m，至少有 3 趟能感覺到明確的划手水壓。 數字指標：拳頭游 vs 張開手的速度差縮小（張開手達到拳頭游速度的 85% 以上）。
      B: 感知重現能力：能感覺到上踢時「有一團水被推走」，且能區分「踢到水」和「踢過水」。 感知持久性：浮板踢水 100m 中，超過一半的時間能感覺到上踢有推到水。 數字指標：加入踢腿後的游速，比只用划手游快 10% 以上。
      C: 感知重現能力：游完後能說出「這趟耳朵出水了」或「額頭碰到水了」，且下一趟能刻意修正。 感知持久性：放鬆游 200m 全程耳朵維持入水、額頭維持不碰水，不因距離變長而偏離。 數字指標：放鬆游 SPL 明顯少於加速游（放鬆游比加速游少 2 划以上）。
    milestone_note: 若共同里程碑達到但類型里程碑尚未達到，建議在 L3 繼續鞏固該型的感知訓練，不要急著進入 L4。
    stagnation_by_type: A型額外確認：Sculling 站立時前臂水壓感知是否能穩定建立；若站立都建立不了，先不要進入游動狀態。 B型額外確認：穿襪踢水脫掉後的對比效應是否出現；若沒有出現，退回垂直踢水重建感知條件。 C型額外確認：仰漂靜止時耳朵和額頭的雙指標是否能同時維持；若靜止都維持不了，移動狀態的三指標訓練會一直失效。
- id: back.L4
  stroke: back
  level: L4
  name_zh: 壓力下維持不住
  tagline: 找到了，但留不住
  public:
    description: L4 和 L3 最大的差別：L3 的問題是「找不到水感」，L4 的問題是「找到了但留不住」。 放鬆慢游幾乎都能感覺到；但速度加快、疲勞累積、或需要修正方向時，水感就消失了。 ※ Sculling 在 L4 的角色：水感消失後的重置工具，於組間休息或獨立訓練組使用。能用就好，不要求效率。 ※ 頭部位置三指標：耳朵在水裡（頭沒有太高）、額頭不碰水（頭沒有壓太深）、腳踢得到水面（腰沒有弓起）。 三個任何一個跑掉，阻力都會明顯增加。
    indicators:
    - dimension: 划手抓水感知
      measure: 加速游時前臂水壓感有沒有維持；拳頭游 vs 張開手速度差縮小至 5 秒以內（25m）
      experience: 放鬆時划手感覺有抓到水，速度一快就感覺手開始滑，但還在划
      training: Sculling 重置：水感消失後組間休息時用 Sculling 找回手感
    - dimension: 踢腿節奏維持
      measure: 划頻加快後踢腿有沒有跟上；長距離後段踢腿節奏有沒有崩潰
      experience: 慢游踢腿還好，速度一快感覺腿跟不上手，節奏開始各自跑
      training: 數踢腿配划手：六腿一手建立內部配對感知；再遞進到 2 打腿、正常六打腿
    - dimension: 身體水平維持
      measure: 加速或疲勞後三指標有沒有維持：耳朵在水裡、額頭不碰水、腳踢得到水面
      experience: 慢游三個指標都在，速度一快或游到後段就有一個跑掉，但不知道是哪個
      training: 加速後立刻做三指標自我檢查；組間確認後再繼續
    - dimension: 感知描述能力
      measure: 能否在游完後指出「哪個環節水感消失了」
      experience: 知道有問題，但只能說「感覺不對」，無法指出具體哪裡
      training: 焦點游泳：每趟只注意一個感知點，游完立刻說出觀察
    quant: 疲勞後 SPL 飄移 ≤ 5（三指標自我確認為主要工具）
    milestone: 共同里程碑：SPL 穩定、疲勞後 SPL 飄移 ≤ 5、能描述「今天水感在第幾趟第幾划消失，原因是＿＿」、 具備基本划頻感知（能感受高划頻和低划頻的差異）。
    stagnation: 先確認組間 Sculling 重置是否有效------這是 L4 停滯最快的分叉點。若 Sculling 重置無效（組間做完感知仍然找不回來）， 代表基礎手感在 L3 尚未鞏固，退回 L3 處理，不在 L4 繼續堆訓練量。若 Sculling 重置有效但感知維持時間短 （重置後撐不過幾划就又消失），走速度爬梯方向：從比臨界速度低一檔開始，確認感知穩定後再微微加速， 拉長感知維持的窗口，不要跳過中間的速度區間直接練高強度。若 Sculling 有效、維持時間也夠，但里程碑仍未達到： 最後確認訓練強度------在感知消失的狀態下持續高強度訓練，只會強化無水感的迴路。
  diagnostic:
    type_diagnosis:
    - q: Q1　速度加快時，哪裡最先「不對了」？
      A: 手的感覺消失------感覺手開始滑水，推不到東西，但還在划
      B: 踢腿節奏亂掉------感覺腿的節奏被打亂，和手配合不起來
      C: 全部都變------感覺阻力突然變大，但說不出哪裡出了問題
    - q: Q2　游到後半段，最先感覺到的變化是什麼？
      A: 手感消失，但踢腿還在，開始靠腿撐完後半段
      B: 腿開始很沉或很累，感覺腿在拖累速度而不是幫助推進
      C: 整個感覺「變重」------阻力變大，可能是頭跑掉或腰弓了但不知道
    - q: Q3　需要修正游泳方向時，有什麼變化？
      A: 手感消失得更快------注意力分散讓入水角度偏掉
      B: 踢腿節奏先亂------修正方向時腿的節奏最先被打斷
      C: 修正方向後感覺整個狀態都跑掉------三個指標同時失去
    type_states:
      A:
        trigger: 划頻提高到約 80% 最大強度時，入水角度開始偏移，前臂失去有效水壓，抓水感消失
        compensation: 划頻加快（用頻率補感知），SPL 上升但推進力沒有增加
        disappear_speed: 漸進------先是偶爾滑過去，然後越來越頻繁，最後完全消失
        vs_prev_level: L3：找不到划手水壓。L4：能找到，但提速就失去
      B:
        trigger: 划手節奏加快時，踢腿跟不上，節奏錯位後踢水開始打空
        compensation: 大腿接管踢水，膝蓋彎曲增加，踢水幅度加大，耗氧量急速上升
        disappear_speed: 突然------某個節拍踢錯了，之後整個節奏就亂掉了
        vs_prev_level: L3：踢腿幾乎感知不到推力。L4：放鬆時腳感不錯，但負荷加重後整合能力崩潰
      C:
        trigger: 速度提高或疲勞累積後，耳朵出水、額頭碰水、或腰開始弓起------三個任何一個跑掉阻力都會明顯增加
        compensation: 划頻提高同時頭部微微抬高，試圖靠視覺補償消失的位置感，阻力反而更大
        disappear_speed: 同步------速度或疲勞一到臨界點，三個指標同時跑掉
        vs_prev_level: L3：加速就感覺不到身體在哪裡。L4：中低強度能維持三指標，但速度或疲勞仍然觸發全面跑掉
    type_training:
      A:
        core_tools: 單臂仰式（隔離手感，感覺哪個入水角度前臂水壓最大）；凍結動作法（游泳中途凍結手臂，感覺手掌朝向，校準本體感覺失真）
        pressure_training: 85% 強度游 25m，立刻接一趟慢速 25m，在慢速趟感受手感「回來」的瞬間
        trap: 避免感知消失後繼續硬游------在感知消失後繼續游只是強化沒有水感的神經迴路
        cue: 「這趟衝完，手感是第幾划開始消失的？」「接下來慢游，找到手感之後再告訴我。」「前臂有沒有豎起來？感覺是拉身體過去，不是推水出去。」
        combo: 暖身 Sculling 5min → 單臂仰式 4×25m → 85% 衝刺 4×25m（每趟記錄手感消失在第幾划）→ Sculling 重置 → 慢游接回感知
      B:
        core_tools: 六腿一手（基礎版六打腿，數六下踢腿划一次手，感覺每次划手時踢到第六下）；2 打腿（配對感知建立後縮短到兩腿一手）；正常六打腿（不再數，感覺節奏有沒有自然維持）
        pressure_training: 六腿一手 4×25m → 2 打腿 4×25m → 正常游 4×25m，每個階段確認踢腿和划手有沒有在一起
        trap: 避免純踢腿訓練------L4 的核心是整合而非力量；避免節拍器作為主要工具------感知應建立在內部配對而非外部節拍
        cue: 「數六下踢腿，第六下踢完手才划------感覺到了嗎？」「游到一半，腿有跟上手嗎？」
        combo: 六腿一手 4×25m → 2 打腿 4×25m → 正常游 4×25m（每趟記錄踢腿有沒有跟上）
      C:
        core_tools: 速度爬梯訓練（從極慢速開始，每趟微微加速，找到三指標開始跑掉的臨界點）；呼吸控制訓練（刻意放慢呼吸節奏，用呼吸抑制過度緊張）
        pressure_training: 速度爬梯 50%→70%→85% 各 1×25m → 組間做三指標自我確認 → 記錄感知消失的強度臨界點
        trap: 避免高強度訓練為主------高張力狀態下訓練次數越多，「速度快→位置跑掉」的迴路越強化
        cue: 「加速後，耳朵還在水裡嗎？腳還踢得到水面嗎？」「感覺阻力變大了，先降速，確認三個指標都在再說。」
        combo: 速度爬梯 3×25m → 組間三指標自我確認 → 記錄臨界點 → 在臨界點前一趟的速度多游幾趟鞏固
    type_milestones:
      A: 壓力下的感知維持：在 80--85% 最大強度游 25m，全程（或至少前 80%）能維持手部抓水感。 失效後的恢復速度：水感消失後，能在 3 划以內察覺並調整入水角度找回手感。 數字指標：拳頭游 vs 張開手速度差縮小至 5 秒以內（25m）。
      B: 壓力下的感知維持：游 200m，踢腿節奏能維持整合，不出現「節奏突然崩潰」。 失效後的恢復速度：踢腿節奏崩潰後，能在半趟以內重建節奏。 數字指標：長距離游完後最後段的 SPL，不超過第一段 5 划以上。
      C: 壓力下的感知維持：速度爬梯到 80% 強度時，三個指標至少維持前半趟。 失效後的恢復速度：感知跑掉後，能主動降速讓三指標回來，而非繼續用力硬游。 數字指標：加速游的 SPL 不超過放鬆游 5 划以上。
    milestone_note: L4→L5 的過渡不只是數字達到，更重要的是游泳者能「在游泳中進行內部對話」------ 知道自己現在在哪個狀態、出了什麼問題、怎麼調整。
    stagnation_by_type: A型------確認單臂仰式隔離後手感是否比全划好，若是，遷移問題而非感知問題，加強單臂接全速的遷移訓練； B型------確認方向修正次數是否在減少，若沒有，退回速度爬梯找三指標臨界點； C型------確認壓力情境下（有人計時）和獨自游的 SPL 差距是否在縮小，若沒有，優先做壓力情境模擬而不是繼續做技術訓練。
- id: back.L5
  stroke: back
  level: L5
  name_zh: 感知自動化過渡期
  tagline: 讓感知在自動化的過程中不要失真
  public:
    description: L5 和 L2--L4 本質上不同。L2--L4 都在「建立感知」，L5 開始是「讓感知在自動化的過程中不要失真」。 動作監控正在從刻意注意移到背景運作，感知因此浮出前景------但這個轉換在壓力下尚未穩固。 仰式 L5 有四個主要問題：Drill 感知無法遷移到全速游泳、全速下抓水感知精煉不穩、外部節奏容易覆蓋內在節奏感、方向感尚未內化。 【仰式連鎖結構】入水角度確認（觸發訊號：主動抬高回臂側肩膀的感知------划水側深沉是自然結果，不是刻意壓下去 〔Gonjo et al. 2020〕；創造的條件：前臂有平面對水，捕水位置就緒）； 抓水／捕水（觸發訊號：前臂整個面感覺到水壓建立；創造的條件：推進力轉換有效率，踢腿節奏有依靠）； 推水出水（觸發訊號：手離水的瞬間，推力感結束；創造的條件：另一側入水準備，踢腿第六下落在這個接點）； 踢腿整合（觸發訊號：每次划手節奏就是踢腿的節拍------六腿一手的感知自動維持；創造的條件：腿不再獨立跑，推進穩定且方向筆直）； 頭部固定感（觸發訊號：身體繞著頭旋轉，而不是頭跟著身體轉；創造的條件：方向感自動維持，不需修正路線）。 ※ 仰式 L5 的連鎖邏輯不同於蛙式和蝶式的動作觸發鏈，而是「感知 A 穩固後，感知 B 才能建立」的感知建立鏈。以上為推導版本，待田野驗證後更新。
    methods:
    - name: 仰式連鎖結構 入水角度確認
      detail: 觸發訊號 主動抬高回臂側肩膀的感知------划水側深沉是自然結果，不是刻意壓下去（Gonjo et al. 2020）
      cue: 前臂有平面對水，捕水位置就緒
    - name: 仰式連鎖結構 抓水／捕水
      detail: 觸發訊號 前臂整個面感覺到水壓建立
      cue: 推進力轉換有效率，踢腿節奏有依靠
    - name: 仰式連鎖結構 推水出水
      detail: 觸發訊號 手離水的瞬間，推力感結束
      cue: 另一側入水準備，踢腿第六下落在這個接點
    - name: 仰式連鎖結構 踢腿整合
      detail: 觸發訊號 每次划手節奏就是踢腿的節拍------六腿一手的感知自動維持
      cue: 腿不再獨立跑，推進穩定且方向筆直
    - name: 仰式連鎖結構 頭部固定感
      detail: 觸發訊號 身體繞著頭旋轉，而不是頭跟著身體轉
      cue: 方向感自動維持，不需修正路線
    indicators:
    - dimension: Drill 遷移
      measure: Drill 游完立刻接全速 25m，水感有沒有維持；Drill 趟 vs 全速趟 SPL 差距目標 ≤ 3
      experience: 單臂仰式做完感覺很好，一接全速就什麼都消失
      training: 遷移訓練：Drill 結束不停頓，直接接全速趟，讓感知慣性延續
    - dimension: 全速抓水感知
      measure: 85% 強度 25m 全程 SPL 飄移 ≤ 3；能在衝刺中感覺到划手有沒有抓到水並自我調整
      experience: 一全力游就感覺划手感知消失，游完才發現動作跑掉了
      training: 監控游：每趟結束後自問「這趟划手有沒有感覺到水在推？」
    - dimension: 節奏穩固
      measure: 有其他人在旁邊游時，踢腿節奏能維持整合；不看錶估配速誤差 ≤ 5 秒（100m）
      experience: 被旁邊的人帶快後踢腿跟不上，中段明顯掉速
      training: 配速游：設定目標配速，練習在有其他人游的情況下維持自己的節奏
    - dimension: 方向感內化
      measure: 游 25m 中途修正方向的次數接近零；游完能說出「這趟有沒有歪過」
      experience: 慢游方向還好，速度快了就開始歪，需要一直修正
      training: 每趟游完問「有沒有感覺歪掉過？」------從「有歪有修正」到「幾乎沒有」
    quant: 各配速差異 ≤ 3、SPL 飄移 ≤ 3（方向修正次數接近零）
    milestone: 共同里程碑：SPL 各配速下差異 ≤ 3、能在游泳中途察覺動作開始變形並主動調整、游 25m 中途方向修正次數接近零。
    stress_test: 【速度壓力】條件：SPL+N（在個人基準 SPL 上增加固定划數，壓縮每次划手的時間窗口）； 通過標準：三指標自我確認能維持（耳朵在水裡、額頭不碰水、腳踢得到水面）；能說出感知消失在第幾划，不是靠慣性撐過去。 【疲勞壓力】條件：SWOLF 監控連續 200m，觀察後段 SPL 飄移幅度； 通過標準：SPL 飄移 ≤ 3；疲勞後能察覺哪個感知最先消失，並能在下一趟主動調整。 【閉眼壓力】條件：閉眼游 25m------移除視覺，強迫感知系統完全依賴本體感覺（耳朵入水位置、額頭高度、旋轉感知）維持方向和水平； 通過標準：游完方向修正次數和睜眼游相近；能說出游完後耳朵和額頭位置有沒有跑掉------感知自動化程度的直接測試。 ※ SPL+N：在個人基準划數上增加 N 划，例如平時 25m 游 18 划，SPL+3 表示用 21 划游完 25m，壓縮每次划手的時間窗口。 ※ 閉眼游在 L1/L2 是建立安全感的工具，在 L5 是壓力測試工具------目的不同，需向學習者說明。建議從短距離（12.5m）開始，確認安全後再到 25m。
    stagnation: 分三個方向排查，依序確認。第一：Drill 感知無法遷移到全速------若單臂仰式做完感知很好但一接全速就消失， 這是遷移問題而不是感知問題，增加「不停頓直接接全速趟」的遷移訓練，Drill 和全速之間不要有停頓給感知「重設」的機會。 第二：頭部旋轉解離感知仍然不穩定------若移動中頭部開始跟著身體旋轉方向蛇行，不論主要缺陷在哪裡， 優先做蛙鞋頭頂水瓶訓練處理頭部穩定問題，其他訓練暫時降量；這個感知不穩定，頭部位置三指標和入水角度都會連帶不穩， 處理它比處理其他項目更有效率。第三：若兩者都已處理但里程碑仍未達到，重新核對 SPL 飄移數字------ 感知主觀上覺得進步，數字有時尚未反映；同時確認比賽或壓力游的 SPL 和獨自游的差距是否在縮小， 若差距沒有縮小，增加壓力情境模擬（有人計時、有人觀察）的訓練比例，不要只在安靜環境練技術。
  diagnostic:
    type_diagnosis:
    - q: Q1　全速游時，最先消失的感知是什麼？
      A: 手感消失------感覺划手有在動，但感覺不到水在推，像是空划
      B: 踢腿節奏脫節------腿還在動，但不知道有沒有跟上手，感覺分開了
      C: 整體感知------速度一上來什麼都感覺不到，方向開始歪
    - q: Q2　Drill 練完接全速游，感知能帶過去嗎？
      A: 手感能帶過去幾划，但很快消失------全速後旋轉縮小，入水角度偏掉
      B: 踢腿感知帶不過去------全速後腿就自己跑了，和手脫節
      C: 完全帶不過去------一全力就回到緊繃無感的狀態
    - q: Q3　游完，這趟有沒有感覺歪掉過？
      A: 偶爾歪，通常能修正回來，但不確定為什麼歪
      B: 偶爾歪，通常是踢腿不對稱造成的
      C: 歪得比較明顯，有時游完才發現方向跑掉了
    type_states:
      A:
        trigger: 衝刺時划頻提高，旋轉幅度自動縮小，入水角度偏移，EVF 建立不起來，手開始用「甩」的方式代償
        compensation: 手臂改用「甩」的方式往後划------維持動作感但沒有真正抓到水，SPL 上升但速度沒有跟上
        distortion_speed: 漸進------先偶爾空划，然後越來越頻繁，不容易自己察覺
        vs_prev_level: L4：提速後抓水感消失。L5：高速下抓水感偶爾還在，但開始出現「甩」的代償，學生感覺不到差異
        rotation_dissociation: 旋轉縮小是 A型失真的根源------全速下旋轉幅度不足，入水角度偏移，前臂無法建立水壓。訓練目標：感覺旋轉有沒有帶動入水角度
      B:
        trigger: 划頻加快後踢腿整合開始不穩定；被外部節奏帶快時最先出現踢腿脫節
        compensation: 踢腿幅度加大、膝蓋彎曲增加，試圖用力量補節奏，耗氧急升且效率更差
        distortion_speed: 突然------某個節拍踢錯後整個節奏就亂，之後難以在游泳中重建
        vs_prev_level: L4：長距離踢腿節奏崩潰。L5：節奏能維持，但外部干擾一出現就失去整合
        rotation_dissociation: 不適用------B型的核心是踢腿整合，旋轉解離不是主要問題
      C:
        trigger: 速度或壓力觸發頭部開始跟著旋轉，三指標同時失守，方向開始蛇行
        compensation: 頭部微微跟著旋轉，試圖靠視覺補回消失的方向感，路線開始蛇行
        distortion_speed: 同步------壓力一出現頭就開始動，整個感知同時消失
        vs_prev_level: L4：高強度三指標全面跑掉。L5：中低強度能維持，但速度或壓力仍觸發頭部跟著旋轉
        rotation_dissociation: 頭部跟著旋轉是 C型失真的核心------頭動了但學生感覺不到。訓練目標：感覺「頭是固定的錨點，身體繞著頭旋轉」
    type_training:
      A:
        core_tools: 單臂仰式接全速遷移訓練（不停頓直接接）；單臂仰式觀察非划手側肩膀有沒有到達下巴附近（確認旋轉幅度是否足夠）；衝刺後問「這趟划手有沒有感覺到水在推？」
        pressure_training: 85% 強度游 25m，立刻問「這趟划手有沒有感覺到水在推？旋轉有沒有縮小？」接慢速趟找回旋轉和手感，記錄差距是否縮小
        trap: 避免只做 Drill 不接全速------感知遷移不會自動發生，兩者必須刻意連結；避免用「有沒有甩」作為自評問題------甩是感知消失後的代償，感知消失了就感覺不到甩
        cue: 「這趟全速游完，划手有沒有感覺到水在推？」「單臂游的時候，另一側肩膀有沒有轉到下巴附近？」
        combo: 單臂仰式 4×25m（不停頓接全速）→ 衝刺 4×25m（每趟問「划手有沒有感覺到水在推」）→ 體感估配速核對
      B:
        core_tools: 配速游（設定目標配速，在有其他人游的情況下維持踢腿節奏）；六腿一手壓力版（有人計時或旁邊有人游的情況下確認整合是否維持）；Drill 接全速遷移訓練
        pressure_training: 在有其他人游的道次練習，感覺踢腿節奏有沒有被影響；每趟結束後問「踢腿有跟上划手嗎？」
        trap: 避免只練划頻而不練節奏整合------划頻提升但踢腿跟不上，效率不會改善；避免重複 L4 的基礎整合練習------L5 的核心是壓力下維持，不是重新建立整合
        cue: 「旁邊有人游的時候，你的踢腿節奏有沒有被影響？」「游完估一下你的配速，然後我們來核對。」
        combo: 六腿一手壓力版 4×25m → 配速游（有人游的道次）4×25m → 拿掉節奏輔助 2 趟，感覺整合是否留住
      C:
        core_tools: 穿蛙鞋頭頂水瓶踢腿前進 → 穿蛙鞋完整仰式頭頂水瓶 → 不穿蛙鞋完整仰式頭頂水瓶（蛙鞋提供速度幫助頭部穩定，逐步移除輔助）；壓力情境模擬（有人計時、有人觀察）
        pressure_training: 請人站在池邊計時或觀看，練習在「被看」的情況下頭部維持靜止；逐步縮短壓力游和獨自游的 SPL 差距
        trap: 避免高強度主導訓練------在頭部跟著旋轉的狀態下重複高強度，只會強化「速度快→頭跟著轉→方向歪」的迴路
        cue: 「頭有沒有跟著身體轉？還是頭是固定的、身體繞著頭旋轉？」「這趟游完，有沒有感覺歪掉過？」
        combo: 穿蛙鞋頭頂水瓶踢腿 2×25m → 穿蛙鞋頭頂水瓶完整仰式 2×25m → 不穿蛙鞋頭頂水瓶完整仰式 2×25m → 記錄方向修正次數
    type_milestones:
      A: Drill 遷移：單臂仰式接全速後，划手能維持前 4 划以上的抓水感，不出現「甩」的代償。 旋轉解離：全速游時非划手側肩膀能到達下巴附近，旋轉幅度維持，不出現旋轉縮小的代償。 數字指標：各配速下 SPL 差異 ≤ 3；衝刺趟划手抓水感維持到後半趟。
      B: Drill 遷移：Drill 接全速後，踢腿節奏能跟上至少前半趟，不在起跑後馬上脫節。 旋轉解離：不適用。 數字指標：有其他人在旁邊游時，踢腿節奏能維持整合，不出現「腿突然自己跑」；長距離後段踢腿崩潰次數明顯減少。
      C: Drill 遷移：Drill 接全速後，頭部能維持靜止至少前半趟，不在第一划就開始跟著旋轉。 旋轉解離：能感覺到「頭是固定的，身體繞著頭旋轉」------這個解離感知在壓力下仍然穩定。 數字指標：壓力游 vs 獨自游方向修正次數差距縮小；壓力游 SPL 差距 ≤ 3。
    milestone_note: 若共同里程碑達到但三型里程碑尚未達到，建議在 L5 繼續鞏固該型的感知訓練，不要急著進入 L6。
    stagnation_by_type: A型額外確認：衝刺中非划手側肩膀到達下巴附近的比例是否在提升，若沒有，退回單臂仰式加強入水角度感知。 B型額外確認：外部節奏干擾（節拍器偏離）時能否維持自己的踢腿節奏，若不能，加強節拍器抗干擾訓練。 C型額外確認：壓力游的方向修正次數和獨自游的差距，若差距大，壓力情境模擬是主要訓練工具，不是技術調整。
- id: back.L6
  stroke: back
  level: L6
  name_zh: 感知自動化完成
  tagline: 注意力可以完全放在配速和策略
  public:
    description: L6 的感知已完全移到背景運作，不需要刻意注意水感。L6 和 L5 最本質的差異， 不在於「正常狀態有多好」，而在於「出問題時的自我察覺層次不同」。 L5 出問題：能感覺到動作開始變形（手開始空划、頭開始跟著旋轉、踢腿脫節）------需要注意力介入才能修正。 L6 出問題：能感覺到推進開始減少或路線開始微偏的最早訊號------比動作變形更早，注意力完全釋放，感知在背景自動修正。 【疲勞崩潰的四個層次】 第一層：划距開始縮短，或單趟推進感開始變薄------比旋轉改變更早出現，泳者自己能感覺到，最早、最隱性 （外部可見度：幾乎看不出來；哪個 L 能察覺：L6 能察覺）。 第二層：髖旋轉開始增加（核心穩定性下降，旋轉由肩轉移至髖）；捕水深度開始下降，划距縮短但路線尚未偏移 〔文獻：Psycharakis & Sanders 2010；推導〕（外部可見度：訓練有素的教練可察覺；哪個 L 能察覺：L5 開始能察覺）。 第三層：踢水頻率退化（從六拍退至四拍或兩拍）；手臂開始直線划水，旋轉連動放棄，路線開始蛇行 〔文獻間接：González-Ravé 2025；推導〕（外部可見度：教練從池邊可看到；哪個 L 能察覺：L4 通常在這層才察覺）。 第四層：完全依賴上肢力量硬划，旋轉連動放棄，動作全面崩壞，三指標全面失守 （外部可見度：所有人都看得出來；哪個 L 能察覺：機械失效前的最後防線）。 ※ 超出體能極限（機械失效）的崩潰不是水感問題，任何人的感知在這個時候都會失效。L6 的水感描述只適用於機械失效之前的範圍。 【L6 狀態描述】 正常狀態------游泳者自己的感受：不需要想水感，注意力在配速和距離，但水感一直在背景運作； 教練可觀察到的行為：動作穩定，划距一致，SPL 在正常範圍內波動極小，路線筆直。 出問題時（體能極限前）------游泳者自己的感受：某一划感覺推進少了一點或路線微微偏了，身體自動調整， 游完才意識到「剛才有一瞬間調整了一下」；教練可觀察到的行為：幾乎看不出來，最多一兩划的細微變化，隨即自動恢復。 超出體能極限------游泳者自己的感受：整個感覺都消失了，只剩撐下去的意志，這是機械失效，不是水感問題； 教練可觀察到的行為：路線蛇行，划距明顯下降，划頻急速上升，頭部位置失守。 【L6 持續精進指標（Kaizen）】L6 沒有終點，只有「還能更細」的方向： 自我察覺層次越來越早（從「動作變形了才察覺」進步到「路線微偏或划距剛開始縮短就察覺」------這是菁英感知的核心能力）； 自動微調幅度越來越小（不需要大幅調整，微小修正就能維持推進效率和路線穩定）； 頭部穩定感知完全背景化（不需要刻意注意，頭部自動維持靜止，旋轉幅度自動找到最優值）； 比賽和訓練的 SPL 差值趨近於零（感知在任何情境下都同樣穩固------比賽壓力不再影響動作品質）； 方向修正次數趨近於零（兩側動作完全對稱，方向感完全背景化，不需要任何修正）。 ※ L6 是感知自動化完成，不是游泳技術的終點。感知精細程度持續提升------察覺層次越早、調整幅度越小，代表感知系統越接近菁英水準。
    quant: 比賽 vs 訓練差值趨近零（感知為主，數字為持續精進參考）
- id: breast.pre
  stroke: breast
  level: pre
  name_zh: 火箭漂（Rocket Float）
  tagline: 感覺阻力的存在，在動作開始之前
  public:
    description: 蛙式是四式中阻力最大的泳式，每個動作週期都在製造和對抗阻力。如果學習者在建立動作之前沒有感覺到阻力的存在，他們會用「用力游」來補償阻力，而不是去減少阻力。火箭漂在任何動作習慣建立之前進行，讓學習者在空白的感知狀態下，自己發現「緊的身體比鬆的身體滑得更遠」。這個感知會成為後續所有動作學習的底層參考。火箭漂是感知的種子，不是技術要求。不需要評判姿勢對不對，只需要學習者開始感覺阻力的存在。
    methods:
    - name: 深吸一口氣，讓身體往前漂
      detail: 身體靜止，感知資源全在「身體緊鬆對滑行的影響」，沒有任何動作干擾
      cue: 「深吸一口氣，讓身體往前漂。漂出去之後，感覺一下身體有沒有繼續在動？」
    - name: 試試緊和鬆的差異
      detail: 學習者自己探索，不給正確答案
      cue: 「試試看身體緊一點和鬆一點，哪個感覺滑得比較遠？」
    - name: 氣用完站起來，再試一次
      detail: 重複對比，讓感知在對比中浮現
      cue: 「氣用完了站起來，再試一次，看看有沒有發現什麼？」
    milestone: 目標：4--6次換氣漂完15公尺（成人基準，小朋友依體型調整）。感知目標：不說「超流線型」，讓學習者自己發現「緊的身體滑得更遠」。時機：蛙式課程最開始，任何動作習慣建立之前。
- id: breast.L2
  stroke: breast
  level: L2
  name_zh: 推進感萌芽
  tagline: 開始感覺動作有沒有讓自己往前走
  public:
    description: L2的蛙式學習者已經能做出大概的手腳動作，但力氣大多花在維持身體位置，而不是推進。這個階段的重點不是把動作做對，而是開始感覺「我對水做了什麼，水有沒有回應」。核心原則：動作建立和感知萌芽同步進行。不要求完整蛙式，先隔離手和腿分別建立感知，再嘗試整合。L2不分辨感知缺陷的方向。腿負責推進感知，手負責撐起換氣——兩者分開建立，L3才開始整合。蛙式腿的核心感知是「翻腳掌、夾水、感覺水被往後推」。蛙式L2的手，核心功能不是推進，是撐起換氣。外划內抱在這個階段的意義是「能不能把頭抬出水面換到氣」，而不是「有沒有感覺到水壓推進」。
    methods:
    - name: 坐岸邊潑水（腿部感知建立）
      detail: 身體穩定，感知資源全在腳掌，翻腳掌和夾水方向自然發生
      cue: 「腳掌翹起來，想辦法把水往前潑，潑越遠越好。」
    - name: 扶池邊踢水（腿部感知建立）
      detail: 進入水中，確認岸邊的感覺能帶進去，隔離腿部動作，感覺腳掌翻轉時水壓方向
      cue: 「腳掌踢出去的時候，感覺一下有沒有什麼東西在腳掌上？」
    - name: 浮板蛙式踢水（腿部感知建立）
      detail: 確認推進力能傳導到前進方向
      cue: 「踢完之後，感覺一下身體有沒有煞車？」
    - name: 站立水中外划內抱（手部感知建立——能否撐起換氣）
      detail: 感覺外划時手掌有沒有撐住水，讓身體能浮起來
      cue: 「外划的時候，感覺手有沒有撐到什麼？頭有沒有自然浮起來？」
    - name: 加入換氣時機（手部感知建立——能否撐起換氣）
      detail: 感覺外划撐起和換氣的連動是否自然發生
      cue: 「手撐出去的時候，頭有沒有跟著出來？還是需要額外用力抬？」
    indicators:
    - type: 腿部
      text: 浮板踢水能穩定前進，感覺得到滑行存在
    - type: 手部
      text: 外划能撐起身體換到氣，不需要額外抬頭用力
    - type: 感受語
      text: 能描述手或腳「推到了什麼」或「撐住了什麼」，不規定說什麼
    stagnation: 感知停滯時的處理方向（以下為教學實務推導，非獨立研究驗證，建議對照現場觀察調整）： 第一層——坐岸邊潑水感覺不到腳掌推水：問題可能不在感知，而在腳踝活動度不足，腳掌翻不出來，感知條件尚未建立。先確認腳踝能否完整翻出，再回來練感知。 第二層——岸邊有感覺，進水裡消失：進入水中後開始擔心身體位置，感知資源被分走。回到扶池邊，讓身體完全放鬆不擔心沉，確認放鬆狀態下岸邊的感覺能不能帶進來。 第三層——扶池邊有感覺，浮板踢水就消失：推進感建立了但傳不到前進方向。確認兩件事：踢水角度是否讓力道往前、踢完之後有沒有停頓給身體滑行的時間。踢太快會讓煞車感和推進感都消失。
- id: breast.L3
  stroke: breast
  level: L3
  name_zh: 水感出現但不穩定
  tagline: 抓到了，但下一趟又消失
  public:
    description: L3的蛙式學習者已經能完成基本動作，偶爾會感覺「這趟游得很順」，但下一趟又回到掙扎狀態。這個階段開始需要分辨感知缺陷的主要方向。
    indicators:
    - type: 推進感知
      text: 觀察／測量指標：浮板踢水後有無滑行感；連續蛙式游完能否描述「這趟有滑到」。典型體驗：有時踢完感覺身體繼續往前，下一趟又停掉，不知道差在哪裡。對應訓練方向：浮板踢水專注踢完後的停頓感；刻意在踢完後等一下，感覺煞車有沒有出現。
    - type: 手部撐起感知
      text: 觀察／測量指標：換氣時有無需要額外抬頭；外划時身體有無自然浮起。典型體驗：偶爾換氣很輕鬆，手撐起來了，但下一趟又要用力抬。對應訓練方向：站立水中外划內抱，感覺手撐水的瞬間；換氣時注意頭有沒有自然出水。
    - type: 節奏感知
      text: 觀察／測量指標：能否感覺到划手換氣、前伸、收踢、滑行四個階段的順序。典型體驗：感覺動作全部擠在一起，或某個階段突然消失，節奏一直跑掉。對應訓練方向：極慢速蛙式，刻意在每個階段之間停頓，感覺四個階段各自的存在。
    - type: 感知持久性
      text: 觀察／測量指標：連續游四趟後感知是否消失；能否察覺「哪一趟開始不對了」。典型體驗：前一兩趟還好，第三趟開始完全不一樣，但不知道什麼時候跑掉的。對應訓練方向：每趟游完立刻說出感知狀態，建立疲勞覺察的習慣。
    quant: SWOLF（25m）42--63；SI參考 0.8--1.7；SPL（25m）12--18；滑行幾乎沒有，動作不穩定。SWOLF 可作為輔助參考，個人進步趨勢比對照數值更重要。
    milestone: L3 → L4 共同里程碑：能完成連續蛙式換氣不中斷、能說出「這趟水感消失了，是因為＿＿」、浮板踢水有明顯滑行感。
    stagnation: 感知停滯時的處理方向（以下為教學實務推導，非獨立研究驗證，建議對照現場觀察調整）：先重新確認感知缺陷的主要方向——類型會隨訓練改變，停滯有時是因為主要感知缺陷已轉移，訓練方向還沒跟上。確認之後走以下分叉：若重新指向不同的主要缺陷，切換訓練方向，觀察兩週。若類型沒有改變，確認訓練是否在感知消失的狀態下繼續進行——感知消失後繼續游只強化無水感迴路，這比類型判斷錯誤更常見。若兩者都排除，退回L2分別確認：浮板踢水後有沒有滑行感、站立外划內抱時手有沒有撐起身體——L3停滯有時不是L3的問題，而是L2基礎尚未完整。
  diagnostic:
    type_diagnosis_note: 三題都指向同一型則判斷較為確定；若有混合，以出現最多次的型為主要處理方向。建議每隔一個L級重新評估。
    type_diagnosis:
    - q: Q1　換氣時身體有沒有自然浮起來，還是需要額外用力抬頭？
      A: 需要用力抬頭，手撐不起來，換氣打亂整個節奏
      B: 換氣還好，但踢腿感覺沒有推力，踢完沒有往前滑
      C: 換氣還好，但換完之後身體位置不對，要花時間找回來
    - q: Q2　浮板蛙式踢水，踢完有沒有感覺身體往前滑？
      A: 有一點滑行感，問題主要在手和換氣
      B: 幾乎沒有，不確定腳有沒有推到水
      C: 有時有，但不穩定，不知道哪次有哪次沒有
    - q: Q3　游的時候，有沒有感覺自己來不及？如果有，你知道是哪裡來不及嗎？
      A: 有，換氣來不及，手撐不起來，頭要用力抬才出得來
      B: 有，腿跟不上，手都做完了腿還沒準備好
      C: 有來不及的感覺，但說不出哪裡出了問題
    type_states:
      A:
        appears: 偶爾某趟換氣很順，手撐起來了，感覺整趟都不一樣
        disappears: 換氣時機偏掉，頭抬太早或太晚，打亂手的撐水位置
        typical_speech: 「有時候換氣很輕鬆，但大部分時候都要很用力才能把頭抬出來」
        spl_pattern: SPL不穩定，換氣那划特別費力，節奏一亂划數就跑掉
      B:
        appears: 偶爾踢腿角度對了，感覺腳掌推到水，有往前滑
        disappears: 踢腿收腿角度改變，腳掌翻轉不完全，夾水方向跑掉
        typical_speech: 「我知道腿要夾，但感覺不到水，不知道有沒有推到」
        spl_pattern: SPL偏高且穩定，踢完沒有滑行，只能靠增加划數前進
      C:
        appears: 極度放慢時偶爾出現，感覺身體水平、動作輕鬆，但不知道自己做了什麼不一樣
        disappears: 感覺不到身體開始偏離的訊號，等到察覺時已經在掙扎狀態
        typical_speech: 「慢慢游還好，一加速就感覺身體到處跑，不知道怎麼控制」
        spl_pattern: SPL變化不定，用力游反而划數更多但沒有變快
    type_training:
      A:
        core_tools: 站立水中外划內抱（靜態）；Sculling（搖櫓）換氣原地（動態）；自由式踢水＋蛙手（選用）
        pitfall: 避免強調划手速度，速度會讓換氣時機更難抓
        cue: 「外划的時候感覺手有沒有撐住？頭有沒有自然浮起來？」
        combo: 站立外划內抱5分鐘 → Sculling換氣原地4×30秒 → 完整蛙式4×25m（每趟游完說出換氣哪裡順了或卡住）
      B:
        core_tools: 坐岸邊潑水；扶池邊慢速踢腿；穿襪踢水→脫掉（對比效應）
        pitfall: 避免強調踢快，沒有感知的頻率只會加重疲勞
        cue: 「腳夾出去之後，身體有沒有往前滑？滑了多遠？」
        combo: 坐岸邊潑水3分鐘 → 扶池邊慢速踢腿3分鐘 → 穿襪浮板踢水2×25m → 脫掉後浮板踢水2×25m（記錄煞車感有沒有出現）
      C:
        core_tools: 靜態漂浮感知系列：漂浮→換氣→漂浮；蹬牆→漂浮→換氣→靜漂；慢速踢水後停頓
        pitfall: 避免反覆完整蛙式——感覺不到偏離的狀態下練習，只會強化失衡的動作模式
        cue: 「換完氣之後，停一下，感覺一下身體現在是水平的還是斜的？」
        combo: 漂浮→換氣→漂浮5分鐘 → 蹬牆漂浮→換氣→靜漂4次 → 慢速蛙式4×25m（每趟踢完停頓，感覺身體有沒有回到水平）
    type_milestones:
      A: 感知重現能力：能在游完後說「這趟換氣順了」，且下一趟能刻意重現。數字指標：連續3趟25m蛙式，SPL差異不超過2划。
      B: 感知重現能力：能區分「踢到水」和「踢過水」，滑行感穩定出現。數字指標：浮板踢水能完成25m不中斷。
      C: 感知重現能力：踢腿後能感覺到身體有沒有回到水平位；能說出「這趟身體一直歪向左邊」這類具體描述。數字指標：慢速游比正常游SPL少3划以上。
    stagnation_by_type: A型額外確認：Sculling換氣原地做完後，換氣時身體有沒有自然浮起；若站立狀態都撐不起，動態游泳的換氣感知會一直不穩定。B型額外確認：坐岸邊潑水時腳掌翻轉是否完整；若翻不出來，是腳踝活動度問題而非感知問題，先處理活動度再回來練感知。C型額外確認：火箭漂靜止時身體有沒有回到水平；若火箭漂結束時身體仍然傾斜，移動狀態的平衡感知訓練效果會一直有限。
- id: breast.L4
  stroke: breast
  level: L4
  name_zh: 壓力下維持不住
  tagline: 找到了，但留不住
  public:
    description: L4和L3最大的差別：L3的問題是「找不到水感」，L4的問題是「找到了但留不住」。放鬆慢游幾乎都能感覺到滑行；但節奏一加快，順序感就崩潰了。蛙式L4的核心問題可以用一句話說完：節奏加快後，手腳順序跑掉了。順序跑掉的位置可能不同——手卡在胸前射不出去、腿提前收截斷滑行、手腿同時動沒有順序。L4的診斷重點不再是「哪裡感知弱」，而是「節奏加快後，哪裡需要刻意注意」——需要刻意注意的地方，就是感知還沒穩固的地方。
    indicators:
    - type: 換氣後前伸速度
      text: 觀察／測量指標：換氣後手有沒有快速射出去；手停在胸前的時間是否明顯。典型體驗：慢游時前伸順暢，節奏一快手就卡在胸前，下一個動作全部延誤。對應訓練方向：刻意練習換氣後立刻前伸，感覺手射出去和收腿的連動。
    - type: 手腳順序感知
      text: 觀察／測量指標：前伸和收腿有沒有同步；能否感覺到「手出去腿才收」的順序。典型體驗：節奏快的時候感覺手腳在搶，不知道誰先誰後。對應訓練方向：極慢速蛙式，刻意感覺手射出去的瞬間腿才開始收。
    - type: 滑行時間感知
      text: 觀察／測量指標：能否感覺到夾水後身體還在移動；滑行有沒有被下一划打斷。典型體驗：知道應該要滑，但感覺滑行很短，或根本感覺不到什麼時候結束。對應訓練方向：夾水後刻意停頓，感覺速度下降的時間點。
    - type: 啟動時機
      text: 觀察／測量指標：下一划是在感覺速度開始下降後才啟動；還是滑行還在進行就開始收手。典型體驗：節奏一快就感覺在趕，每一划都來不及，但不知道哪裡出了問題。對應訓練方向：以「速度開始下降」作為啟動下一划的訊號，練習感覺這個時間點。
    quant: SWOLF（25m）32--44；SI參考 1.5--2.8；SPL（25m）10--14；滑行開始出現但不穩定。
    milestone: L4 → L5 共同里程碑：SPL 25m落在8--12划、放鬆慢游時滑行穩定出現、節奏加快後能說出「哪個環節出了問題」、在正常SPL加3--5划的節奏下游25m手腳順序沒有跑掉。
    stagnation: 感知停滯時的處理方向（以下為教學實務推導，非獨立研究驗證，建議對照現場觀察調整）：先確認放鬆慢游時滑行和順序感是否穩定——這是L4停滯最快的分叉點。若慢游也找不到順序感，代表L3基礎尚未鞏固，退回L3處理，不在L4繼續堆訓練量。若慢游穩定但加速後馬上崩潰，退回暫停法重新找順序感，再慢慢縮短停頓時間——不要跳過中間的速度區間直接練正常節奏。若暫停法做了但里程碑仍未達到，重新確認感知缺陷的主要方向——類型可能已隨訓練轉移。
  diagnostic:
    type_diagnosis_note: L4的診斷重點不再是「哪裡感知弱」，而是「節奏加快後哪裡最先崩潰」。
    type_diagnosis:
    - q: Q1　游快一點的時候，感覺哪裡來不及？
      A: 換氣完手來不及射出去，停在胸前
      B: 手還沒出去腿就已經在收了
      C: 說不清楚，感覺全部都亂了
    - q: Q2　游快一點的時候，注意力比較多放在哪裡？
      A: 換氣，一直在想頭有沒有出來、手有沒有撐起來
      B: 腿，一直在想腿有沒有跟上、有沒有踢到
      C: 說不清楚，感覺什麼都要注意但什麼都抓不住
    - q: Q3　游完之後，你知道哪裡出了問題嗎？
      A: 知道，換氣後手沒有射出去，或射得太慢
      B: 知道，腿好像收太早了，跟手的順序不對
      C: 知道有問題，但說不出來哪裡，就是感覺整個亂掉
    type_states:
      note: L4 三型深度分析
      A:
        failure_trigger: 節奏加快後換氣時間被壓縮，手來不及射出去就停在胸前
        compensation: 用抬頭補換氣，頭抬更高但手更撐不起來，惡性循環
        disappear_speed: 漸進，換氣開始偶爾卡住，然後越來越頻繁
        vs_L3: L3：找不到手撐起換氣的感覺。L4：能找到，但節奏加快後手停在胸前射不出去
      B:
        failure_trigger: 節奏加快後收腿時機提前，手還沒射出去腿就開始收
        compensation: 踢更用力補推進力，但腿提前收製造更多阻力，越踢越慢
        disappear_speed: 突然，某一划腿提前收之後整個節奏就亂掉
        vs_L3: L3：感知不到腿有沒有推到水。L4：放鬆時腳感不錯，但節奏加快後腿提前收，順序亂掉
      C:
        failure_trigger: 節奏加快後順序感消失，手腿開始同時動
        compensation: 划頻加快試圖追上節奏，但手腿更加混亂，阻力急速上升
        disappear_speed: 同步，節奏一加快整個感知立刻消失
        vs_L3: L3：一用力就感覺不到身體在哪裡。L4：慢游能維持，但節奏加快後手腿同時動，順序感消失
    type_training:
      A:
        core_tools: 自由式踢水＋蛙手（隔離手部，同時訓練換氣時屁股不下沉）；拳頭划手→張開（復活感重新校準前伸時機）
        pitfall: 避免強調抬頭換氣，換氣應順勢而非額外抬頭
        cue: 「換氣的時候，手的動作是什麼？」
        combo: 拳頭划手2×25m → 張開手2×25m（感覺前伸復活感）→ 自由式踢水蛙手4×25m（每趟游完說手的動作是什麼）
      B:
        core_tools: 兩踢一划（強迫腿的節奏放慢，重建手腳順序感知）
        pitfall: 避免強調踢更用力，力量不是問題，手腳順序才是
        cue: 「腿什麼時候收的？」
        combo: 兩踢一划4×25m（感覺手射出去腿才收）→ 正常蛙式4×25m（每趟游完說腿什麼時候收的）
      C:
        core_tools: 暫停法：划手換氣前伸→停→收腿停→夾水滑行→停→划手換氣前伸；划數遞減遞增
        pitfall: 避免直接練正常節奏，感知還沒穩固前練正常節奏只會強化手腿同時動的迴路
        cue: 「剛剛划幾下？我們看看能不能變少——少一划也算。」
        combo: 暫停法4×25m → 划數遞減遞增（從正常划數開始，每趟嘗試少一划，到臨界點後再遞增）
    type_milestones:
      A: 感知重現能力：節奏加快後手停在胸前，能在下一趟刻意讓手跟著換氣射出去。數字指標：正常蛙式連續3趟，SPL差異不超過2划。
      B: 感知重現能力：能感覺到腿提前收的那一划，並在下一趟刻意等手射出去再收腿。數字指標：正常蛙式25m，能說出腿是在手射出去之後才收的。
      C: 感知重現能力：暫停法做完接正常蛙式，能維持至少前幾划的順序感。數字指標：划數遞減能比正常少3划以上，遞增能比正常多3划以上。
    stagnation_by_type: A型額外確認：拳頭划手接張開的對比效應，放鬆慢游時是否仍然有效；若慢游都沒有對比效應，退回站立外划內抱重新建立撐水感知。B型額外確認：兩踢一划做完後，順序感是否比正常蛙式更穩定；若兩踢一划也找不到順序感，代表腿的基礎感知在L3尚未完整，退回L3的浮板踢水確認滑行感是否穩定。C型額外確認：暫停法每個停頓點身體是否都能回到水平；若停頓時身體仍然傾斜，平衡感知是主要問題，暫停法的停頓時間要拉長，讓學習者在每個停頓點確認身體水平後再繼續。
- id: breast.L5
  stroke: breast
  level: L5
  name_zh: 感知路徑精煉
  tagline: 能感覺到節奏，知道每個動作在等什麼、在觸發什麼
  public:
    description: L5和L2--L4的本質不同。L2--L4都在「建立感知」，L5的感知已經穩固，核心問題是「路徑還沒有精煉到最有效率」，以及「連鎖感知還沒有出現」。L5的核心定義：能感覺到節奏——知道每個動作在等什麼、在觸發什麼。每個動作不再是獨立的檢查點，而是在製造下一個動作需要的條件。
    methods:
    - name: L5的兩個發展層次：路徑精煉
      detail: 手外划幅度收斂到最小必要值；收腿路徑縮短，大腿前移量進一步減少；夾水幅度精煉。
      cue: 訓練邏輯——感知已有，現在讓最短、最有效率的路徑自動發生。對比「長路徑」和「短路徑」的效率差異。
    - name: L5的兩個發展層次：連鎖感知出現
      detail: 髖發力感知第一次出現；俯衝角度感知建立；阻力下降作為蹬腿起點的時機感知。
      cue: 訓練邏輯——不是「教新動作」，而是創造條件讓感知自然浮現。末端感知穩固是前提。
    - name: 蛙式連鎖結構：Insweep（內划）
      detail: 觸發訊號——手掌感覺到水壓建立。創造的條件——身體升起，俯衝角度準備好。
      cue: 以下是一個完整蛙式循環的連鎖觸發關係——L5的學習者開始能感覺到每個接點。
    - name: 蛙式連鎖結構：俯衝入水
      detail: 觸發訊號——身體升起到位的瞬間。創造的條件——升力出現，蹬腿起始位置到位。
    - name: 蛙式連鎖結構：蹬腿啟動
      detail: 觸發訊號——手臂前伸、阻力開始明顯下降的時機。創造的條件——推進力透過弓背傳遞，滑行速度最大化。
    - name: 蛙式連鎖結構：滑行
      detail: 觸發訊號——蹬腿夾緊收尾，渦流整合完成。創造的條件——速度遞減到剛好可以重啟的時機。
    - name: 蛙式連鎖結構：下一個Outsweep（外划）啟動
      detail: 觸發訊號——感覺到速度開始下降。創造的條件——捕水感知提前出現，外划自然停在最窄位置。
      cue: Outsweep（外划）：手從前伸位置往外展開，是捕水的前置動作。Insweep（內划）：手從外側往內夾，是主要推進階段。
    indicators:
    - type: 連鎖感知
      text: 觀察／測量指標：能說出「這趟節奏在哪個接點斷掉了」。典型體驗：有時整趟游得很順，但說不出為什麼順，也說不出哪趟斷了。對應訓練方向：每趟游完立刻定位斷點，不只是說「感覺好不好」。
    - type: 路徑精煉
      text: 觀察／測量指標：外划幅度是否自然收斂；收腿路徑大腿前移量是否減少。典型體驗：慢游幅度正常，加速後外划自動變大或收腿路徑跑掉。對應訓練方向：對比「長路徑」和「短路徑」，讓學習者感覺效率差異。
    - type: 壓力下感知維持
      text: 觀察／測量指標：85%強度25m，SWOLF飄移≤3；SPL+N下手腳順序維持。典型體驗：一加速所有感知消失，或加速後只剩局部感知但連鎖斷掉。對應訓練方向：監控游：每趟結束後問「節奏在第幾划斷掉？斷在哪個接點？」
    quant: SWOLF（25m）26--35；SI參考 2.4--4.3；SPL（25m）8--11；連鎖感知出現，滑行穩定。壓力測試條件——速度壓力：SPL+N（在個人基準SPL上增加固定划數，壓縮每個循環的時間窗口），通過標準：連鎖感知維持，能說出節奏斷點，不是靠慣性撐過去。疲勞壓力：SWOLF（游泳效率指數）監控連續200m，觀察後段劣化幅度，通過標準：SWOLF劣化幅度在可接受範圍內；劣化基準值待田野觀察定錨。抗干擾壓力：Tempo Trainer設定節拍故意偏離學習者自然節奏，製造外部干擾，通過標準：學習者能感覺到節拍和自己連鎖感知的差異，選擇跟著自己的感知走而不是跟著節拍走。Tempo Trainer在L3/L4作為輔助工具（對齊自然節奏），在L5作為壓力工具（故意偏離），使用邏輯不同，需要向學習者說明。
    milestone: L5 → L6 共同里程碑：能在連續游200m以上的狀態下節奏感維持不崩潰；能說出「這趟節奏在哪裡斷掉」；SWOLF（25m）穩定在26--35。
    stagnation: 感知停滯時的處理方向（以下為教學實務推導及機制分析推導，尚未完整田野驗證，建議對照現場觀察調整）：分三個方向排查，依序確認。第一：Drill感知無法遷移到全速——若Sculling或單手蛙式做完感知很好但一接全速就消失，增加「不停頓直接接全速趟」的遷移訓練，Drill和全速之間不要有停頓讓感知重設；這是最常見的L5停滯原因，優先排查。第二：連鎖上的某個接點斷掉了——找斷點比換訓練工具更重要。游完後問「節奏在哪裡斷掉」，退回處理那個接點的單項練習，再接回全速趟確認遷移；斷點不找清楚就繼續游，只是在有斷點的狀態下累積游量。第三：若斷點都處理過但節奏感仍不扎實，重新核對SWOLF飄移數字，同時確認比賽或壓力情境（有人計時、有人觀察）的SWOLF和獨自游的差距是否在縮小；若差距沒有縮小，增加壓力情境模擬的訓練比例，不要只在安靜環境練連鎖感知。
  diagnostic:
    type_diagnosis:
      note: L5 三型斷點與訓練方向。L5主要問題與連鎖斷點如下。
      A:
        main_problem: 外划路徑未精煉，insweep加速起點延遲
        chain_breakpoint: Outsweep結束→Insweep啟動的接點：感覺不到外划到位的瞬間就是insweep應該啟動的時機
      B:
        main_problem: 收腿路徑未精煉，髖發力感知未出現
        chain_breakpoint: 阻力下降→蹬腿啟動的接點：感覺不到手臂前伸、阻力開始下降的蹬腿時機訊號
      C:
        main_problem: 俯衝角度感知未建立，升力忽有忽無
        chain_breakpoint: Insweep結束→俯衝角度的接點：感覺不到insweep帶起來的身體位置就是俯衝角度的起點
    type_training:
      note: Sculling（搖櫓）：雙手在胸前做8字形划水，用於建立和重置前臂水壓感知。Tempo Trainer：游泳節拍器，可設定節拍頻率。蝶腿蛙手：用蝶式腿部動作配合蛙式手部動作，讓學習者感覺「阻力下降→啟動推進」的時機感知，再遷移回蛙腿。
      A:
        breakpoint: Outsweep結束→Insweep啟動的接點：感覺不到外划到位的瞬間就是insweep應該啟動的時機
        core_tools: Sculling → 單手蛙式感覺外划到位瞬間 → 接全速趟確認insweep加速起點是否維持
        cue: 「外划停下來的那個瞬間，手感覺到什麼？那個感覺就是開始insweep的訊號。」
        combo: Sculling 5分鐘 → 單手蛙式4×25m → 接全速趟4×25m → Tempo Trainer偏離模式4×25m
        vs_L4: L4：節奏加快後手停在胸前射不出去。L5：放鬆時前伸流暢，但外划幅度未精煉，insweep 加速起點延遲，感知有但路徑尚未最短化
      B:
        breakpoint: 阻力下降→蹬腿啟動的接點：感覺不到手臂前伸、阻力開始下降的蹬腿時機訊號
        core_tools: 仰式蛙腿確認收腿路徑 → 蝶腿蛙手建立阻力下降時機感知 → 接正常蛙式確認時機感知是否遷移
        cue: 「手前伸的時候，阻力有沒有開始變小？那個變小的瞬間，就是腿可以蹬的時候。」
        combo: 仰式蛙腿2×25m → 蝶腿蛙手4×25m → 正常蛙式4×25m（記錄SPL） → SPL+N壓力測試
        vs_L4: L4：節奏加快後腿提前收，順序亂掉。L5：順序能維持，但收腿路徑仍長，髖發力感知尚未出現，踢完沒有連鎖傳遞感
      C:
        breakpoint: Insweep結束→俯衝角度的接點：感覺不到insweep帶起來的身體位置就是俯衝角度的起點
        core_tools: 極慢速蛙式停頓確認俯衝角度 → 接正常速度趟確認波動連鎖是否維持
        cue: 「身體往下切的時候，有沒有感覺到什麼把你往上頂？還是只是往下沉？」
        combo: 極慢速停頓蛙式4×25m → 正常速度蛙式4×25m → SWOLF監控200m
        vs_L4: L4：節奏加快後手腿同時動，順序消失。L5：順序能維持，但俯衝角度不穩定，升力忽有忽無，平衡感知未完全自動化
    type_milestones:
      A: 路徑精煉完成：外划幅度自然收斂，不需要刻意控制。新感知出現：能感覺到外划到位的瞬間，insweep加速起點感知穩定。連鎖感知建立：手的連鎖扎實——insweep結束就是收腿的訊號。
      B: 路徑精煉完成：收腿路徑穩定，大腿前移量明顯減少。新感知出現：能感覺到阻力開始下降的蹬腿時機訊號；髖發力感知開始出現。連鎖感知建立：腿的連鎖扎實——阻力下降就是蹬腿的訊號。
      C: 路徑精煉完成：俯衝角度每趟一致，升力穩定出現。新感知出現：能感覺到「這個角度身體會往上」和「這個角度只是往下沉」的差異。連鎖感知建立：波動連鎖扎實——insweep帶起來的位置就是俯衝角度的起點。
    stagnation_by_type: A型——斷點通常在outsweep結束到insweep啟動的接點，感覺不到外划到位就是內划的信號；退回Sculling單手蛙式感覺外划到位的瞬間。B型——斷點通常在阻力下降到蹬腿啟動的接點，感覺不到手臂前伸時阻力開始下降的蹬腿時機；退回蝶腿蛙手確認阻力下降時機感知。C型——斷點通常在insweep結束到俯衝角度的接點，感覺不到insweep帶起來的身體位置就是俯衝起點；退回極慢速停頓蛙式確認每個停頓點的身體位置。
- id: breast.L6
  stroke: breast
  level: L6
  name_zh: 感知自動化完成
  tagline: 注意力可以完全放在配速和策略
  public:
    description: L6的感知已完全移到背景運作，不需要刻意注意水感。連鎖感知自動維持，斷掉也自動修正，不需要意識介入。L5和L6的核心差異：L5能感覺到節奏斷掉並找回來，但需要注意力介入。L6的節奏感知在背景自動運作，注意力完全釋放給配速和策略。
    methods:
    - name: 疲勞崩潰的四個層次：第一層
      detail: 滑行時間開始縮短，或外划幅度開始微微增大——最早、最隱性。外部可見度：幾乎看不出來。哪個L能察覺：L6 能察覺。
    - name: 疲勞崩潰的四個層次：第二層
      detail: 收腿路徑開始變長，俯衝角度開始偏，連鎖接點開始需要意識介入。外部可見度：訓練有素的教練可察覺。哪個L能察覺：L5 開始能察覺。
    - name: 疲勞崩潰的四個層次：第三層
      detail: 手停在胸前、腿提前收、滑行幾乎消失，節奏明顯變亂。外部可見度：教練從池邊可看到。哪個L能察覺：L4 通常在這層才察覺。
    - name: 疲勞崩潰的四個層次：第四層
      detail: 動作全面崩壞，划手換氣順序跑掉，推進幾乎靠慣性撐。外部可見度：所有人都看得出來。哪個L能察覺：機械失效前的最後防線。
      cue: 超出體能極限（機械失效）的崩潰不是水感問題，任何人的感知在這個時候都會失效。L6 的水感描述只適用於機械失效之前的範圍。
    - name: L6 狀態描述：正常狀態
      detail: 不需要想水感，注意力在配速和距離，但水感一直在背景運作；動作穩定，划距一致，SPL在正常範圍內波動極小
    - name: L6 狀態描述：疲勞狀態
      detail: 感覺得到動作開始變形（踢水變慢、俯衝角度偏），能在游泳中途察覺並主動調整，不需要等游完才發現
    - name: L6 狀態描述：壓力狀態
      detail: 比賽壓力、有人計時、有人觀察——SWOLF與獨自練習差距≤3分；連鎖感知在外部干擾下自動維持
    - name: L6 沒有終點
      detail: L6是感知自動化完成，不是游泳技術的終點。之後的發展方向：外划幅度繼續精煉——感知精細程度持續提升，動作路徑越來越短；髖發力整合深化——從「偶爾感覺到」變成「每次都在」；比賽和訓練的SPL差值趨近於零——感知在任何情境下都同樣穩固；波動感知的自動化——俯衝角度自動找到最優值，升力自然出現。
    quant: SWOLF（25m）20--27（接近競技水準，個人進步趨勢比對照數值更重要）；SI（划手效率指數）3.9--6.9（SI = 速度（m/s）× 每划距離（m）。數值越高代表每個划手循環推進越遠）；SPL（25m）6--9；各配速SWOLF差異≤3分（放鬆游和全速游的SWOLF差距縮小，代表感知在不同配速下同樣穩固）；自動化，接近競技水準。
    milestone: 正常狀態下動作穩定，划距一致，SPL在正常範圍內波動極小；疲勞狀態能在游泳中途察覺並主動調整；壓力狀態下SWOLF與獨自練習差距≤3分，連鎖感知在外部干擾下自動維持。
- id: fly.pre
  stroke: fly
  level: pre
  name_zh: 波動游（Undulation）
  tagline: 感覺波動的存在，在動作開始之前
  public:
    description: 蝶式是四式中推進機制最依賴全身波動的泳式，每個動作週期都在讓波動從胸部傳到腳踝。如果學習者在建立動作之前沒有感覺到波動的存在，他們會用「上下擺動」來代替，每個動作週期都在製造阻力，而不是傳遞能量。波動游在任何蝶式動作習慣建立之前進行，讓學習者在空白的感知狀態下，自己發現「胸部下壓，有東西傳到腳了」。這個感知會成為後續所有動作學習的底層參考。波動游（Undulation）為本框架使用工具名稱，源自教學實務。Sculling（搖櫓）亦為本框架使用工具名稱。波動游是感知的種子，不是技術要求。不需要評判動作對不對，只需要學習者開始感覺波動的存在。
    methods:
    - name: 站在水中往前漂
      detail: 站在水中，深吸一口氣，讓身體往前漂（類似自由式前漂姿勢）。身體靜止，感知資源全在「漂出去之後身體有沒有繼續在動」，沒有任何動作干擾。
      cue: 「深吸一口氣，讓身體往前漂。漂出去之後，感覺一下身體有沒有繼續在動？」
    - name: 漂中胸骨下壓
      detail: 漂的過程中，試著讓胸骨往下壓，感覺有沒有東西傳到腰、傳到腳。胸部主動下壓是波動的源頭——學習者自己探索，不給正確答案。
      cue: 「漂著的時候，胸口往下壓一下，感覺有沒有什麼傳到腰？傳到腳？」
    - name: 重複對比
      detail: 氣用完站起來，再試一次，看看有沒有發現什麼。重複對比，讓感知在反覆中浮現。
      cue: 「再試一次，這次感覺一下胸口壓下去的那一瞬間，有沒有什麼不一樣？」
    indicators:
    - type: 感知目標
      text: 能說出「胸口往下壓，感覺有東西傳到腿」——不說「你需要做波動」，讓學習者自己發現這個感知
    - type: 時機
      text: 蝶式課程最開始，任何手臂或腿部動作習慣建立之前
- id: fly.L2
  stroke: fly
  level: L2
  name_zh: 推進感萌芽
  tagline: 開始感覺動作有沒有讓自己往前走
  public:
    description: L2 的蝶式學習者已經有大概的手腳動作，但大量力氣花在上下擺動，而不是前進。這個階段的重點不是把動作做對，而是開始感覺「我對水做了什麼，水有沒有回應」。核心原則：動作建立和感知萌芽同步進行。不要求完整蝶式，先隔離第二踢腿和手臂分別建立感知，再嘗試整合。L2 不分辨感知缺陷的方向。腿負責波動推進感知，手負責捕水推進感知——兩者分開建立，L3 才開始整合。蝶式的換氣節奏在 L2 不做強制要求，優先確認腿和手各自有感知。
    methods:
    - name: 腿部感知建立｜扶池邊垂直踢水
      detail: 扶池邊垂直踢水（站在水中，雙手扶邊，做蝶式腿）。身體固定，感知資源全在腳，感覺踢出去時腳背有沒有推到水。蝶式腿部的核心感知是「雙腳向下踢，感覺水被往後往下推，身體往前走」，而不是「腿在上下擺」。
      cue: 「腳踢下去的時候，感覺腳背有沒有碰到什麼？」
    - name: 腿部感知建立｜浮板蝶式踢水前進
      detail: 浮板蝶式踢水前進。確認推進力能傳導到前進方向，讓學習者感覺「腿推完身體繼續走」。
      cue: 「踢完之後，感覺身體有沒有繼續往前？有沒有滑行感？」
    - name: 腿部感知建立｜胸部下壓與腿踢連動
      detail: 確認胸部下壓和腿踢有沒有連動。胸部下壓配合踢腿，讓學習者感覺波動有沒有傳到腳。
      cue: 「踢腿的時候，你的胸口在做什麼？」
    - name: 手部感知建立｜站立靜態水壓
      detail: 站立水中，雙手向前延伸，感覺手掌面向後方的水壓。靜態感知確認——感覺水壓在掌心和前臂，而不是在手背。蝶式 L2 的手部感知目標不是完整的划手，而是「能感覺到手掌面向後方、水壓在前臂建立」這一個感知點。捕水位置感知是所有後續推進的前提。
      cue: 「手伸直，掌心朝後——感覺一下掌心和手背，哪邊感覺到水壓？」
    - name: 手部感知建立｜單臂外划到捕水
      detail: 單臂做外划到捕水位置的動作，感覺前臂水壓建立的瞬間。隔離單側，讓感知資源集中，感覺外划結束時前臂水壓是否均勻。
      cue: 「手往外展開之後，停在那裡，感覺前臂整個面有沒有感覺到水？」
    - name: 手部感知建立｜雙手外划對稱
      detail: 雙手做外划到捕水，感覺兩側水壓是否對稱。蝶式雙側對稱是核心要求——兩側感知不對稱是 L2 的常見問題。
      cue: 「兩隻手感覺有沒有一樣？哪邊感覺比較多？」
    indicators:
    - type: 腿部
      text: 浮板踢水能穩定前進，能感覺到腳踢完身體繼續往前走，不只是腳在拍水
    - type: 手部
      text: 外划到捕水位置時，能感覺到前臂有水壓，不只是手掌在划
    - type: 感受語
      text: 能描述手或腳「推到了什麼」或「感覺到了什麼」——不規定說什麼，能說出任何互動感知就是訊號
    quant: 尚無基準。感知萌芽優先於數字。
    stagnation: 感知停滯時的處理方向。第一層：踢腿但感覺不到腳踢到什麼——先確認踝關節是否夠鬆（踝關節僵硬會讓腳背無法朝後，感知條件尚未建立），確認踝關節活動度後再回來練感知。第二層：扶池邊有感覺，浮板踢就消失——推進感建立了但傳不到前進方向，確認兩件事：踢水方向是否朝後（不只是朝下）、踢完之後有沒有給身體滑行的時間，踢太快會讓推進感消失。第三層：站立有手部感知，划手時就消失——划手時其他動作（換氣、踢腿）分走感知資源，退回單純站立做外划到捕水，確認靜止狀態的感知穩定後，再嘗試加上前進。以上為教學實務推導，非獨立研究驗證，建議對照現場觀察調整。
- id: fly.L3
  stroke: fly
  level: L3
  name_zh: 水感出現但不穩定
  tagline: 抓到了，但下一趟又消失
  public:
    description: L3 的蝶式學習者已經能完成基本動作，偶爾會感覺「這趟游得很順」，但下一趟又回到掙扎狀態。這個階段開始需要分辨感知缺陷的主要方向。
    indicators:
    - type: 捕水感知
      text: 觀察／測量：前臂有沒有穩定感覺到水壓；外划幅度是否過大。典型體驗：有時候划手感覺推到什麼了，下一趟又感覺手划過去了。對應訓練方向：拳頭蝶式→張開；單臂蝶式隔離捕水感知。
    - type: 波動感知
      text: 觀察／測量：胸部下壓有沒有帶動踢腿；身體有沒有感覺到連貫的波動線條。典型體驗：偶爾感覺身體像一條魚一樣在動，但下一趟又感覺變成在上下擺。對應訓練方向：蝶式踢水只用核心不用腿力；胸部下壓→踢腿感知建立。
    - type: 兩踢時機感知
      text: 觀察／測量：第一踢有沒有在手入水時發生；第二踢有沒有在手推水出水時發生。典型體驗：感覺踢腿和划手是兩件分開的事，不知道什麼時候應該踢。對應訓練方向：單臂蝶式感覺一踢一划的連動；扶板踢水感覺踢的時機。
    - type: 感知持久性
      text: 觀察／測量：連續游四趟後感知是否消失；能否察覺哪一趟開始不對。典型體驗：前一兩趟還好，第三趟開始完全不一樣，不知道什麼時候跑掉的。對應訓練方向：每趟游完立刻說出感知狀態，建立疲勞覺察習慣。
    quant: SWOLF（25m）55--80；SPL（25m）差異 ≤ 3 划。感知穩定比數值更重要。
    milestone: 共同里程碑（L3 → L4）：能完成連續蝶式換氣不中斷、能說出「這趟水感消失了，是因為　　」、浮板踢水有前進感且能感覺到滑行存在。
    stagnation: 感知停滯時的處理方向：先重新確認感知缺陷的主要方向——類型會隨訓練改變，停滯有時是因為主要感知缺陷已轉移，訓練方向還沒跟上。確認之後走以下分叉：若重新指向不同的主要缺陷，切換訓練方向，觀察兩週。若類型沒有改變，確認訓練是否在感知消失的狀態下繼續進行——感知消失後繼續游只強化無水感迴路。若兩者都排除，退回 L2 分別確認：浮板蝶式踢水有沒有前進感、手部停頓法在靜止狀態下前臂水壓是否能建立——L3 停滯有時不是 L3 的問題，而是 L2 基礎尚未完整。以上為教學實務推導，非獨立研究驗證，建議對照現場觀察調整。
  diagnostic:
    diagnosis_note: 三題都指向同一型則判斷較為確定；若有混合，以出現最多次的型為主要處理方向。建議每隔一個 L 級重新評估。
    type_diagnosis:
    - q: Q1　划手時，手掌和前臂有沒有感覺到水壓？還是感覺手划過去了但沒碰到什麼？
      A: 感覺不到，或只有手掌偶爾有，前臂感覺不到
      B: 有一點，但不穩定；問題主要在身體波動感覺不到
      C: 手感還好，但感覺踢腿和划手時機對不上
    - q: Q2　游的時候，有沒有感覺到身體在做波動？還是感覺腿在上下擺？
      A: 不確定，主要感覺是手有沒有抓到水
      B: 感覺波動不連貫，或只有腰在動但傳不到腿
      C: 有時感覺波動，但踢的時機和手的節奏說不清楚什麼關係
    - q: Q3　游完之後，你知道哪裡出了問題嗎？
      A: 知道，覺得手沒有抓到水，或外划好像太大了
      B: 知道，感覺波動斷掉了，或腿踢完沒有推力
      C: 知道有問題但說不出哪裡，就是感覺時機全都亂了
    type_states:
      A:
        appears: 偶爾某趟捕水位置對了，感覺前臂整個面有壓力，整趟都不一樣
        disappears: 捕水位置每趟不一樣，外划幅度改變讓前臂水壓建立不穩定
        typical_speech: 「有時候划手感覺有抓到，但大部分感覺手划過去了，不知道差在哪」
      B:
        appears: 偶爾波動傳貫了，感覺身體像魚一樣連貫，腳踝鞭打有感
        disappears: 胸部下壓不夠，波動無法從源頭啟動，腿踢變成獨立動作
        typical_speech: 「我有在踢，但感覺踢完身體沒有什麼波動，就是上下動而已」
      C:
        appears: 極度放鬆時偶爾出現，感覺踢和划對上了，但不知道自己做了什麼不一樣
        disappears: 節奏稍微加快，踢腿和划手的時機就跑掉，整個連動消失
        typical_speech: 「有時候感覺對上了，但下一趟又不知道踢的時機了」
    type_training:
      A:
        core_tools: 拳頭蝶式→張開（對比效應）；單臂蝶式隔離捕水感知；水中停頓法（入水後停1秒感覺前臂水壓）
        avoid: 強調外划的路徑或形狀——追求形狀遮蔽捕水感知，與 S 型划手問題完全平行
        cue: 「入水之後停一下，感覺前臂整個面有沒有感覺到水壓？那個感覺就是捕水位置找到了。」
        combo: 水中停頓法4×（每次感覺後說出前臂感知狀態）→ 拳頭蝶式2×25m → 張開手2×25m → 單臂蝶式4×25m（每趟說出捕水感知在哪裡）
      B:
        core_tools: 胸部下壓訓練（扶池邊做波動感受）；浮板踢水專注胸部帶動踢腿；蝶式踢水只用核心不用腿力
        avoid: 強調腿要踢更用力——波動不是力量問題，是傳遞鏈的問題。腿越用力越容易截斷波動
        cue: 「踢腿的時候，胸口在做什麼？試試看讓胸口先往下，感覺有沒有什麼傳到腳？」
        combo: 扶池邊波動感受5分鐘 → 浮板踢水4×25m（感覺胸部帶動踢腿）→ 蝶式踢水只用核心2×25m → 完整蝶式4×25m（每趟說出波動連不連貫）
      C:
        core_tools: 一踢一划（隔離時機感知）；數踢腿：入水算1，出水算2，練習感知兩踢的時機；單臂蝶式感覺踢和划的連動
        avoid: 在整合不穩定時反覆游完整蝶式——只強化時機混亂的迴路
        cue: 「手入水算一，手出水算二——試試看，有沒有感覺腳是跟著數字在踢的？」
        combo: 數踢腿練習5分鐘（入水1，出水2）→ 一踢一划4×25m（感覺踢和划對上了嗎？）→ 完整蝶式4×25m（每趟說出踢腿時機有沒有對上）
    type_milestones:
      A: 感知重現能力：連續 3/4 趟能感覺明確前臂水壓，拳頭蝶式速度達開手游的 80%。感知持久性：浮板蝶式踢水 100m 中，超過一半的時間能感覺到腳踝鞭打有推到水。數字指標：拳頭蝶式速度達開手游的 80% 以上。
      B: 感知重現能力：能區分「腿在波動」和「腿在擺動」，加入胸部下壓後踢腿推進感明顯增加。感知持久性：連續游 4 趟 25m，超過一半的趟次能感覺到波動從胸傳到腳。數字指標：加入胸部下壓後的游速，比純上下擺腿快 10% 以上。
      C: 感知重現能力：能說出「這趟第幾划踢腿時機跑掉了」，一踢一划節奏穩定，兩者能感覺到連動。感知持久性：一踢一划連續做 4 趟 25m，至少 3 趟能感覺到踢和划有對上。數字指標：一踢一划的 SPL，不超過完整蝶式 SPL 加 3 划。
    stagnation_by_type: A型額外確認：拳頭蝶式做完張開手的對比效應是否出現；若沒有出現，退回站立水中確認掌心朝後的靜態水壓感知。B型額外確認：扶池邊做波動感受時，胸部下壓是否能感覺到有東西傳到腳；若連靜態都感覺不到，退回前置感知波動游重建波動感知條件。C型額外確認：一踢一划的慢速版是否能穩定執行；若不能，代表時機感知尚未建立，一踢一划比完整蝶式更優先練。
- id: fly.L4
  stroke: fly
  level: L4
  name_zh: 壓力下維持不住
  tagline: 找到了，但留不住
  public:
    description: L4 和 L3 最大的差別：L3 的問題是「找不到水感」，L4 的問題是「找到了但留不住」。放鬆慢游幾乎都能感覺到波動和捕水；但節奏一加快，哪一個先崩潰，就是分叉點。蝶式 L4 的核心問題可以用一句話說完：節奏加快後，波動鏈的某一環斷掉了。差異只是崩潰位置不同——捕水位置跑掉、胸部不再帶動踢腿波動斷開、兩踢和划手的同步感消失。L4 的診斷重點不再是「哪裡感知弱」，而是「節奏加快後，哪裡最先崩潰」——需要刻意注意的地方，就是感知還沒穩固的地方。
    indicators:
    - type: 捕水壓力穩定性
      text: 觀察／測量：85% 強度下前臂水壓感知能否維持；提速後外划幅度是否自動增大。典型體驗：慢游捕水感覺到了，一提速感覺手划過去了，沒有抓到水。對應訓練方向：單臂蝶式壓力版；Sculling 重置手感後接全速趟。
    - type: 波動連貫壓力穩定性
      text: 觀察／測量：加速後胸部有沒有繼續帶動踢腿；波動有沒有在高節奏下還能傳到腳踝。典型體驗：慢游波動感覺連貫，加速後波動消失，腿變成獨立上下擺。對應訓練方向：速度爬梯找波動臨界點；蝶式踢水加速版感覺臨界。
    - type: 兩踢同步壓力穩定性
      text: 觀察／測量：提速後第一踢和入水的同步有沒有維持；第二踢和出水的同步有沒有維持。典型體驗：慢游兩踢時機還好，一加速兩踢變成亂踢，或只踢一踢。對應訓練方向：數踢腿壓力版；節拍器輔助穩定踢腿時機。
    - type: 疲勞下感知崩潰順序
      text: 觀察／測量：連續游 4×25m 後，哪個感知最先消失；消失後能否在下一趟找回來。典型體驗：前兩趟還有感知，後兩趟完全消失，且游完說不出哪裡不對了。對應訓練方向：每趟游完立刻說出感知狀態；監控游確認消失的序列。
    quant: SWOLF（25m）46--62；疲勞後飄移 ≤ 5。崩潰點作為主要診斷工具。
    milestone: 共同里程碑（L4 → L5）：SPL 25m 落在 14--20 划（依距離策略調整）、放鬆游時波動感覺連貫且能維持、節奏加快後能說出「哪個環節出了問題」、在個人基準 SPL 加 3 划的節奏下游 25m 感知還在。
    stagnation: 感知停滯時的處理方向：先確認放鬆游時波動感和捕水感是否分別穩定——這是 L4 停滯最快的分叉點。若慢游也找不到波動感或捕水感，退回 L3 處理，不在 L4 繼續堆訓練量。若慢游穩定但加速後馬上崩潰，走速度爬梯方向：從比臨界速度低一檔開始，確認感知穩定後再微微加速，不要跳過中間的速度區間直接練高強度。若速度爬梯做了但里程碑仍未達到，重新確認感知缺陷的主要方向——主要感知缺陷可能已隨訓練轉移。最後確認訓練強度——在感知消失的狀態下持續高強度訓練，只會強化無水感迴路。以上為教學實務推導，非獨立研究驗證，建議對照現場觀察調整。
  diagnostic:
    type_diagnosis:
    - q: Q1　游快一點的時候，感覺哪裡最先跑掉？
      A: 手感覺找不到水了，划的感覺消失
      B: 波動感覺斷掉了，腿變成在擺
      C: 說不清楚，感覺全部都亂了，踢腿時機完全不知道
    - q: Q2　游快一點的時候，注意力比較多放在哪裡？
      A: 划手，一直在想有沒有抓到水、前臂有沒有感覺到
      B: 腿，感覺腿跟不上了，胸部沒有在帶動
      C: 說不清楚，感覺什麼都要注意但什麼都抓不住
    - q: Q3　游完之後，你知道哪裡出了問題嗎？
      A: 知道，手感覺沒有抓到水，可能外划太大了
      B: 知道，波動斷掉了，或腿踢變成擺腿
      C: 知道有問題，但說不出來哪裡，就是感覺時機全都亂了
    type_states:
      A:
        trigger: 節奏加快後捕水位置不穩定，外划幅度自動增大來代償感知消失
        compensation: 更用力划手試圖「抓到水」，但沒有捕水位置，只是讓肩膀更快疲勞
        disappear_speed: 漸進，捕水感知先變得不穩定，然後越來越少，最後完全消失
        vs_L3: L3：感知不到捕水位置。L4：能找到，但節奏加快後捕水位置跑掉，感知消失
        vs_L5: L4：節奏加快後捕水位置跑掉，感知消失。L5：慢游捕水感知穩定，但外划幅度未收斂，每趟捕水起點略有飄移，內划爆發起點延遲
      B:
        trigger: 節奏加快後胸部不再下壓，波動源頭消失，腿踢變成孤立的擺動
        compensation: 腿踢更用力試圖找回波動感，但孤立的腿力製造阻力而非波動
        disappear_speed: 通常是某一踢之後波動感就斷了，然後整趟都是擺腿
        vs_L3: L3：感知不到波動連貫。L4：放鬆時波動感覺不錯，但節奏加快後波動源頭消失
        vs_L5: L4：節奏加快後波動源頭消失，腿變成擺動。L5：波動連貫性有，但胸部下壓深度每趟不一，第一踢啟動時機仍在飄移
      C:
        trigger: 節奏加快後兩踢和划手的同步感消失，各部位開始各自為政
        compensation: 划頻加快試圖追上節奏，但更快只讓時機更亂
        disappear_speed: 同步，節奏一加快整個時機感知立刻消失
        vs_L3: L3：感覺不到兩踢時機。L4：放鬆時時機感知有，節奏加快後整合消失
        vs_L5: L4：節奏加快後兩踢和划手各自為政。L5：整合有但不穩固，壓力下仍有某個接點會先斷，且斷了之後要有意識介入才能找回
    type_training:
      A:
        core_tools: Sculling → 單臂蝶式（隔離捕水感知）→ 接全速趟確認遷移；凍結動作法：外划到達捕水位置時暫停，確認前臂水壓
        avoid: 感知消失後繼續硬游——在感知消失後繼續游只是強化沒有捕水感知的神經迴路
        cue: 「加速之後，前臂還有感覺到水嗎？沒有的話，稍微放慢一點，找到感覺之後再加速。」
        combo: Sculling 5分鐘 → 單臂蝶式4×25m → 接全速趟4×25m（每趟游完說：前臂水壓還在嗎？在幾划？）
      B:
        core_tools: 速度爬梯找波動臨界點（每趟微微加速，找到波動開始消失的速度）；蝶式踢水只用核心：不允許腿主動發力，只靠胸部帶動
        avoid: 純腿力訓練——L4 的核心是波動整合而非腿的力量，強化腿力對波動感知幫助有限
        cue: 「踢腿的時候，胸口在做什麼？試試看什麼速度下胸口還能帶動踢腿——那就是你的臨界點。」
        combo: 蝶式踢水只用核心2×25m → 速度爬梯4趟（每趟加速5%）→ 波動感知臨界點後退回確認 → 完整蝶式4×25m
      C:
        core_tools: 節拍器輔助踢腿時機：入水算1，出水算2，用節拍器對齊；兩踢分開練：只做第一踢版蝶式；只做第二踢版蝶式
        avoid: 高強度訓練為主——高張力狀態下訓練次數越多，「緊張→時機混亂」的迴路越強化
        cue: 「入水的時候腳踢沒有？出水的時候腳踢沒有？每趟游完說出來。」
        combo: 節拍器對齊踢腿4×25m → 只做第一踢蝶式2×25m → 只做第二踢蝶式2×25m → 完整蝶式4×25m（每趟說兩踢時機對上了幾划）
    type_milestones:
      A: 感知重現能力：加速後捕水感知消失，能在下一趟刻意減速找回捕水位置，然後重新加速。數字指標：85% 強度 25m，前臂水壓感知維持前半趟以上。
      B: 感知重現能力：能感覺到波動消失的那一踢，下一趟刻意讓胸部下壓帶動踢腿。數字指標：連續 4×25m，每趟能說出波動消失在第幾划。
      C: 感知重現能力：能說出「這趟第幾划兩踢時機跑掉了」，並在下一趟刻意對齊時機。數字指標：節拍器對齊後能維持 4 趟以上不跑掉。
    stagnation_by_type: A型額外確認：凍結動作法（外划停在捕水位置時暫停）時前臂水壓是否均勻建立；若暫停時有感知但動態划手時消失，這是動靜轉換問題，加強 Sculling 接單臂蝶式的遷移組。B型額外確認：波動臨界速度是否每次測都在不同位置；若臨界點不穩定，代表胸部下壓的啟動時機本身不穩定，退回胸部下壓感知練習。C型額外確認：只做第一踢蝶式和只做第二踢蝶式是否各自能穩定；若任一個做不穩定，該踢的感知尚未建立，繼續分開練而不要整合。
- id: fly.L5
  stroke: fly
  level: L5
  name_zh: 感知路徑精煉
  tagline: 能感覺到波動鏈，知道每一踢在等什麼、觸發什麼
  public:
    description: L5 和 L2--L4 的本質不同。L2--L4 都在「建立感知」，L5 的感知已穩固，核心問題是「連動感知還沒有完全浮現」以及「路徑還沒有精煉到最有效率」。L5 的核心定義：能感覺到波動鏈的連動——知道每個動作在等什麼訊號、在觸發什麼下一步。胸部下壓不再是「一個動作」，而是「觸發第一踢、同時接收手臂入水的信號」。每個動作開始有前後關係，而不是各自獨立的檢查點。
    methods:
    - name: 路徑精煉（L5 發展層次一）
      detail: 外划幅度收斂到最小必要值；第二踢的啟動時機和力道精煉；入水角度精確化。訓練邏輯：感知已有，現在讓最短、最有效率的路徑自動發生。對比「大幅外划」和「最小外划」的捕水品質差異。
    - name: 連鎖感知出現（L5 發展層次二）
      detail: 入水角度觸發波動的感知；第一踢啟動的「開機感」；第二踢和出水的「彈射感」。訓練邏輯：不是「教新動作」，而是創造條件讓連鎖感知自然浮現。末端感知穩固是前提。
    - name: 蝶式波動連鎖結構｜低頭入水＋胸部下壓（Entry）
      detail: 觸發訊號（等什麼）：手臂入水的水感回饋。創造的條件（觸發什麼）：第一踢腿啟動的時機條件；整條波動鏈的開機信號。
    - name: 蝶式波動連鎖結構｜第一踢腿（Entry Kick）
      detail: 觸發訊號（等什麼）：胸部下壓帶來的波動慣性傳遞。創造的條件（觸發什麼）：身體深度定位；外划到捕水位置的波動接收視窗。
    - name: 蝶式波動連鎖結構｜外划→捕水（Outsweep→Catch）
      detail: 觸發訊號（等什麼）：第一踢的波動慣性到達手臂。創造的條件（觸發什麼）：前臂面向後方的水壓建立；內划最大推進力的準備。
    - name: 蝶式波動連鎖結構｜內划→上划（Insweep→Upsweep）
      detail: 觸發訊號（等什麼）：前臂水壓均勻建立的感知——這是啟動爆發的信號。創造的條件（觸發什麼）：最大推進相；出水的慣性動量；身體上浮的平台。
    - name: 蝶式波動連鎖結構｜出水（Exit）
      detail: 觸發訊號（等什麼）：手臂推水結束的水感消失——手感覺「推完了」。創造的條件（觸發什麼）：第二踢腿的啟動；Recovery 的初始動量。
    - name: 蝶式波動連鎖結構｜第二踢腿（Power Kick）
      detail: 觸發訊號（等什麼）：手臂出水時的上升慣性。創造的條件（觸發什麼）：髖部抬起；Recovery 的高度；下一個入水的平台品質。
    - name: 蝶式波動連鎖結構｜空中恢復→入水（Recovery→Entry）
      detail: 觸發訊號（等什麼）：髖部上升到位的感知——感覺手臂「被帶起」而非「抬起」。創造的條件（觸發什麼）：回到低頭入水；下一個波動鏈的品質由此決定。以上是一個完整蝶式循環的連鎖觸發關係——L5 的學習者開始能感覺到每個接點。
    indicators:
    - type: 連鎖感知
      text: 觀察／測量：能說出「這趟節奏在哪個接點斷掉了」。典型體驗：有時整趟游得很順，但說不出為什麼順，也說不出哪裡斷了。對應訓練方向：每趟游完立刻定位斷點，不只是說「感覺好不好」。
    - type: 路徑精煉
      text: 觀察／測量：外划幅度是否自然收斂；入水角是否精確（手臂高位入水）。典型體驗：慢游外划幅度正常，加速後外划自動變大，回到代償模式。對應訓練方向：對比「最大外划」和「最小外划」讓學習者感覺推進效率差異。
    - type: 壓力下感知維持
      text: 觀察／測量：85% 強度 50m，SWOLF 飄移 ≤ 4；SPL+3 划下連鎖感知維持。典型體驗：一加速所有連鎖感知消失，或加速後只剩局部感知但連鎖斷掉。對應訓練方向：監控游：每趟結束後問「節奏在第幾划斷掉？斷在哪個接點？」。
    quant: SWOLF（25m）38--50；各配速差異 ≤ 4；疲勞後飄移 ≤ 3。連鎖感知接點為主要評估指標。壓力測試條件——速度壓力：SPL+N（在個人基準 SPL 上增加固定划數，壓縮每個循環的時間窗口），通過標準：連鎖感知維持，能說出節奏斷點，不是靠慣性撐過去。疲勞壓力：SWOLF 監控連續 200m，觀察後段感知劣化幅度，通過標準：SWOLF 劣化幅度在可接受範圍，疲勞後能察覺哪個接點最先斷。抗干擾壓力：節拍器設定節拍故意偏離學習者自然節奏，製造外部干擾，通過標準：學習者能感覺到節拍和自己連鎖感知的差異，選擇跟著自己的感知走而不是跟著節拍走。
    milestone: 共同里程碑（L5 → L6）：能在連續游 200m 以上的狀態下節奏感維持不崩潰；能說出「這趟節奏在哪裡斷掉」；SWOLF（25m）穩定在 30--42（依距離策略調整）。
    stagnation: 感知停滯時的處理方向：分三個方向排查，依序確認。第一：Drill 感知無法遷移到全速——若單臂蝶式或外划幅度遞減做完感知很好但一接全速就消失，增加「不停頓直接接全速趟」的遷移訓練，Drill 和全速之間不要有停頓讓感知重設。第二：波動連鎖的某個接點仍未自動化——找到斷點比換訓練工具更重要。游完後問「節奏在哪裡斷掉」，退回處理那個接點的單項練習，再接回全速趟確認遷移；斷點不找清楚就繼續游，只是在有斷點的狀態下累積游量。第三：若兩者都已處理但里程碑仍未達到，重新核對 SWOLF 飄移數字，同時確認比賽或壓力情境下（有人計時、有人觀察）的 SWOLF 和獨自游的差距是否在縮小；若差距沒有縮小，增加壓力情境模擬的訓練比例，不要只在安靜環境練連鎖感知。以上為教學實務推導及機制分析推導，尚未完整田野驗證，建議對照現場觀察調整。
  diagnostic:
    type_states:
      A:
        L5_main_problem: 外划路徑未精煉，捕水位置每趟略有不同，內划爆發起點延遲
        chain_breakpoint: 外划結束→捕水啟動的接點：感覺不到外划到位的瞬間就是內划應該啟動的訊號
      B:
        L5_main_problem: 波動幅度未精煉，胸部下壓深度不穩定，第一踢啟動時機飄移
        chain_breakpoint: 入水→第一踢啟動的接點：感覺不到入水的水感就是第一踢的觸發信號
      C:
        L5_main_problem: 連鎖感知中有一個接點仍未自動化，壓力下那個接點先斷
        chain_breakpoint: 出水→第二踢的接點：感覺不到「推完了」就是第二踢應該啟動的時機
    type_training:
      A:
        breakpoint: 外划結束→捕水啟動的接點：感覺不到外划到位的瞬間就是內划應該啟動的訊號
        core_tools: Sculling → 感覺外划到位瞬間 → 單臂蝶式接全速確認捕水起點；外划幅度遞減練習（每趟縮小外划幅度，感覺推進效率有沒有提升）
        cue: 「外划停下來的那個瞬間，前臂感覺到什麼？那個感覺就是開始內划的訊號。」
        combo: Sculling 5分鐘 → 外划幅度遞減4×25m → 單臂蝶式4×25m → 全速趟4×25m（記錄 SPL）
      B:
        breakpoint: 入水→第一踢啟動的接點：感覺不到入水的水感就是第一踢的觸發信號
        core_tools: 入水水感練習：手入水後停頓感覺水感回饋，這就是第一踢的信號；胸部下壓深度精煉：感覺哪個深度波動傳遞最完整
        cue: 「手入水那一下，感覺到水壓了嗎？有感覺就是腳可以踢的時候。」
        combo: 入水停頓練習4×（感覺水感回饋）→ 胸部下壓精煉4×25m → 完整蝶式4×25m（SWOLF 監控）
      C:
        breakpoint: 出水→第二踢的接點：感覺不到「推完了」就是第二踢應該啟動的時機
        core_tools: 「推完了」的感知練習：上划結束時刻意感覺手的水壓消失——這就是第二踢的觸發；出水→第二踢連接：只練出水和第二踢的連接，不做完整划手
        cue: 「上划結束，感覺一下手的水壓有沒有消失？有消失就是腳踢的時間。」
        combo: 「推完了」感知練習5分鐘 → 出水＋第二踢連接2×25m → 完整蝶式4×25m → SPL+N 壓力測試
    type_milestones:
      A: 路徑精煉完成：外划幅度自然收斂，不需要刻意控制；每趟捕水位置一致。新感知出現：能感覺到外划到位的瞬間，捕水起點感知穩定；不再出現大幅外划的代償。連鎖感知建立：捕水連鎖扎實——外划到位就是內划的信號，每趟自動觸發。
      B: 路徑精煉完成：胸部下壓深度穩定，第一踢啟動時機飄移接近零。新感知出現：能感覺到入水水感就是第一踢的觸發；波動從胸傳到腳的感知每趟出現。連鎖感知建立：波動連鎖扎實——入水感知就是第一踢的信號，每趟自動觸發。
      C: 路徑精煉完成：兩踢接點感知穩固，不需要刻意想「該踢了」。新感知出現：能感覺到「推完了」就是第二踢的觸發；不再需要刻意數踢腿時機。連鎖感知建立：時機連鎖扎實——「推完了」就是第二踢的信號，每趟自動觸發。
    stagnation_by_type: A型額外確認：外划幅度在全速時是否仍然自然收斂，若加速後外划幅度自動變大，捕水連鎖尚未自動化，退回外划幅度遞減練習。B型額外確認：入水水感觸發第一踢是否在全速下仍然自動發生，若需要刻意想才能觸發，入水停頓練習繼續做，不要停。C型額外確認：「推完了」的感知是否能在全速下穩定偵測，若感覺不到，退回上划結束時的「推完了」感知練習，確認靜態版本穩定後再接全速。
- id: fly.L6
  stroke: fly
  level: L6
  name_zh: 感知自動化完成
  tagline: 注意力可以完全放在配速和策略
  public:
    description: L6 的感知已完全移到背景運作，不需要刻意注意波動鏈。連鎖感知自動維持，斷掉也自動修正，不需要意識介入。L5 和 L6 的核心差異：L5 能感覺到波動鏈斷掉並找回來，但需要注意力介入。L6 的連鎖感知在背景自動運作，注意力完全釋放給配速、換氣策略和比賽節奏。
    methods:
    - name: 疲勞崩潰的四個層次｜第一層
      detail: 崩潰內容：外划幅度開始微微增大，或第一踢啟動時機開始延後——最早、最隱性。外部可見度：幾乎看不出來。哪個 L 能察覺：L6 能察覺。
    - name: 疲勞崩潰的四個層次｜第二層
      detail: 崩潰內容：波動源頭開始偏，胸部下壓深度不穩，兩踢時機開始飄。外部可見度：訓練有素的教練可察覺。哪個 L 能察覺：L5 開始能察覺。
    - name: 疲勞崩潰的四個層次｜第三層
      detail: 崩潰內容：波動變成上下擺，外划幅度明顯過大，出水笨重，節奏感消失。外部可見度：教練從池邊可看到。哪個 L 能察覺：L4 通常在這層才察覺。
    - name: 疲勞崩潰的四個層次｜第四層
      detail: 崩潰內容：波動鏈全面斷裂，動作各自為政，推進完全靠手臂硬划。外部可見度：所有人都看得出來。哪個 L 能察覺：機械失效前的最後防線。超出體能極限（機械失效）的崩潰不是水感問題，任何人的感知在這個時候都會失效。L6 的水感描述只適用於機械失效之前的範圍。
    - name: L6 狀態描述｜正常狀態
      detail: 不需要想波動和捕水，注意力在配速和距離，但感知一直在背景運作；外划幅度自然最小，SPL 穩定，划距一致。
    - name: L6 狀態描述｜疲勞狀態
      detail: 感覺得到波動開始斷裂（外划幅度變大、第一踢延後、出水笨重），能在游泳中途察覺並主動調整，不需要等游完才發現。
    - name: L6 狀態描述｜壓力狀態
      detail: 比賽壓力、有人計時、有人觀察——SWOLF 與獨自練習差距 ≤ 4 分；連鎖感知在外部干擾下自動維持。
    - name: L6 沒有終點
      detail: L6 是感知自動化完成，不是游泳技術的終點。之後的發展方向：外划幅度繼續精煉——感知精細程度持續提升，動作路徑越來越短、效率越來越高。入水角度精確化——45 度切入、高肘入水的品質持續提升，波動觸發越來越乾淨。比賽和訓練的 SPL 差值趨近於零——感知在任何情境下都同樣穩固。距離策略感知出現——感覺得到 50m、100m、200m 蝶式的最優波動幅度和節奏策略各不相同，能根據配速自動調整。以上為機制分析推導，尚未完整田野驗證。
    quant: SWOLF（25m）27--38（100m 蝶式選手，受距離策略影響大，50m 衝刺和 200m 節奏差異顯著，個人進步趨勢比對照數值更重要）；SPL（25m）8--14 划（依身高和距離，蝶式 SPL 受身高臂展和距離策略影響，個人追蹤趨勢比對照數值更重要）；各配速 SWOLF 差異 ≤ 4 分（放鬆游和全速游的 SWOLF 差距縮小，代表感知在不同配速下同樣穩固）；比賽 vs 訓練 SPL 差值趨近零（比賽和訓練的划數一致，代表感知在壓力下沒有退化）。感知為主，數字為持續精進參考。
